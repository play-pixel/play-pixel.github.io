<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Backrooms: Dialogue Editor</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/jerosoler/Drawflow/dist/drawflow.min.css">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    :root { --bg:#1a1a22; --surface:#222230; --panel:#1e1e2a; --border:#2e2e3e; --text:#d0d0dc; --dim:#6a6a7e; --accent:#5b9cf5; --green:#4ade80; --red:#ef4444; --orange:#f59e0b; --purple:#a78bfa; }
    body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:var(--bg); color:var(--text); height:100vh; display:flex; flex-direction:column; overflow:hidden; }

    .topbar { display:flex; align-items:center; gap:12px; padding:8px 16px; background:var(--panel); border-bottom:1px solid var(--border); flex-shrink:0; z-index:10; }
    .topbar h1 { font-size:14px; font-weight:600; color:var(--accent); }
    .topbar select, .topbar button { padding:6px 12px; border:1px solid var(--border); border-radius:6px; background:var(--surface); color:var(--text); font-size:12px; cursor:pointer; }
    .topbar button:hover { border-color:var(--accent); }
    .topbar button.primary { background:var(--accent); color:#fff; border-color:var(--accent); }
    .topbar .spacer { flex:1; }
    .topbar .info { font-size:11px; color:var(--dim); }

    /* Preview modal */
    .prev-backdrop { display:none; position:fixed; inset:0; background:rgba(0,0,0,.7); z-index:100; align-items:center; justify-content:center; }
    .prev-backdrop.open { display:flex; }
    .prev-phone { width:380px; max-height:85vh; background:#ece5dd; border-radius:18px; overflow:hidden; display:flex; flex-direction:column; box-shadow:0 20px 60px rgba(0,0,0,.5); color:#111; }
    .prev-hdr { display:flex; align-items:center; gap:10px; padding:10px 14px; background:#3b82f6; color:#fff; flex-shrink:0; }
    .prev-avatar { width:36px; height:36px; border-radius:50%; background:linear-gradient(135deg,#7c3aed,#3b82f6); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:15px; background-size:cover; background-position:center; flex-shrink:0; }
    .prev-title { flex:1; min-width:0; }
    .prev-name { font-weight:600; font-size:14px; }
    .prev-sub { font-size:11px; opacity:.85; font-family:monospace; }
    .prev-hdr select { padding:2px 6px; font-size:11px; border-radius:4px; border:none; background:rgba(255,255,255,.25); color:#fff; }
    .prev-hdr select option { color:#111; }
    .prev-x { width:28px; height:28px; border:none; background:rgba(255,255,255,.15); color:#fff; border-radius:50%; cursor:pointer; font-size:14px; }
    .prev-chat { flex:1; overflow-y:auto; padding:12px; display:flex; flex-direction:column; gap:6px; background:#ece5dd; }
    .prev-msg { max-width:78%; padding:8px 11px; border-radius:14px; font-size:13px; line-height:1.4; word-wrap:break-word; position:relative; }
    .prev-msg.npc { background:#fff; align-self:flex-start; border-bottom-left-radius:4px; }
    .prev-msg.player { background:#dcf8c6; align-self:flex-end; border-bottom-right-radius:4px; }
    .prev-msg.status { align-self:center; background:transparent; color:#555; font-style:italic; font-size:11px; text-align:center; max-width:90%; }
    .prev-msg.typing { background:#fff; align-self:flex-start; color:#888; font-style:italic; font-size:11px; padding:6px 10px; }
    .prev-img { max-width:78%; align-self:flex-start; border-radius:14px; overflow:hidden; background:#fff; }
    .prev-img img { width:100%; display:block; }
    .prev-img .prev-caption { padding:6px 10px; font-size:11px; color:#555; font-style:italic; }
    .prev-voice { max-width:78%; align-self:flex-start; background:#fff; border-radius:14px; padding:10px 12px; font-size:12px; }
    .prev-voice .vv { font-weight:600; color:#3b82f6; font-size:11px; margin-bottom:2px; }
    .prev-bottom { padding:10px 12px; background:#f4eee4; border-top:1px solid rgba(0,0,0,.08); display:flex; flex-direction:column; gap:6px; flex-shrink:0; max-height:40vh; overflow-y:auto; }
    .prev-choice { padding:8px 12px; border-radius:8px; border:1px solid #3b82f6; background:#3b82f6; color:#fff; font-size:12px; text-align:left; cursor:default; }
    .prev-choice.opt { background:#fff; color:#3b82f6; }
    .prev-choice.def::before { content:'⭐ '; }
    .prev-choice .tag { opacity:.7; font-size:10px; margin-left:6px; font-family:monospace; }
    .prev-wait { padding:8px; background:rgba(167,139,250,.15); border:1px dashed #a78bfa; border-radius:8px; font-size:12px; color:#5b2a8a; text-align:center; }
    .prev-meta { padding:6px 10px; background:rgba(91,156,245,.08); border-left:3px solid #3b82f6; font-size:11px; color:#333; border-radius:0 6px 6px 0; margin-bottom:4px; }
    .prev-warn { padding:6px 10px; background:#fef3c7; border-left:3px solid #f59e0b; font-size:11px; color:#78350f; border-radius:0 6px 6px 0; margin:4px 0; }
    .prev-end { padding:10px; background:rgba(59,130,246,.1); border:2px dashed #3b82f6; border-radius:8px; font-size:12px; color:#1e40af; }

    .main { display:flex; flex:1; overflow:hidden; }

    /* View tabs */
    .view-tabs { display:flex; gap:2px; background:var(--surface); border-radius:6px; padding:2px; }
    .vt { padding:4px 12px; border:none; border-radius:4px; background:transparent; color:var(--dim); font-size:11px; cursor:pointer; font-weight:500; }
    .vt.active { background:var(--accent); color:#fff; }

    /* Scene map */
    .scene-card { position:absolute; width:220px; background:var(--surface); border:2px solid var(--border); border-radius:10px; cursor:move; user-select:none; transition:border-color .15s; }
    .scene-card:hover { border-color:var(--accent); }
    .scene-card.selected { border-color:var(--accent); box-shadow:0 0 0 3px rgba(91,156,245,.2); }
    .scene-card-hdr { padding:10px 14px; font-size:14px; font-weight:700; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:8px; }
    .scene-card-hdr .order { width:24px; height:24px; border-radius:50%; background:var(--accent); color:#fff; font-size:11px; display:flex; align-items:center; justify-content:center; font-weight:700; }
    .scene-card-body { padding:8px 14px; font-size:12px; color:var(--dim); line-height:1.5; }
    .scene-card-body .stat { color:var(--text); font-weight:500; }
    .scene-card-footer { padding:6px 14px 10px; font-size:11px; border-top:1px solid var(--border); }
    .scene-card-footer .next-tag { display:inline-block; padding:2px 8px; border-radius:4px; background:rgba(91,156,245,.15); color:var(--accent); font-size:10px; margin:2px 2px 0 0; }
    .scene-card-footer .cond-tag { background:rgba(245,158,11,.15); color:var(--orange); }
    .scene-card-footer .end-tag { background:rgba(239,68,68,.15); color:var(--red); }

    /* Sidebar */
    .sidebar { width:200px; background:var(--panel); border-right:1px solid var(--border); display:flex; flex-direction:column; flex-shrink:0; }
    .sb-hdr { padding:10px 12px; font-size:11px; font-weight:600; color:var(--dim); letter-spacing:1px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
    .sb-list { flex:1; overflow-y:auto; }
    .sb-item { padding:7px 12px; font-size:12px; cursor:pointer; border-left:3px solid transparent; display:flex; align-items:center; gap:6px; }
    .sb-item:hover { background:var(--surface); }
    .sb-item.active { background:var(--surface); border-left-color:var(--accent); }
    .sb-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
    .sb-dot.msg { background:var(--accent); }
    .sb-dot.choice { background:var(--orange); }
    .sb-dot.wait { background:var(--purple); }
    .sb-dot.end { background:var(--red); }
    .sb-name { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-size:11px; }

    /* Drawflow overrides */
    #drawflow { flex:1; background:var(--bg); }
    .drawflow .connection .main-path { stroke:var(--accent); stroke-width:2; }
    .drawflow .drawflow-node { background:var(--surface); border:1px solid var(--border); border-radius:8px; min-width:180px; color:var(--text); padding:0; }
    .drawflow .drawflow-node.selected { border-color:var(--accent); box-shadow:0 0 0 2px rgba(91,156,245,.3); }
    .drawflow .drawflow-node .input, .drawflow .drawflow-node .output { background:var(--dim); }
    .drawflow .drawflow-node .input:hover, .drawflow .drawflow-node .output:hover { background:var(--accent); }
    .drawflow .drawflow-delete { display:none; }

    /* Node content styles */
    .df-node-header { padding:6px 10px; font-size:11px; font-weight:700; border-bottom:1px solid var(--border); border-radius:7px 7px 0 0; letter-spacing:.5px; }
    .df-node-header.type-msg { background:rgba(91,156,245,.12); color:var(--accent); }
    .df-node-header.type-choice { background:rgba(245,158,11,.12); color:var(--orange); }
    .df-node-header.type-wait { background:rgba(167,139,250,.12); color:var(--purple); }
    .df-node-header.type-end { background:rgba(239,68,68,.12); color:var(--red); }
    .df-node-body { padding:6px 10px; font-size:11px; color:var(--dim); max-height:100px; overflow:hidden; line-height:1.5; }
    .df-node-body .msg-line { color:var(--text); opacity:.8; }
    .df-node-body .choice-line { color:var(--orange); }
    .df-node-body .choice-line.opt { color:var(--dim); font-style:italic; }
    .df-node-body .wait-line { color:var(--purple); }
    .df-node-footer { padding:4px 10px 6px; font-size:10px; color:var(--dim); border-top:1px solid var(--border); }

    /* Props panel */
    .props { width:340px; background:var(--panel); border-left:1px solid var(--border); flex-shrink:0; overflow-y:auto; }
    .props-header { padding:12px 14px; font-size:12px; font-weight:600; color:var(--dim); text-transform:uppercase; letter-spacing:1px; border-bottom:1px solid var(--border); }
    .props-empty { padding:40px 20px; text-align:center; color:var(--dim); font-size:13px; }
    .ps { padding:10px 14px; border-bottom:1px solid var(--border); }
    .ps label { display:block; font-size:11px; color:var(--dim); margin-bottom:4px; }
    .ps input, .ps select, .ps textarea { width:100%; padding:6px 8px; border:1px solid var(--border); border-radius:4px; background:var(--surface); color:var(--text); font-size:12px; font-family:inherit; }
    .ps textarea { min-height:60px; resize:vertical; }
    .mi { padding:5px 8px; margin:3px 0; background:var(--bg); border-radius:4px; font-size:11px; display:flex; gap:6px; align-items:center; }
    .mi .t { color:var(--accent); font-weight:600; width:36px; flex-shrink:0; font-size:10px; }
    .mi .v { flex:1; color:var(--text); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .mi .d { color:var(--red); cursor:pointer; font-size:14px; padding:0 2px; }
    .mi .d:hover { color:#ff6666; }
    .btn-s { padding:4px 10px; border:1px solid var(--border); border-radius:4px; background:var(--surface); color:var(--dim); font-size:11px; cursor:pointer; margin-top:4px; }
    .btn-s:hover { border-color:var(--accent); color:var(--text); }
    .btn-s.red { color:var(--red); } .btn-s.red:hover { border-color:var(--red); }
    .btn-s.green { color:var(--green); } .btn-s.green:hover { border-color:var(--green); }
    .btn-s.blue { color:var(--accent); } .btn-s.blue:hover { border-color:var(--accent); }

    /* Special node styles */
    .drawflow .drawflow-node.scene_start .drawflow_content_node { border:2px solid var(--green); border-radius:8px; }
    .drawflow .drawflow-node.scene_start .df-node-header { background:rgba(74,222,128,.15); color:var(--green); }
    .drawflow .drawflow-node.scene_end .drawflow_content_node { border:2px solid var(--accent); border-radius:8px; }
    .drawflow .drawflow-node.scene_end .df-node-header { background:rgba(91,156,245,.15); color:var(--accent); }

    /* Transition tag in END node */
    .end-transition { padding:3px 6px; margin:2px 0; background:var(--bg); border-radius:3px; font-size:10px; display:flex; align-items:center; gap:4px; }
    .end-transition .cond { color:var(--orange); }
    .end-transition .target { color:var(--accent); }
  </style>
</head>
<body>
  <div class="topbar">
    <h1>Dialogue Editor</h1>
    <select id="storySelect"></select>
    <button onclick="doLoad()">Загрузить</button>
    <span style="color:var(--border);margin:0 4px;">|</span>
    <div class="view-tabs">
      <button class="vt active" id="vtNodes" onclick="switchView('nodes')">Ноды</button>
      <button class="vt" id="vtMap" onclick="switchView('map')">Карта сцен</button>
    </div>
    <span style="font-size:11px;color:var(--dim);margin-left:8px;" id="sceneLabel">Сцена:</span>
    <select id="sceneSelect" onchange="onSceneChange()"><option value="">Все</option></select>
    <div class="spacer"></div>
    <div class="info" id="stats">—</div>
    <button onclick="doLoad(true)" title="Загрузить с сервера (сбросить локальные изменения)">Сброс</button>
    <button onclick="openPreview()" title="Показать выбранную ноду как в игре">Превью</button>
    <button onclick="doExport()">Скачать</button>
    <button onclick="doCopy()" class="primary">Копировать</button>
  </div>
  <!-- Preview modal -->
  <div id="prevBackdrop" class="prev-backdrop" onclick="closePreview(event)">
    <div class="prev-phone" onclick="event.stopPropagation()">
      <div class="prev-hdr">
        <div class="prev-avatar" id="prevAvatar">Z</div>
        <div class="prev-title">
          <div class="prev-name" id="prevName">—</div>
          <div class="prev-sub" id="prevSub">node</div>
        </div>
        <select id="prevLang" onchange="renderPreview()" title="Язык">
          <option value="ru">RU</option>
          <option value="en">EN</option>
        </select>
        <button class="prev-x" onclick="closePreview()">✕</button>
      </div>
      <div class="prev-chat" id="prevChat"></div>
      <div class="prev-bottom" id="prevBottom"></div>
    </div>
  </div>
  <div class="main">
    <div class="sidebar" id="sidebar">
      <div class="sb-hdr">НОДЫ
        <span style="display:flex;gap:3px;">
          <button class="btn-s" onclick="addNewNode()" title="Обычная нода">+</button>
          <button class="btn-s green" onclick="addStartNode()" title="START нода">▶</button>
          <button class="btn-s blue" onclick="addEndNode()" title="END нода">■</button>
        </span>
      </div>
      <div class="sb-list" id="nodeList"></div>
    </div>
    <div id="drawflow"></div>
    <div id="sceneMap" style="display:none;flex:1;position:relative;overflow:hidden;background:var(--bg);">
      <svg id="sceneMapSvg" style="position:absolute;inset:0;width:100%;height:100%;"></svg>
      <div id="sceneMapCards" style="position:absolute;inset:0;"></div>
    </div>
    <div class="props" id="props">
      <div class="props-header">Свойства</div>
      <div class="props-empty" id="propsEmpty">Выбери ноду</div>
      <div id="pc" style="display:none;"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/gh/jerosoler/Drawflow/dist/drawflow.min.js"></script>
  <script>
    let scenario = null;
    let nodeIdMap = {};
    let dfIdMap = {};
    let selectedScenarioNode = null;
    let selectedScene = ''; // '' = all scenes

    const editor = new Drawflow(document.getElementById('drawflow'));
    editor.reroute = true;
    editor.start();

    // ── Load stories ────────────
    let storiesIndex = null;
    async function init() {
      const resp = await fetch('./data/stories.json');
      const data = await resp.json();
      storiesIndex = data;
      const sel = document.getElementById('storySelect');
      data.stories.forEach(s => {
        if (s.scenario) {
          const opt = document.createElement('option');
          opt.value = s.scenario;
          opt.textContent = `${s.name} (${s.id})`;
          sel.appendChild(opt);
        }
      });
      if (data.stories[0]?.scenario) { sel.value = data.stories[0].scenario; await doLoad(); }
    }
    function currentStoryMeta() {
      const path = document.getElementById('storySelect').value;
      return storiesIndex?.stories?.find(s => s.scenario === path) || null;
    }

    async function doLoad(forceServer) {
      const path = document.getElementById('storySelect').value;

      // Try localStorage first
      if (!forceServer) {
        const saved = autoLoad();
        if (saved) {
          scenario = saved;
          migrateToScenes(scenario);
          selectedScene = '';
          populateSceneSelect();
          buildGraph();
          document.getElementById('stats').textContent += ' (localStorage)';
          return;
        }
      }

      const resp = await fetch('./' + path);
      scenario = await resp.json();
      migrateToScenes(scenario);
      selectedScene = '';
      populateSceneSelect();
      buildGraph();
    }

    function migrateToScenes(data) {
      if (data.scenes) return;
      for (const id of Object.keys(data.nodes)) {
        if (!data.nodes[id].scene) data.nodes[id].scene = 'act1';
      }
      data.scenes = [{ id:'act1', name:'Act 1', entry:'start', order:1 }];
    }

    function populateSceneSelect() {
      const sel = document.getElementById('sceneSelect');
      sel.innerHTML = '<option value="">Все сцены</option>';
      if (!scenario || !scenario.scenes) return;
      scenario.scenes.sort((a,b) => (a.order||0) - (b.order||0));
      scenario.scenes.forEach(s => {
        const opt = document.createElement('option');
        opt.value = s.id;
        opt.textContent = `${s.order}. ${s.name}`;
        sel.appendChild(opt);
      });
    }

    function onSceneChange() {
      selectedScene = document.getElementById('sceneSelect').value;
      buildGraph();
    }

    let currentView = 'nodes';

    function switchView(view) {
      currentView = view;
      document.getElementById('vtNodes').classList.toggle('active', view === 'nodes');
      document.getElementById('vtMap').classList.toggle('active', view === 'map');
      document.getElementById('drawflow').style.display = view === 'nodes' ? '' : 'none';
      document.getElementById('sidebar').style.display = view === 'nodes' ? '' : 'none';
      document.getElementById('sceneMap').style.display = view === 'map' ? 'flex' : 'none';
      document.getElementById('sceneLabel').style.display = view === 'nodes' ? '' : 'none';
      document.getElementById('sceneSelect').style.display = view === 'nodes' ? '' : 'none';
      if (view === 'map') renderSceneMap();
    }

    let scenePositions = {};
    let selectedSceneId = null;

    function renderSceneMap() {
      if (!scenario || !scenario.scenes) return;
      const cards = document.getElementById('sceneMapCards');
      const svg = document.getElementById('sceneMapSvg');
      cards.innerHTML = '';
      svg.innerHTML = '';

      const scenes = [...scenario.scenes].sort((a,b) => (a.order||0) - (b.order||0));
      const nodesByScene = {};
      for (const [id, node] of Object.entries(scenario.nodes)) {
        const s = node.scene || '_none';
        if (!nodesByScene[s]) nodesByScene[s] = [];
        nodesByScene[s].push({ id, node });
      }

      // Position scenes in a grid
      const gapY = 220, startX = 80, startY = 40;

      scenes.forEach((scene, idx) => {
        if (!scenePositions[scene.id]) {
          scenePositions[scene.id] = {
            x: startX,
            y: startY + idx * gapY
          };
        }
        const pos = scenePositions[scene.id];
        const nodes = nodesByScene[scene.id] || [];
        const choiceNodes = nodes.filter(n => n.node.choices);
        const endNodes = nodes.filter(n => n.node.sceneEnd);

        // Collect next scenes
        const nextScenes = new Set();
        endNodes.forEach(n => {
          const ns = n.node.nextScene;
          if (typeof ns === 'string') nextScenes.add(ns);
          else if (Array.isArray(ns)) ns.forEach(r => nextScenes.add(r.scene));
        });
        // Also check nodes that link to nodes in other scenes
        nodes.forEach(n => {
          if (n.node.next && scenario.nodes[n.node.next] && scenario.nodes[n.node.next].scene !== scene.id) {
            nextScenes.add(scenario.nodes[n.node.next].scene);
          }
        });

        const card = document.createElement('div');
        card.className = 'scene-card' + (scene.id === selectedSceneId ? ' selected' : '');
        card.dataset.sceneId = scene.id;
        card.style.left = pos.x + 'px';
        card.style.top = pos.y + 'px';

        let footerHTML = '';
        if (nextScenes.size > 0) {
          nextScenes.forEach(ns => {
            const meta = scenario.scenes.find(s => s.id === ns);
            const label = meta ? `→ ${meta.order}. ${meta.name}` : `→ ${ns}`;
            // Check if conditional
            const isCond = endNodes.some(n => Array.isArray(n.node.nextScene));
            footerHTML += `<span class="next-tag${isCond ? ' cond-tag' : ''}">${label}</span>`;
          });
        } else if (endNodes.length > 0) {
          footerHTML = '<span class="next-tag end-tag">КОНЕЦ</span>';
        }

        card.innerHTML = `
          <div class="scene-card-hdr"><span class="order">${scene.order||'?'}</span>${esc(scene.name)}</div>
          <div class="scene-card-body">
            ${scene.description ? `<div style="margin-bottom:4px;">${esc(scene.description)}</div>` : ''}
            <div><span class="stat">${nodes.length}</span> нод, <span class="stat">${choiceNodes.length}</span> выборов</div>
            <div>entry: <span class="stat">${scene.entry || '—'}</span></div>
          </div>
          ${footerHTML ? `<div class="scene-card-footer">${footerHTML}</div>` : ''}
        `;

        // Drag
        card.addEventListener('mousedown', (e) => {
          // Select without re-rendering DOM
          document.querySelectorAll('.scene-card.selected').forEach(c => c.classList.remove('selected'));
          card.classList.add('selected');
          selectedSceneId = scene.id;
          startSceneDrag(e, card, scene.id);
        });

        // Double click to open scene in nodes view
        card.addEventListener('dblclick', () => {
          document.getElementById('sceneSelect').value = scene.id;
          onSceneChange();
          switchView('nodes');
        });

        cards.appendChild(card);
      });

      // Draw connections after DOM renders
      requestAnimationFrame(() => renderSceneMapConnections());
    }

    function startSceneDrag(e, card, sceneId) {
      e.preventDefault();
      const pos = scenePositions[sceneId];
      const sx = e.clientX, sy = e.clientY;
      const ox = pos.x, oy = pos.y;
      let rafId = 0;
      function onMove(ev) {
        pos.x = ox + (ev.clientX - sx);
        pos.y = oy + (ev.clientY - sy);
        card.style.left = pos.x + 'px';
        card.style.top = pos.y + 'px';
        if (!rafId) rafId = requestAnimationFrame(() => { updateConnectionPaths(); rafId = 0; });
      }
      function onUp() {
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
      }
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    }

    // Fast path update — reuses existing SVG elements
    function updateConnectionPaths() {
      const svg = document.getElementById('sceneMapSvg');
      const paths = svg.querySelectorAll('[data-conn]');
      paths.forEach(el => {
        const [from, to] = el.dataset.conn.split('->');
        const a = getCardRect(from), b = getCardRect(to);
        if (!a || !b) return;
        const x1 = a.x + a.w/2, y1 = a.y + a.h;
        const x2 = b.x + b.w/2, y2 = b.y;
        const curve = Math.max(Math.abs(y2-y1)*0.4, 30);
        if (el.tagName === 'path') {
          el.setAttribute('d', `M${x1},${y1} C${x1},${y1+curve} ${x2},${y2-curve} ${x2},${y2}`);
        } else if (el.tagName === 'polygon') {
          el.setAttribute('points', `${x2},${y2} ${x2-6},${y2-10} ${x2+6},${y2-10}`);
        }
      });
    }

    function getCardRect(sceneId) {
      const card = document.querySelector(`.scene-card[data-scene-id="${sceneId}"]`);
      if (!card) return null;
      return { x: parseInt(card.style.left), y: parseInt(card.style.top), w: card.offsetWidth, h: card.offsetHeight };
    }

    function renderSceneMapConnections() {
      const svg = document.getElementById('sceneMapSvg');
      svg.querySelectorAll('path, polygon').forEach(p => p.remove());
      if (!scenario || !scenario.scenes) return;

      // Build scene connections set
      const connections = []; // [{from, to}]
      const nodesByScene = {};
      for (const [id, node] of Object.entries(scenario.nodes)) {
        const s = node.scene || '_none';
        if (!nodesByScene[s]) nodesByScene[s] = [];
        nodesByScene[s].push({ id, node });
      }

      scenario.scenes.forEach(scene => {
        const nodes = nodesByScene[scene.id] || [];
        const targets = new Set();
        nodes.forEach(n => {
          if (n.node.sceneEnd && n.node.nextScene) {
            if (typeof n.node.nextScene === 'string') targets.add(n.node.nextScene);
            else if (Array.isArray(n.node.nextScene)) n.node.nextScene.forEach(r => targets.add(r.scene));
          }
          if (n.node.next && scenario.nodes[n.node.next] && scenario.nodes[n.node.next].scene !== scene.id) {
            targets.add(scenario.nodes[n.node.next].scene);
          }
        });
        targets.forEach(t => connections.push({ from: scene.id, to: t }));
      });

      // Get real card positions and sizes from DOM
      const cards = document.querySelectorAll('.scene-card');
      const cardRects = {};
      cards.forEach(card => {
        const id = card.dataset.sceneId;
        if (id) cardRects[id] = { x: parseInt(card.style.left), y: parseInt(card.style.top), w: card.offsetWidth, h: card.offsetHeight };
      });

      connections.forEach(({ from, to }) => {
        const a = cardRects[from], b = cardRects[to];
        if (!a || !b) return;

        const x1 = a.x + a.w / 2, y1 = a.y + a.h;
        const x2 = b.x + b.w / 2, y2 = b.y;
        const curve = Math.max(Math.abs(y2 - y1) * 0.4, 30);
        const connId = `${from}->${to}`;

        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        path.dataset.conn = connId;
        path.setAttribute('d', `M${x1},${y1} C${x1},${y1+curve} ${x2},${y2-curve} ${x2},${y2}`);
        path.setAttribute('stroke', '#5b9cf5');
        path.setAttribute('stroke-width', '2.5');
        path.setAttribute('fill', 'none');
        path.setAttribute('opacity', '0.6');
        svg.appendChild(path);

        const arrow = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
        arrow.dataset.conn = connId;
        arrow.setAttribute('points', `${x2},${y2} ${x2-6},${y2-10} ${x2+6},${y2-10}`);
        arrow.setAttribute('fill', '#5b9cf5');
        arrow.setAttribute('opacity', '0.6');
        svg.appendChild(arrow);
      });
    }

    function getFilteredNodeIds() {
      if (!scenario) return [];
      const ids = Object.keys(scenario.nodes);
      if (!selectedScene) return ids;
      return ids.filter(id => scenario.nodes[id].scene === selectedScene);
    }

    // ── Build Drawflow graph ────

    function getType(node) {
      if (node.type === 'scene_start') return 'scene_start';
      if (node.type === 'scene_end') return 'scene_end';
      if (node.choices) return 'choice';
      if (node.wait) return 'wait';
      if (!node.next) return 'end';
      return 'msg';
    }

    function nodeHTML(id, node) {
      const type = getType(node);

      // Special START node
      if (type === 'scene_start') {
        return `<div class="df-node-header type-scene_start">▶ START</div><div class="df-node-body">${esc(id)}</div>`;
      }

      // Special END node
      if (type === 'scene_end') {
        let body = '';
        // Default
        const defScene = node.defaultNextScene ? (scenario.scenes?.find(s => s.id === node.defaultNextScene)?.name || node.defaultNextScene) : 'конец';
        body += `<div class="end-transition"><span style="color:var(--dim)">●</span> default → <span class="target">${esc(defScene)}</span></div>`;
        // Transitions
        const tr = node.transitions || [];
        tr.forEach((t, i) => {
          const sceneName = t.nextScene ? (scenario.scenes?.find(s => s.id === t.nextScene)?.name || t.nextScene) : '?';
          body += `<div class="end-transition"><span style="color:var(--orange)">●</span> ${esc(t.choiceTag||'?')} → <span class="target">${esc(sceneName)}</span></div>`;
        });
        return `<div class="df-node-header type-scene_end">■ END SCENE (${1 + tr.length} входов)</div><div class="df-node-body">${body}</div>`;
      }

      // Regular nodes
      const msgs = (node.messages || []).filter(m => m.type === 'text');
      let body = '';
      msgs.slice(0, 3).forEach(m => { body += `<div class="msg-line">${esc(m.text)}</div>`; });
      if (msgs.length > 3) body += `<div>...ещё ${msgs.length - 3}</div>`;
      if (node.choices) {
        node.choices.forEach(c => {
          body += `<div class="choice-line${c.optional ? ' opt' : ''}">${c.optional ? '?' : '▶'} ${esc(c.text.substring(0, 35))}</div>`;
        });
      }
      if (node.wait) { body += `<div class="wait-line">⏱ ${Math.round(node.wait/60)} мин</div>`; }
      let footer = node.next ? `<div class="df-node-footer">→ ${node.next}</div>` : '';
      return `<div class="df-node-header type-${type}">${esc(id)}${type==='end'?' (END)':''}</div><div class="df-node-body">${body||'—'}</div>${footer}`;
    }

    function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

    function buildGraph() {
      editor.clear();
      nodeIdMap = {};
      dfIdMap = {};
      selectedScenarioNode = null;
      document.getElementById('propsEmpty').style.display = '';
      document.getElementById('pc').style.display = 'none';

      if (!scenario) return;
      const filteredIds = getFilteredNodeIds();
      const filteredSet = new Set(filteredIds);

      // Find entry node for BFS
      let entryNode = filteredIds[0];
      if (selectedScene && scenario.scenes) {
        const sceneMeta = scenario.scenes.find(s => s.id === selectedScene);
        if (sceneMeta && sceneMeta.entry && filteredSet.has(sceneMeta.entry)) entryNode = sceneMeta.entry;
      } else if (filteredSet.has('start')) {
        entryNode = 'start';
      }

      // BFS for layout (only within filtered nodes)
      const layers = [];
      const visited = new Set();
      let queue = [entryNode];
      while (queue.length) {
        const layer = [], next = [];
        for (const id of queue) {
          if (visited.has(id) || !filteredSet.has(id)) continue;
          visited.add(id);
          layer.push(id);
          const n = scenario.nodes[id];
          if (n.next && !visited.has(n.next) && filteredSet.has(n.next)) next.push(n.next);
          if (n.choices) n.choices.forEach(c => { if (c.next && !visited.has(c.next) && filteredSet.has(c.next)) next.push(c.next); });
        }
        if (layer.length) layers.push(layer);
        queue = next;
      }
      filteredIds.filter(n => !visited.has(n)).forEach(n => layers.push([n]));

      // Create nodes
      const gapX = 300, gapY = 180, startX = 60, startY = 60;
      layers.forEach((layer, li) => {
        layer.forEach((id, ni) => {
          const node = scenario.nodes[id];
          const outputs = countOutputs(node);
          const html = nodeHTML(id, node);
          const x = startX + li * gapX;
          const y = startY + ni * gapY;
          const inputs = countInputs(node);
          const type = getType(node);
          const cssClass = (type === 'scene_start' || type === 'scene_end') ? type : id;
          const dfId = editor.addNode(id, inputs, outputs, x, y, cssClass, { scenarioId: id }, html);
          nodeIdMap[id] = dfId;
          dfIdMap[dfId] = id;
        });
      });

      // Create connections (only between filtered nodes)
      filteredIds.forEach(id => {
        const node = scenario.nodes[id];
        const fromDf = nodeIdMap[id];
        if (!fromDf) return;
        let outIdx = 1;
        if (node.next && nodeIdMap[node.next]) {
          editor.addConnection(fromDf, nodeIdMap[node.next], `output_${outIdx}`, 'input_1');
          outIdx++;
        }
        if (node.choices) {
          node.choices.filter(c => c.next && nodeIdMap[c.next]).forEach(c => {
            editor.addConnection(fromDf, nodeIdMap[c.next], `output_${outIdx}`, 'input_1');
            outIdx++;
          });
        }
      });

      updateStats();
      renderNodeList();
      autoSave();
    }

    function countOutputs(node) {
      if (node.type === 'scene_end') {
        // END node: outputs = number of transitions (each goes to a different scene)
        const tr = node.transitions || [];
        return Math.max(tr.length + (node.defaultNextScene ? 1 : 0), 1);
      }
      let n = 0;
      if (node.next) n++;
      if (node.choices) n += node.choices.filter(c => c.next).length;
      return Math.max(n, 1);
    }

    function countInputs(node) {
      if (node.type === 'scene_end') {
        // END node: 1 regular input + extra inputs for conditional transitions
        const tr = node.transitions || [];
        return Math.max(1 + tr.length, 1);
      }
      return 1;
    }

    // ── Selection ───────────────

    editor.on('nodeSelected', (dfId) => {
      selectedScenarioNode = dfIdMap[dfId] || null;
      renderProps();
      renderNodeList();
    });

    editor.on('nodeUnselected', () => {
      selectedScenarioNode = null;
      renderProps();
      renderNodeList();
    });

    // Walk up the node chain to find which choice led to this node
    function findChoiceTagForNode(nodeId, outputClass) {
      const node = scenario.nodes[nodeId];
      if (!node) return '';

      // Direct: source is a choice node
      if (node.choices) {
        const outputIdx = parseInt((outputClass || '').replace('output_', '')) - 1;
        let outCount = node.next ? 1 : 0;
        if (outputIdx >= outCount && node.choices[outputIdx - outCount]) {
          return node.choices[outputIdx - outCount].tag || '';
        }
      }

      // Indirect: walk backwards — find who points to this node via choice
      for (const [id, n] of Object.entries(scenario.nodes)) {
        if (n.choices) {
          for (const c of n.choices) {
            if (c.next === nodeId && c.tag) return c.tag;
          }
        }
      }

      // Walk further: check who has `next` pointing here, then check their parent
      for (const [id, n] of Object.entries(scenario.nodes)) {
        if (n.next === nodeId) {
          const tag = findChoiceTagForNode(id, '');
          if (tag) return tag;
        }
      }

      return '';
    }

    // When a connection is created to an END node, auto-detect source
    editor.on('connectionCreated', (conn) => {
      const targetDfId = conn.input_id;
      const sourceDfId = conn.output_id;
      const targetNodeId = dfIdMap[targetDfId];
      const sourceNodeId = dfIdMap[sourceDfId];
      if (!targetNodeId || !sourceNodeId || !scenario) return;

      const targetNode = scenario.nodes[targetNodeId];
      if (targetNode?.type !== 'scene_end') return;

      // Figure out which input port was connected
      const inputIdx = parseInt(conn.input_class.replace('input_', '')) - 1; // 0-based
      if (inputIdx === 0) return; // input_1 = default flow, no transition needed

      const transitionIdx = inputIdx - 1; // transitions[0] = input_2, etc.

      // Try to find choice tag — check source node, or walk up the chain
      let autoTag = '';
      autoTag = findChoiceTagForNode(sourceNodeId, conn.output_class);

      // Update transition
      if (!targetNode.transitions) targetNode.transitions = [];
      while (targetNode.transitions.length <= transitionIdx) {
        targetNode.transitions.push({ choiceTag: '', nextScene: null });
      }
      if (autoTag && !targetNode.transitions[transitionIdx].choiceTag) {
        targetNode.transitions[transitionIdx].choiceTag = autoTag;
      }
      targetNode.transitions[transitionIdx].fromNode = sourceNodeId;

      refreshNode(targetNodeId);
      if (selectedScenarioNode === targetNodeId) renderProps();
    });

    // ── Properties panel ────────

    function renderProps() {
      const empty = document.getElementById('propsEmpty');
      const pc = document.getElementById('pc');
      if (!selectedScenarioNode || !scenario?.nodes[selectedScenarioNode]) {
        empty.style.display = ''; pc.style.display = 'none'; return;
      }
      empty.style.display = 'none'; pc.style.display = '';
      const id = selectedScenarioNode;
      const node = scenario.nodes[id];

      let h = '';
      h += `<div class="ps"><label>ID</label><input value="${esc(id)}" id="pId"></div>`;

      // Special END node panel
      if (node.type === 'scene_end') {
        if (!node.transitions) node.transitions = [];
        const tr = node.transitions;

        h += `<div class="ps" style="background:rgba(91,156,245,.05);"><label style="color:var(--accent);font-weight:600;">■ END SCENE</label>`;

        // Input 1: main flow → default scene
        let defOpts = '<option value="">— конец истории —</option>';
        if (scenario.scenes) scenario.scenes.forEach(s => {
          defOpts += `<option value="${s.id}"${node.defaultNextScene===s.id?' selected':''}>${s.order}. ${s.name}</option>`;
        });
        h += `<div style="margin:8px 0;padding:8px;background:var(--bg);border-radius:6px;border-left:3px solid var(--dim);">`;
        h += `<div style="font-size:11px;color:var(--dim);margin-bottom:4px;">● Вход — основной flow</div>`;
        h += `<label>Default → сцена:</label><select id="pEndDefault">${defOpts}</select>`;
        h += `</div>`;

        // Conditional inputs
        h += `<label style="margin-top:8px;">Развилки (${tr.length})</label>`;
        tr.forEach((t, i) => {
          let scOpts = '<option value="">— выбрать сцену —</option>';
          if (scenario.scenes) scenario.scenes.forEach(s => {
            scOpts += `<option value="${s.id}"${t.nextScene===s.id?' selected':''}>${s.order}. ${s.name}</option>`;
          });
          h += `<div style="margin:6px 0;padding:8px;background:var(--bg);border-radius:6px;border-left:3px solid var(--orange);">`;
          h += `<div style="font-size:11px;color:var(--orange);margin-bottom:4px;display:flex;justify-content:space-between;">● Вход ${i+2} — условие <span class="d" data-action="delTransition" data-idx="${i}" style="cursor:pointer;color:var(--red);">×</span></div>`;
          const tagMissing = !t.choiceTag;
          h += `<label>Choice tag:${tagMissing ? ' <span style="color:var(--red)">⚠ обязательно</span>' : ''}</label><input value="${esc(t.choiceTag||'')}" data-tr-tag="${i}" style="margin-bottom:4px;${tagMissing ? 'border-color:var(--red);' : ''}" placeholder="tag из choice-ноды">`;
          h += `<label>→ Сцена:</label><select data-tr-scene="${i}">${scOpts}</select>`;
          h += `</div>`;
        });

        h += `<button class="btn-s" data-action="addTransition" style="margin-top:6px;">+ Добавить развилку</button>`;
        h += `</div>`;

        h += `<div class="ps"><button class="btn-s red" data-action="delNode">Удалить ноду</button></div>`;
        pc.innerHTML = h;

        // Bind events
        pc.querySelectorAll('[data-action]').forEach(el => {
          el.addEventListener('click', () => {
            const a = el.dataset.action, idx = parseInt(el.dataset.idx);
            if (a === 'delTransition') { tr.splice(idx, 1); buildGraph(); renderProps(); }
            if (a === 'addTransition') { tr.push({ choiceTag: '', nextScene: null }); buildGraph(); renderProps(); }
            if (a === 'delNode') { if(confirm('Удалить?')) { delete scenario.nodes[id]; buildGraph(); } }
          });
        });

        const pEndDefault = document.getElementById('pEndDefault');
        if (pEndDefault) pEndDefault.onchange = () => { node.defaultNextScene = pEndDefault.value || null; refreshNode(id); };

        // Bind transition inputs
        pc.querySelectorAll('[data-tr-tag]').forEach(el => {
          el.onchange = () => { tr[parseInt(el.dataset.trTag)].choiceTag = el.value; refreshNode(id); };
        });
        pc.querySelectorAll('[data-tr-scene]').forEach(el => {
          el.onchange = () => { tr[parseInt(el.dataset.trScene)].nextScene = el.value || null; refreshNode(id); };
        });

        return;
      }

      // Scene selector
      let sceneOpts = '<option value="">— нет —</option>';
      if (scenario.scenes) scenario.scenes.forEach(s => {
        sceneOpts += `<option value="${s.id}"${node.scene===s.id?' selected':''}>${s.order}. ${s.name}</option>`;
      });
      h += `<div class="ps"><label>Сцена</label><select id="pScene">${sceneOpts}</select></div>`;

      h += `<div class="ps"><label>Next →</label><input value="${esc(node.next||'')}" id="pNext"></div>`;

      // Scene end / next scene
      h += `<div class="ps">`;
      h += `<label style="display:flex;align-items:center;gap:6px;cursor:pointer;"><input type="checkbox" id="pSceneEnd" ${node.sceneEnd?'checked':''} style="width:auto;"> Конец сцены (sceneEnd)</label>`;
      if (node.sceneEnd) {
        // nextScene editor
        const ns = node.nextScene;
        let nextSceneOpts = '<option value="">— нет (конец истории) —</option>';
        if (scenario.scenes) scenario.scenes.forEach(s => {
          const sel = (typeof ns === 'string' && ns === s.id) ? ' selected' : '';
          nextSceneOpts += `<option value="${s.id}"${sel}>${s.order}. ${s.name}</option>`;
        });
        h += `<label style="margin-top:6px;">Следующая сцена</label>`;
        h += `<select id="pNextScene">${nextSceneOpts}</select>`;

        // Conditional transitions
        if (Array.isArray(ns)) {
          h += `<div style="margin-top:6px;font-size:11px;color:var(--dim);">Условные переходы:</div>`;
          ns.forEach((rule, ri) => {
            const condStr = rule.if ? JSON.stringify(rule.if) : 'default';
            const sceneName = scenario.scenes?.find(s => s.id === rule.scene)?.name || rule.scene;
            h += `<div class="mi"><span class="t" style="color:var(--orange);width:auto;">${esc(condStr)}</span><span class="v">→ ${esc(sceneName)}</span><span class="d" data-action="delSceneRule" data-idx="${ri}">×</span></div>`;
          });
          h += `<button class="btn-s" data-action="addSceneRule">+ Условие</button>`;
        }
        h += `<div style="margin-top:4px;"><button class="btn-s" data-action="toggleCondMode">${Array.isArray(ns) ? 'Простой режим' : 'Условные переходы'}</button></div>`;
      }
      h += `</div>`;

      // Messages
      h += `<div class="ps"><label>Сообщения (${(node.messages||[]).length})</label>`;
      (node.messages||[]).forEach((m, i) => {
        const typeLabel = m.type === 'typing' ? '⏳' : m.type === 'image' ? '🖼' : m.type === 'voice' ? '🎤' : m.type === 'status' ? '📌' : 'text';
        const valLabel = m.type === 'typing' ? `пауза ${(m.duration||3000)/1000}с` : (m.text||m.alt||m.transcript||'—');
        h += `<div class="mi"><span class="t">${typeLabel}</span><span class="v">${esc(valLabel)}</span><span class="d" data-action="delMsg" data-idx="${i}">×</span></div>`;
      });
      h += `<button class="btn-s" data-action="addMsg">+ Сообщение</button></div>`;

      // Wait
      if (node.wait !== undefined) {
        h += `<div class="ps"><label>Ожидание (сек)</label><input type="number" value="${node.wait}" id="pWait"></div>`;
      }

      // Choices
      if (node.choices) {
        h += `<div class="ps"><label>Выборы (${node.choices.length})</label>`;
        node.choices.forEach((c, i) => {
          const tags = []; if(c.key) tags.push('KEY'); if(c.optional) tags.push('OPT'); if(c.default) tags.push('DEF');
          h += `<div class="mi"><span class="t" style="color:${c.optional?'var(--dim)':'var(--orange)'}">${tags.join(' ')||'—'}</span><span class="v">${esc(c.text)}</span><span class="d" data-action="delChoice" data-idx="${i}">×</span></div>`;
          if (c.flag || c.requires) {
            h += `<div style="margin:0 0 2px 42px;font-size:10px;">`;
            if (c.flag) h += `<span style="color:var(--green);">flag: ${c.flag}</span> `;
            if (c.requires) h += `<span style="color:var(--orange);">requires: ${c.requires}</span>`;
            h += `</div>`;
          }
          if (c.optional && c.response && c.response.length > 0) {
            h += `<div style="margin:0 0 6px 42px;padding:4px 8px;background:var(--bg);border-radius:4px;border-left:2px solid var(--purple);font-size:10px;color:var(--dim);">`;
            h += `<div style="color:var(--purple);margin-bottom:2px;">Ответ (${c.response.length}):</div>`;
            c.response.forEach(r => { h += `<div style="color:var(--text);opacity:.7;">${esc(r.text||'—')}</div>`; });
            h += `</div>`;
          }
        });
        h += `<button class="btn-s" data-action="addChoice">+ Выбор</button></div>`;
      }

      // Wait chat
      if (node.waitChat) {
        h += `<div class="ps"><label>Wait-chat (${node.waitChat.length})</label>`;
        node.waitChat.forEach(wc => {
          h += `<div class="mi"><span class="t" style="color:var(--purple)">Q</span><span class="v">${esc(wc.text)}</span></div>`;
        });
        h += `</div>`;
      }

      h += `<div class="ps"><button class="btn-s red" data-action="delNode">Удалить ноду</button></div>`;
      pc.innerHTML = h;

      // Bind events
      pc.querySelectorAll('[data-action]').forEach(el => {
        el.addEventListener('click', () => {
          const a = el.dataset.action, idx = parseInt(el.dataset.idx);
          if (a === 'delMsg') { node.messages.splice(idx, 1); refreshNode(id); }
          if (a === 'addMsg') { const t = prompt('Текст:'); if(t) { (node.messages=node.messages||[]).push({type:'text',text:t,delay:3000}); refreshNode(id); } }
          if (a === 'delChoice') { node.choices.splice(idx, 1); refreshNode(id); }
          if (a === 'addChoice') { const t = prompt('Текст выбора:'); if(t) { (node.choices=node.choices||[]).push({text:t,next:null,tag:'c_'+Date.now(),key:true}); refreshNode(id); } }
          if (a === 'delNode') { if(confirm('Удалить '+id+'?')) { delete scenario.nodes[id]; buildGraph(); } }
          if (a === 'delSceneRule') { if(Array.isArray(node.nextScene)) { node.nextScene.splice(idx, 1); if(node.nextScene.length===0) node.nextScene=null; renderProps(); } }
          if (a === 'addSceneRule') {
            const sceneId = prompt('ID сцены:');
            const flagStr = prompt('Условие (флаг, или пусто для default):');
            if (sceneId) {
              if (!Array.isArray(node.nextScene)) node.nextScene = [];
              const rule = { scene: sceneId };
              if (flagStr) rule.if = { flags: [flagStr] };
              node.nextScene.push(rule);
              renderProps();
            }
          }
          if (a === 'toggleCondMode') {
            if (Array.isArray(node.nextScene)) {
              // Switch to simple — take first scene
              node.nextScene = node.nextScene[0]?.scene || null;
            } else {
              // Switch to conditional
              const current = node.nextScene;
              node.nextScene = current ? [{ scene: current }] : [];
            }
            renderProps();
          }
        });
      });

      const pNext = document.getElementById('pNext');
      if (pNext) pNext.onchange = () => { node.next = pNext.value || null; refreshNode(id); };

      const pScene = document.getElementById('pScene');
      if (pScene) pScene.onchange = () => { node.scene = pScene.value || null; refreshNode(id); };

      const pSceneEnd = document.getElementById('pSceneEnd');
      if (pSceneEnd) pSceneEnd.onchange = () => {
        node.sceneEnd = pSceneEnd.checked || undefined;
        if (!node.sceneEnd) { delete node.sceneEnd; delete node.nextScene; }
        renderProps(); refreshNode(id);
      };

      const pNextScene = document.getElementById('pNextScene');
      if (pNextScene) pNextScene.onchange = () => {
        if (Array.isArray(node.nextScene)) return; // managed by conditional UI
        node.nextScene = pNextScene.value || null;
        refreshNode(id);
      };

      const pWait = document.getElementById('pWait');
      if (pWait) pWait.onchange = () => { node.wait = parseInt(pWait.value); refreshNode(id); };
    }

    function refreshNode(id) {
      const dfId = nodeIdMap[id];
      if (dfId) {
        const node = scenario.nodes[id];
        editor.drawflow.drawflow.Home.data[dfId].html = nodeHTML(id, node);
        editor.updateNodeDataFromId(dfId, { scenarioId: id });
        // Re-render node content
        const el = document.querySelector(`#node-${dfId} .drawflow_content_node`);
        if (el) el.innerHTML = nodeHTML(id, node);
      }
      renderProps();
      updateStats();
      autoSave();
    }

    // ── Export ───────────────────

    function doExport() {
      const json = JSON.stringify(scenario, null, 2);
      const blob = new Blob([json], { type: 'application/json' });
      const sel = document.getElementById('storySelect');
      const filename = sel.value.split('/').pop() || 'scenario.json';
      const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = filename; a.click();
    }

    function doCopy() {
      navigator.clipboard.writeText(JSON.stringify(scenario, null, 2)).then(() => alert('Скопировано!'));
    }

    // Auto-save to localStorage on every change
    function autoSave() {
      if (!scenario) return;
      const key = 'editor_' + (document.getElementById('storySelect').value || 'default');
      localStorage.setItem(key, JSON.stringify(scenario));
      localStorage.setItem('editor_lastStory', document.getElementById('storySelect').value);
    }

    function autoLoad() {
      const path = document.getElementById('storySelect').value;
      const key = 'editor_' + path;
      const saved = localStorage.getItem(key);
      if (saved) {
        try {
          const data = JSON.parse(saved);
          if (data.nodes && Object.keys(data.nodes).length > 0) return data;
        } catch(e) {}
      }
      return null;
    }

    function renderNodeList() {
      const list = document.getElementById('nodeList');
      list.innerHTML = '';
      if (!scenario) return;
      getFilteredNodeIds().forEach(id => {
        const node = scenario.nodes[id];
        const type = getType(node);
        const item = document.createElement('div');
        item.className = 'sb-item' + (id === selectedScenarioNode ? ' active' : '');
        const icon = type === 'scene_start' ? '▶' : type === 'scene_end' ? '■' : '●';
        const dotClass = type === 'scene_start' ? 'color:var(--green)' : type === 'scene_end' ? 'color:var(--accent)' : '';
        item.innerHTML = `<span style="font-size:10px;flex-shrink:0;${dotClass}">${icon}</span><span class="sb-name">${id}</span>`;
        item.onclick = () => {
          selectedScenarioNode = id;
          // Deselect all nodes first
          document.querySelectorAll('.drawflow-node.selected').forEach(n => n.classList.remove('selected'));
          // Focus node in drawflow
          const dfId = nodeIdMap[id];
          if (dfId) {
            const el = document.querySelector(`#node-${dfId}`);
            if (el) {
              el.classList.add('selected');
              // Pan to node
              const x = editor.drawflow.drawflow.Home.data[dfId].pos_x;
              const y = editor.drawflow.drawflow.Home.data[dfId].pos_y;
              editor.canvas_x = -(x - 400);
              editor.canvas_y = -(y - 200);
              editor.precanvas.style.transform = `translate(${editor.canvas_x}px, ${editor.canvas_y}px) scale(${editor.zoom})`;
            }
          }
          renderProps();
          renderNodeList();
        };
        list.appendChild(item);
      });
    }

    function addNewNode() {
      if (!scenario) return;
      const id = prompt('ID новой ноды:');
      if (!id || scenario.nodes[id]) return;
      scenario.nodes[id] = { messages: [], next: null, scene: selectedScene || undefined };
      buildGraph();
    }

    function addStartNode() {
      if (!scenario) return;
      if (!selectedScene) { alert('Сначала выбери сцену в dropdown'); return; }
      const scene = selectedScene;
      const id = scene + '_start';
      if (scenario.nodes[id]) { alert('START уже есть в этой сцене'); return; }
      scenario.nodes[id] = { type: 'scene_start', next: null, scene: scene };
      const sceneMeta = scenario.scenes?.find(s => s.id === scene);
      if (sceneMeta) sceneMeta.entry = id;
      buildGraph();
    }

    function addEndNode() {
      if (!scenario) return;
      if (!selectedScene) { alert('Сначала выбери сцену в dropdown'); return; }
      const scene = selectedScene;
      const id = scene + '_end';
      if (scenario.nodes[id]) { alert('END уже есть в этой сцене'); return; }
      scenario.nodes[id] = {
        type: 'scene_end',
        scene: scene,
        transitions: [],
        defaultNextScene: null
      };
      buildGraph();
    }

    function updateStats() {
      if (!scenario) return;
      const ids = Object.keys(scenario.nodes);
      const msgs = ids.reduce((s, n) => s + (scenario.nodes[n].messages || []).length, 0);
      const ch = ids.filter(n => scenario.nodes[n].choices).length;
      const w = ids.filter(n => scenario.nodes[n].wait).length;
      document.getElementById('stats').textContent = `${ids.length} нод | ${msgs} сообщ. | ${ch} выборов | ${w} пауз`;
    }

    // ── Preview ────────────
    function L(val, lang) {
      if (!val) return '';
      if (typeof val === 'string') return val;
      return val[lang] || val.en || val.ru || '';
    }
    function escHtml(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
    function openPreview() {
      if (!selectedScenarioNode || !scenario?.nodes[selectedScenarioNode]) {
        alert('Сначала выбери ноду в списке слева');
        return;
      }
      document.getElementById('prevBackdrop').classList.add('open');
      renderPreview();
    }
    function closePreview(e) {
      if (e && e.target !== e.currentTarget) return;
      document.getElementById('prevBackdrop').classList.remove('open');
    }
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closePreview();
    });
    function renderPreview() {
      const id = selectedScenarioNode;
      const node = scenario?.nodes[id];
      if (!node) return;
      const lang = document.getElementById('prevLang').value || 'ru';
      const meta = currentStoryMeta();

      // Header
      const av = document.getElementById('prevAvatar');
      if (meta?.avatarImg) { av.style.backgroundImage = `url(${meta.avatarImg})`; av.textContent = ''; }
      else if (meta?.avatarGradient) { av.style.background = `linear-gradient(135deg, ${meta.avatarGradient.join(', ')})`; av.textContent = meta.avatar || '?'; av.style.backgroundImage = ''; }
      else { av.textContent = meta?.avatar || '?'; }
      document.getElementById('prevName').textContent = L(meta?.name, lang) || 'Unknown';
      document.getElementById('prevSub').textContent = `${id} · scene:${node.scene || '—'}`;

      const chat = document.getElementById('prevChat');
      const bottom = document.getElementById('prevBottom');
      chat.innerHTML = '';
      bottom.innerHTML = '';

      // Special node types
      if (node.type === 'scene_start') {
        chat.innerHTML = `<div class="prev-meta">▶ START сцены <b>${escHtml(node.scene||'')}</b> → ${escHtml(node.next||'?')}</div>`;
        return;
      }
      if (node.type === 'scene_end') {
        chat.innerHTML = `<div class="prev-meta">■ END сцены <b>${escHtml(node.scene||'')}</b></div>`;
        const tr = node.transitions || [];
        for (const t of tr) {
          chat.innerHTML += `<div class="prev-meta">if choice <code>${escHtml(t.choiceTag||'?')}</code> → ${escHtml(t.nextScene||'?')}</div>`;
        }
        if (node.defaultNextScene) chat.innerHTML += `<div class="prev-meta">default → ${escHtml(node.defaultNextScene)}</div>`;
        return;
      }

      // Render messages
      const msgs = node.messages || [];
      if (msgs.length === 0) {
        chat.innerHTML = '<div class="prev-meta">Сообщений нет</div>';
      }
      for (const m of msgs) {
        renderPreviewMsg(chat, m, lang);
      }

      // Bottom panel
      if (node.choices && node.choices.length) {
        const key = node.choices.filter(c => c.key || (!c.optional && c.next));
        const opt = node.choices.filter(c => c.optional);
        for (const c of key) {
          const cls = 'prev-choice' + (c.default ? ' def' : '');
          bottom.innerHTML += `<div class="${cls}">${escHtml(L(c.text, lang))}<span class="tag">${escHtml(c.tag||'')} → ${escHtml(c.next||'?')}</span></div>`;
        }
        for (const c of opt) {
          const req = c.requires ? ` [нужен: ${escHtml(c.requires)}]` : '';
          bottom.innerHTML += `<div class="prev-choice opt">${escHtml(L(c.text, lang))}<span class="tag">${escHtml(c.tag||'')}${req}</span></div>`;
        }
      }
      if (node.wait) {
        const min = Math.round(node.wait / 60);
        bottom.innerHTML += `<div class="prev-wait">⏳ Ожидание ${node.wait}s (~${min} мин) → ${escHtml(node.next||'?')}</div>`;
        if (node.waitChat?.length) {
          bottom.innerHTML += `<div style="font-size:10px;color:#888;margin-top:4px;">Wait-chat вопросов: ${node.waitChat.length}</div>`;
        }
      }
      if (node.next && !node.choices && !node.wait) {
        bottom.innerHTML += `<div class="prev-meta" style="margin:0;">→ next: <code>${escHtml(node.next)}</code></div>`;
      }
      if (!node.next && !node.choices && !node.wait && !node.type) {
        bottom.innerHTML += `<div class="prev-end">Конец ветки (нет next)</div>`;
      }
    }
    function renderPreviewMsg(chat, m, lang) {
      if (m.type === 'status') {
        chat.innerHTML += `<div class="prev-msg status">${escHtml(L(m.text, lang))}</div>`;
      } else if (m.type === 'typing') {
        chat.innerHTML += `<div class="prev-msg typing">печатает… (${m.duration||0}ms)</div>`;
      } else if (m.type === 'image') {
        const src = m.src ? (m.src.startsWith('http') ? m.src : m.src) : '';
        const alt = escHtml(L(m.alt, lang) || 'image');
        const html = src
          ? `<div class="prev-img"><img src="${escHtml(src)}" alt="${alt}" onerror="this.parentElement.innerHTML='<div style=padding:40px;text-align:center;color:#c00;font-size:12px;>🖼 не найдено: ${escHtml(src)}</div>'"><div class="prev-caption">${alt}</div></div>`
          : `<div class="prev-warn">image без src</div>`;
        chat.innerHTML += html;
      } else if (m.type === 'voice') {
        chat.innerHTML += `<div class="prev-voice"><div class="vv">🎤 voice · ${m.duration||'?'}s</div>"${escHtml(L(m.transcript, lang))}"</div>`;
      } else if (m.type === 'update_profile') {
        const nm = L(m.name, lang) || '—';
        chat.innerHTML += `<div class="prev-meta">🪪 update_profile → name: <b>${escHtml(nm)}</b>${m.avatarImg?` · avatar: ${escHtml(m.avatarImg)}`:''}</div>`;
      } else {
        chat.innerHTML += `<div class="prev-msg npc">${escHtml(L(m.text, lang))}</div>`;
      }
    }

    init();
  </script>
</body>
</html>
