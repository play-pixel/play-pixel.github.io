<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width">
  <title>Backrooms: Dialogue Editor</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --bg:#1a1a22; --surface:#222230; --panel:#1e1e2a; --border:#2e2e3e;
      --text:#d0d0dc; --dim:#6a6a7e; --accent:#5b9cf5; --green:#4ade80;
      --red:#ef4444; --orange:#f59e0b; --purple:#a78bfa;
    }
    body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:var(--bg); color:var(--text); height:100vh; display:flex; flex-direction:column; overflow:hidden; }

    /* Top bar */
    .topbar { display:flex; align-items:center; gap:12px; padding:8px 16px; background:var(--panel); border-bottom:1px solid var(--border); flex-shrink:0; z-index:10; }
    .topbar h1 { font-size:14px; font-weight:600; color:var(--accent); flex-shrink:0; }
    .topbar select, .topbar button { padding:6px 12px; border:1px solid var(--border); border-radius:6px; background:var(--surface); color:var(--text); font-size:12px; cursor:pointer; }
    .topbar button:hover { border-color:var(--accent); }
    .topbar button.primary { background:var(--accent); color:#fff; border-color:var(--accent); }
    .topbar .spacer { flex:1; }
    .topbar .info { font-size:11px; color:var(--dim); }

    /* Main layout */
    .main { display:flex; flex:1; overflow:hidden; }

    /* Node list sidebar */
    .sidebar { width:220px; background:var(--panel); border-right:1px solid var(--border); display:flex; flex-direction:column; flex-shrink:0; }
    .sidebar-header { padding:10px 12px; font-size:12px; font-weight:600; color:var(--dim); text-transform:uppercase; letter-spacing:1px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
    .sidebar-header button { padding:2px 8px; font-size:18px; line-height:1; border:1px solid var(--border); border-radius:4px; background:var(--surface); color:var(--green); cursor:pointer; }
    .node-list { flex:1; overflow-y:auto; padding:4px 0; }
    .node-list-item { padding:8px 12px; font-size:12px; cursor:pointer; border-left:3px solid transparent; display:flex; align-items:center; gap:6px; }
    .node-list-item:hover { background:var(--surface); }
    .node-list-item.active { background:var(--surface); border-left-color:var(--accent); }
    .node-list-item .dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
    .node-list-item .dot.msg { background:var(--accent); }
    .node-list-item .dot.choice { background:var(--orange); }
    .node-list-item .dot.wait { background:var(--purple); }
    .node-list-item .dot.end { background:var(--red); }
    .node-list-item .name { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .node-list-item .arrow { color:var(--dim); font-size:10px; }

    /* Canvas area */
    .canvas-wrap { flex:1; position:relative; overflow:hidden; background:var(--bg); }
    .canvas-inner { position:absolute; transform-origin:0 0; }

    /* SVG connections */
    .connections { position:absolute; pointer-events:none; z-index:1; transform-origin:0 0; }

    /* Nodes on canvas */
    .node-card { position:absolute; width:200px; background:var(--surface); border:1px solid var(--border); border-radius:8px; z-index:2; cursor:move; user-select:none; box-shadow:0 2px 8px rgba(0,0,0,.3); }
    .node-card.selected { border-color:var(--accent); box-shadow:0 0 0 2px rgba(91,156,245,.3); }
    .node-card-header { padding:6px 10px; font-size:11px; font-weight:600; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; border-radius:7px 7px 0 0; }
    .node-card-header.msg { background:rgba(91,156,245,.1); color:var(--accent); }
    .node-card-header.choice { background:rgba(245,158,11,.1); color:var(--orange); }
    .node-card-header.wait { background:rgba(167,139,250,.1); color:var(--purple); }
    .node-card-header.end { background:rgba(239,68,68,.1); color:var(--red); }
    .node-card-body { padding:8px 10px; font-size:11px; color:var(--dim); max-height:120px; overflow:hidden; }
    .node-card-body .preview { line-height:1.4; }
    .node-card-body .choice-item { padding:2px 0; color:var(--orange); }
    .node-card-body .choice-item.optional { color:var(--dim); font-style:italic; }
    .node-card-footer { padding:4px 10px 6px; font-size:10px; color:var(--dim); border-top:1px solid var(--border); }

    /* Ports (connection dots) */
    .port { width:10px; height:10px; border-radius:50%; background:var(--dim); border:2px solid var(--surface); position:absolute; cursor:crosshair; z-index:3; }
    .port.out { bottom:-5px; left:50%; transform:translateX(-50%); }
    .port.in { top:-5px; left:50%; transform:translateX(-50%); }
    .port:hover { background:var(--accent); }

    /* Properties panel */
    .props { width:320px; background:var(--panel); border-left:1px solid var(--border); display:flex; flex-direction:column; flex-shrink:0; overflow-y:auto; }
    .props-header { padding:10px 14px; font-size:12px; font-weight:600; color:var(--dim); text-transform:uppercase; letter-spacing:1px; border-bottom:1px solid var(--border); }
    .props-empty { padding:40px 20px; text-align:center; color:var(--dim); font-size:13px; }
    .props-section { padding:10px 14px; border-bottom:1px solid var(--border); }
    .props-section label { display:block; font-size:11px; color:var(--dim); margin-bottom:4px; }
    .props-section input, .props-section select, .props-section textarea { width:100%; padding:6px 8px; border:1px solid var(--border); border-radius:4px; background:var(--surface); color:var(--text); font-size:12px; font-family:inherit; }
    .props-section textarea { min-height:80px; resize:vertical; }
    .props-section .row { display:flex; gap:8px; align-items:center; margin-bottom:6px; }
    .props-section .row input { flex:1; }
    .msg-item { padding:6px 8px; margin:4px 0; background:var(--bg); border-radius:4px; font-size:11px; display:flex; gap:6px; align-items:flex-start; }
    .msg-item .type { color:var(--accent); font-weight:600; width:40px; flex-shrink:0; }
    .msg-item .text { flex:1; color:var(--text); }
    .msg-item .del { color:var(--red); cursor:pointer; font-size:14px; }
    .btn-sm { padding:4px 10px; border:1px solid var(--border); border-radius:4px; background:var(--surface); color:var(--dim); font-size:11px; cursor:pointer; }
    .btn-sm:hover { border-color:var(--accent); color:var(--text); }
    .btn-sm.danger { color:var(--red); }
    .btn-sm.danger:hover { border-color:var(--red); }

    /* Zoom controls */
    .zoom-controls { position:absolute; bottom:16px; right:16px; display:flex; gap:4px; z-index:5; }
    .zoom-controls button { width:32px; height:32px; border:1px solid var(--border); border-radius:6px; background:var(--surface); color:var(--text); font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
    .zoom-controls button:hover { border-color:var(--accent); }
  </style>
</head>
<body>
  <div class="topbar">
    <h1>Dialogue Editor</h1>
    <select id="storySelect"></select>
    <button onclick="loadStory()">Загрузить</button>
    <div class="spacer"></div>
    <div class="info" id="statsInfo">—</div>
    <button onclick="exportJSON()">Экспорт JSON</button>
    <button onclick="copyJSON()" class="primary">Копировать JSON</button>
  </div>

  <div class="main">
    <div class="sidebar">
      <div class="sidebar-header">Ноды <button onclick="addNode()">+</button></div>
      <div class="node-list" id="nodeList"></div>
    </div>

    <div class="canvas-wrap" id="canvasWrap">
      <svg class="connections" id="svgConnections"></svg>
      <div class="canvas-inner" id="canvasInner"></div>
      <div class="zoom-controls">
        <button onclick="zoomIn()">+</button>
        <button onclick="zoomOut()">&minus;</button>
        <button onclick="zoomFit()">&#8862;</button>
        <span id="zoomLabel" style="color:var(--dim);font-size:11px;padding:0 4px;"></span>
      </div>
    </div>

    <div class="props" id="propsPanel">
      <div class="props-header">Свойства</div>
      <div class="props-empty" id="propsEmpty">Выбери ноду для редактирования</div>
      <div id="propsContent" style="display:none;"></div>
    </div>
  </div>

  <script>
    // ══════════════════════════════════
    //  Backrooms Dialogue Node Editor
    // ══════════════════════════════════

    let scenario = null;
    let selectedNode = null;
    let nodePositions = {};

    const NODE_W = 200;
    const NODE_H = 100;

    // Zoom & Pan
    let zoom = 1;
    let panX = 0, panY = 0;
    let isPanning = false, panStartX = 0, panStartY = 0, panOrigX = 0, panOrigY = 0;

    function applyTransform() {
      const inner = document.getElementById('canvasInner');
      const svg = document.getElementById('svgConnections');
      const t = `translate(${panX}px,${panY}px) scale(${zoom})`;
      inner.style.transform = t;
      svg.style.transform = t;
      document.getElementById('zoomLabel').textContent = Math.round(zoom * 100) + '%';
    }

    function zoomIn() { zoom = Math.min(zoom * 1.2, 3); applyTransform(); }
    function zoomOut() { zoom = Math.max(zoom / 1.2, 0.15); applyTransform(); }
    function zoomFit() { autoLayout(); }

    // Mouse wheel zoom
    document.addEventListener('DOMContentLoaded', () => {
      const wrap = document.getElementById('canvasWrap');

      wrap.addEventListener('wheel', (e) => {
        e.preventDefault();
        const rect = wrap.getBoundingClientRect();
        const mx = e.clientX - rect.left;
        const my = e.clientY - rect.top;

        const oldZoom = zoom;
        if (e.deltaY < 0) zoom = Math.min(zoom * 1.1, 3);
        else zoom = Math.max(zoom / 1.1, 0.15);

        // Zoom toward cursor
        panX = mx - (mx - panX) * (zoom / oldZoom);
        panY = my - (my - panY) * (zoom / oldZoom);
        applyTransform();
      }, { passive: false });

      // Pan with middle mouse or alt+drag
      wrap.addEventListener('mousedown', (e) => {
        if (e.target.closest('.node-card') || e.target.closest('.port')) return;
        isPanning = true;
        panStartX = e.clientX;
        panStartY = e.clientY;
        panOrigX = panX;
        panOrigY = panY;
        wrap.style.cursor = 'grabbing';
      });

      document.addEventListener('mousemove', (e) => {
        if (!isPanning) return;
        panX = panOrigX + (e.clientX - panStartX);
        panY = panOrigY + (e.clientY - panStartY);
        applyTransform();
      });

      document.addEventListener('mouseup', () => {
        if (isPanning) {
          isPanning = false;
          document.getElementById('canvasWrap').style.cursor = '';
        }
      });
    });

    // ── Load ────────────────────────

    async function init() {
      const resp = await fetch('./data/stories.json');
      const data = await resp.json();
      const sel = document.getElementById('storySelect');
      data.stories.forEach(s => {
        if (s.scenario) {
          const opt = document.createElement('option');
          opt.value = s.scenario;
          opt.textContent = `${s.name} (${s.id})`;
          sel.appendChild(opt);
        }
      });
      // Auto-load first
      if (data.stories.length > 0 && data.stories[0].scenario) {
        sel.value = data.stories[0].scenario;
        await loadStory();
      }
    }

    async function loadStory() {
      const path = document.getElementById('storySelect').value;
      const resp = await fetch('./' + path);
      scenario = await resp.json();
      selectedNode = null;
      nodePositions = {};
      autoLayout();
      renderAll();
    }

    // ── Auto Layout ─────────────────

    function autoLayout() {
      if (!scenario) return;
      const nodes = Object.keys(scenario.nodes);
      // BFS from 'start'
      const visited = new Set();
      const layers = [];
      let queue = ['start'];
      if (!scenario.nodes['start']) queue = [nodes[0]];

      while (queue.length > 0) {
        const layer = [];
        const next = [];
        for (const id of queue) {
          if (visited.has(id)) continue;
          visited.add(id);
          layer.push(id);
          const node = scenario.nodes[id];
          if (node.next && !visited.has(node.next)) next.push(node.next);
          if (node.choices) {
            node.choices.forEach(c => {
              if (c.next && !visited.has(c.next)) next.push(c.next);
            });
          }
        }
        if (layer.length > 0) layers.push(layer);
        queue = next;
      }

      // Place unvisited nodes
      const unvisited = nodes.filter(n => !visited.has(n));
      if (unvisited.length > 0) layers.push(unvisited);

      // Position
      const startX = 40;
      const startY = 40;
      const gapX = 260;
      const gapY = 140;

      layers.forEach((layer, li) => {
        layer.forEach((id, ni) => {
          nodePositions[id] = {
            x: startX + li * gapX,
            y: startY + ni * gapY
          };
        });
      });

      // Fit to screen
      const wrap = document.getElementById('canvasWrap');
      if (wrap) {
        const allX = Object.values(nodePositions).map(p => p.x);
        const allY = Object.values(nodePositions).map(p => p.y);
        if (allX.length > 0) {
          const maxX = Math.max(...allX) + NODE_W + 40;
          const maxY = Math.max(...allY) + NODE_H + 40;
          const ww = wrap.clientWidth;
          const wh = wrap.clientHeight;
          zoom = Math.min(ww / maxX, wh / maxY, 1);
          zoom = Math.max(zoom, 0.15);
          panX = 20;
          panY = 20;
          applyTransform();
        }
      }

      renderAll();
    }

    // ── Render ──────────────────────

    function renderAll() {
      renderNodeList();
      renderCanvas();
      renderConnections();
      renderProps();
      updateStats();
    }

    function getNodeType(node) {
      if (node.choices) return 'choice';
      if (node.wait) return 'wait';
      if (!node.next) return 'end';
      return 'msg';
    }

    function getNodePreview(node) {
      const msgs = node.messages || [];
      const textMsgs = msgs.filter(m => m.type === 'text');
      if (textMsgs.length > 0) return textMsgs[0].text;
      if (node.choices) return node.choices.length + ' выборов';
      if (node.wait) return 'Ожидание ' + node.wait + 'с';
      return '—';
    }

    function renderNodeList() {
      const list = document.getElementById('nodeList');
      list.innerHTML = '';
      if (!scenario) return;

      Object.keys(scenario.nodes).forEach(id => {
        const node = scenario.nodes[id];
        const type = getNodeType(node);
        const item = document.createElement('div');
        item.className = 'node-list-item' + (id === selectedNode ? ' active' : '');
        item.innerHTML = `<span class="dot ${type}"></span><span class="name">${id}</span>`;
        item.onclick = () => selectNode(id);
        list.appendChild(item);
      });
    }

    function renderCanvas() {
      const inner = document.getElementById('canvasInner');
      // Remove old node cards
      inner.querySelectorAll('.node-card').forEach(el => el.remove());
      if (!scenario) return;

      Object.keys(scenario.nodes).forEach(id => {
        const node = scenario.nodes[id];
        const pos = nodePositions[id] || { x: 0, y: 0 };
        const type = getNodeType(node);

        const card = document.createElement('div');
        card.className = 'node-card' + (id === selectedNode ? ' selected' : '');
        card.style.left = pos.x + 'px';
        card.style.top = pos.y + 'px';
        card.dataset.nodeId = id;

        const msgs = (node.messages || []).filter(m => m.type === 'text');
        let bodyHTML = '';
        if (msgs.length > 0) {
          bodyHTML = msgs.slice(0, 3).map(m => `<div class="preview">${m.text}</div>`).join('');
          if (msgs.length > 3) bodyHTML += `<div class="preview" style="color:var(--dim)">...ещё ${msgs.length - 3}</div>`;
        }
        if (node.choices) {
          bodyHTML += node.choices.map(c =>
            `<div class="choice-item${c.optional ? ' optional' : ''}">${c.optional ? '?' : '▶'} ${c.text.substring(0, 30)}${c.text.length > 30 ? '...' : ''}</div>`
          ).join('');
        }
        if (node.wait) {
          const min = Math.round(node.wait / 60);
          bodyHTML += `<div style="color:var(--purple)">⏱ ${min} мин</div>`;
        }

        card.innerHTML = `
          <div class="node-card-header ${type}">${id}${type === 'end' ? ' (END)' : ''}</div>
          <div class="node-card-body">${bodyHTML || '<em>пусто</em>'}</div>
          ${node.next ? `<div class="node-card-footer">→ ${node.next}</div>` : ''}
          <div class="port in" data-node="${id}" data-dir="in"></div>
          <div class="port out" data-node="${id}" data-dir="out"></div>
        `;

        card.addEventListener('mousedown', (e) => {
          if (e.target.classList.contains('port')) return;
          selectNode(id);
          startDrag(e, card, id);
        });

        inner.appendChild(card);
      });
    }

    function renderConnections() {
      const svg = document.getElementById('svgConnections');
      svg.innerHTML = '';
      if (!scenario) return;

      Object.keys(scenario.nodes).forEach(id => {
        const node = scenario.nodes[id];
        const from = nodePositions[id];
        if (!from) return;

        const targets = [];
        if (node.next) targets.push({ to: node.next, color: '#5b9cf5' });
        if (node.choices) {
          node.choices.forEach(c => {
            if (c.next) targets.push({ to: c.next, color: c.optional ? '#6a6a7e' : '#f59e0b' });
          });
        }

        targets.forEach(({ to, color }) => {
          const toPos = nodePositions[to];
          if (!toPos) return;
          const x1 = from.x + NODE_W / 2;
          const y1 = from.y + NODE_H + 5;
          const x2 = toPos.x + NODE_W / 2;
          const y2 = toPos.y - 5;
          const cy1 = y1 + 40;
          const cy2 = y2 - 40;

          const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
          path.setAttribute('d', `M${x1},${y1} C${x1},${cy1} ${x2},${cy2} ${x2},${y2}`);
          path.setAttribute('stroke', color);
          path.setAttribute('stroke-width', '2');
          path.setAttribute('fill', 'none');
          path.setAttribute('opacity', '0.6');
          svg.appendChild(path);
        });
      });
    }

    // ── Drag ────────────────────────

    function startDrag(e, card, nodeId) {
      e.preventDefault();
      const startX = e.clientX;
      const startY = e.clientY;
      const pos = nodePositions[nodeId];
      const origX = pos.x;
      const origY = pos.y;

      function onMove(ev) {
        pos.x = origX + (ev.clientX - startX);
        pos.y = origY + (ev.clientY - startY);
        card.style.left = pos.x + 'px';
        card.style.top = pos.y + 'px';
        renderConnections();
      }

      function onUp() {
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
      }

      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    }

    // ── Select & Props ──────────────

    function selectNode(id) {
      selectedNode = id;
      renderAll();
      // Scroll node list item into view
      const item = document.querySelector('.node-list-item.active');
      if (item) item.scrollIntoView({ block: 'nearest' });
    }

    function renderProps() {
      const empty = document.getElementById('propsEmpty');
      const content = document.getElementById('propsContent');

      if (!selectedNode || !scenario || !scenario.nodes[selectedNode]) {
        empty.style.display = '';
        content.style.display = 'none';
        return;
      }

      empty.style.display = 'none';
      content.style.display = '';

      const node = scenario.nodes[selectedNode];
      const type = getNodeType(node);

      let html = '';

      // ID
      html += `<div class="props-section">
        <label>ID ноды</label>
        <input value="${selectedNode}" onchange="renameNode('${selectedNode}', this.value)" />
      </div>`;

      // Next
      html += `<div class="props-section">
        <label>Next →</label>
        <input value="${node.next || ''}" onchange="scenario.nodes['${selectedNode}'].next = this.value || null; renderAll();" />
      </div>`;

      // Messages
      html += `<div class="props-section">
        <label>Сообщения (${(node.messages || []).length})</label>`;
      (node.messages || []).forEach((msg, i) => {
        html += `<div class="msg-item">
          <span class="type">${msg.type}</span>
          <span class="text">${msg.text || msg.alt || msg.transcript || '—'}</span>
          <span class="del" onclick="removeMsg('${selectedNode}', ${i})">×</span>
        </div>`;
      });
      html += `<button class="btn-sm" onclick="addMsg('${selectedNode}')">+ Сообщение</button>
      </div>`;

      // Wait
      if (node.wait !== undefined) {
        html += `<div class="props-section">
          <label>Ожидание (секунды)</label>
          <input type="number" value="${node.wait}" onchange="scenario.nodes['${selectedNode}'].wait = parseInt(this.value); renderAll();" />
        </div>`;
      }

      // Choices
      if (node.choices) {
        html += `<div class="props-section">
          <label>Выборы (${node.choices.length})</label>`;
        node.choices.forEach((ch, i) => {
          const tags = [];
          if (ch.key) tags.push('KEY');
          if (ch.optional) tags.push('OPT');
          if (ch.default) tags.push('DEF');
          html += `<div class="msg-item">
            <span class="type" style="color:${ch.optional ? 'var(--dim)' : 'var(--orange)'}">${tags.join(' ')}</span>
            <span class="text">${ch.text.substring(0, 40)}${ch.text.length > 40 ? '...' : ''}</span>
            <span class="del" onclick="removeChoice('${selectedNode}', ${i})">×</span>
          </div>`;
        });
        html += `<button class="btn-sm" onclick="addChoice('${selectedNode}')">+ Выбор</button>
        </div>`;
      }

      // WaitChat
      if (node.waitChat) {
        html += `<div class="props-section">
          <label>Wait-chat вопросы (${node.waitChat.length})</label>`;
        node.waitChat.forEach((wc, i) => {
          html += `<div class="msg-item">
            <span class="type" style="color:var(--purple)">Q</span>
            <span class="text">${wc.text.substring(0, 40)}</span>
          </div>`;
        });
        html += `</div>`;
      }

      // Actions
      html += `<div class="props-section">
        <button class="btn-sm danger" onclick="if(confirm('Удалить ноду ${selectedNode}?')) { delete scenario.nodes['${selectedNode}']; selectedNode=null; renderAll(); }">Удалить ноду</button>
      </div>`;

      content.innerHTML = html;
    }

    // ── Editing ─────────────────────

    function addNode() {
      if (!scenario) return;
      const id = prompt('ID новой ноды:');
      if (!id || scenario.nodes[id]) return;
      scenario.nodes[id] = { messages: [], next: null };
      nodePositions[id] = { x: 100, y: 100 };
      selectNode(id);
    }

    function renameNode(oldId, newId) {
      if (!newId || newId === oldId || scenario.nodes[newId]) return;
      scenario.nodes[newId] = scenario.nodes[oldId];
      delete scenario.nodes[oldId];
      // Update references
      Object.values(scenario.nodes).forEach(n => {
        if (n.next === oldId) n.next = newId;
        if (n.choices) n.choices.forEach(c => { if (c.next === oldId) c.next = newId; });
      });
      nodePositions[newId] = nodePositions[oldId];
      delete nodePositions[oldId];
      selectedNode = newId;
      renderAll();
    }

    function addMsg(nodeId) {
      const text = prompt('Текст сообщения:');
      if (!text) return;
      if (!scenario.nodes[nodeId].messages) scenario.nodes[nodeId].messages = [];
      scenario.nodes[nodeId].messages.push({ type: 'text', text, delay: 3000 });
      renderAll();
    }

    function removeMsg(nodeId, idx) {
      scenario.nodes[nodeId].messages.splice(idx, 1);
      renderAll();
    }

    function addChoice(nodeId) {
      const text = prompt('Текст выбора:');
      if (!text) return;
      if (!scenario.nodes[nodeId].choices) scenario.nodes[nodeId].choices = [];
      scenario.nodes[nodeId].choices.push({ text, next: null, tag: 'new_' + Date.now(), key: true });
      renderAll();
    }

    function removeChoice(nodeId, idx) {
      scenario.nodes[nodeId].choices.splice(idx, 1);
      renderAll();
    }

    // ── Export ───────────────────────

    function exportJSON() {
      const json = JSON.stringify(scenario, null, 2);
      const blob = new Blob([json], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'scenario.json';
      a.click();
    }

    function copyJSON() {
      const json = JSON.stringify(scenario, null, 2);
      navigator.clipboard.writeText(json).then(() => {
        alert('JSON скопирован в буфер обмена');
      });
    }

    // ── Stats ───────────────────────

    function updateStats() {
      if (!scenario) return;
      const nodes = Object.keys(scenario.nodes);
      const choices = nodes.filter(n => scenario.nodes[n].choices).length;
      const waits = nodes.filter(n => scenario.nodes[n].wait).length;
      const msgs = nodes.reduce((sum, n) => sum + (scenario.nodes[n].messages || []).length, 0);
      document.getElementById('statsInfo').textContent =
        `${nodes.length} нод | ${msgs} сообщ. | ${choices} выборов | ${waits} пауз`;
    }

    // ── Init ────────────────────────
    init();
  </script>
</body>
</html>
