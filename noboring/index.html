<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#ff8fc7">
<title>🦄 Мои Задания</title>
<!-- PWA -->
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Задания">
<style>
  :root{
    --pink:#ff8fc7;
    --pink-deep:#ff5fa8;
    --pink-soft:#ffd6ec;
    --purple:#b98cff;
    --lilac:#efe1ff;
    --mint:#9ff0d8;
    --yellow:#ffe27a;
    --cream:#fff6fb;
    --ink:#7a3d68;
    --shadow:0 8px 22px rgba(255,95,168,.25);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;overflow:hidden;}   /* страница не скроллится */
  body{
    font-family:'Comic Sans MS','Segoe UI Rounded','Baloo',system-ui,sans-serif;
    color:var(--ink);
    background:linear-gradient(160deg,#ffe3f3 0%,#f3e2ff 50%,#e2f6ff 100%);
    position:relative;
    -webkit-user-select:none;user-select:none;
    overscroll-behavior:none;
  }

  /* плавающие фоновые штучки */
  .floaty{
    position:fixed;font-size:26px;opacity:.5;pointer-events:none;
    animation:floatUp linear infinite;z-index:0;
  }
  @keyframes floatUp{
    0%{transform:translateY(110vh) rotate(0deg);opacity:0;}
    10%{opacity:.6;}
    90%{opacity:.6;}
    100%{transform:translateY(-15vh) rotate(360deg);opacity:0;}
  }

  .app{
    position:relative;z-index:1;max-width:520px;margin:0 auto;
    height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden;
  }
  /* верхняя панель (заголовок + счёт) — не скроллится */
  .topbar{flex:0 0 auto;text-align:center;padding:10px 14px 6px;}
  /* единственная скроллящаяся область; полоса прокрутки стилизована */
  .content{
    flex:1 1 auto;overflow-y:auto;overflow-x:hidden;padding:0 14px 120px;
    scrollbar-width:thin;scrollbar-color:var(--pink-soft) transparent;
  }
  .content::-webkit-scrollbar{width:8px;}
  .content::-webkit-scrollbar-track{background:transparent;}
  .content::-webkit-scrollbar-thumb{background:var(--pink-soft);border-radius:8px;}
  /* экраны (Задания/Магазин/Настройки) */
  .view{display:none;}
  .view.active{display:block;animation:fade .25s;}
  .view-title{text-align:center;font-size:24px;color:var(--pink-deep);margin:10px 0 12px;}

  /* табы Открытые / Сделанные — прилипают к верху при прокрутке */
  .tabs{
    position:sticky;top:0;z-index:5;display:flex;gap:8px;padding:8px 0 6px;margin:0 0 2px;
    background:rgba(252,233,245,.92);backdrop-filter:blur(6px);
    overflow-x:auto;overflow-y:hidden;scrollbar-width:none;-webkit-overflow-scrolling:touch;
  }
  .tabs::-webkit-scrollbar{display:none;}
  .tab{
    flex:0 0 auto;white-space:nowrap;border:3px solid var(--pink-soft);background:#fff;border-radius:18px;
    padding:10px 14px;font-family:inherit;font-weight:bold;font-size:15px;color:var(--ink);
    cursor:pointer;display:flex;align-items:center;gap:6px;transition:transform .12s;
  }
  .tab:active{transform:scale(.96);}
  .tab.active{border-color:var(--pink);background:var(--pink-soft);color:var(--pink-deep);}
  .tab-count{background:#fff;border-radius:12px;font-size:13px;padding:1px 8px;color:var(--purple);}
  .tab.active .tab-count{color:var(--pink-deep);}

  /* FAB «Новое задание» — поверх списка, над навигацией */
  .fab{
    position:absolute;right:16px;bottom:calc(78px + env(safe-area-inset-bottom));z-index:40;
    width:62px;height:62px;border-radius:50%;border:none;cursor:pointer;
    background:linear-gradient(135deg,var(--pink),var(--purple));color:#fff;font-size:30px;line-height:1;
    box-shadow:0 8px 22px rgba(255,95,168,.5);transition:transform .15s;
  }
  .fab:active{transform:scale(.9);}
  .fab[hidden]{display:none;}

  /* нижняя навигация — фиксирована внизу, не скроллится */
  .bottom-nav{
    flex:0 0 auto;display:flex;background:#fff;border-top:3px solid var(--pink-soft);
    box-shadow:0 -4px 16px rgba(255,95,168,.12);padding-bottom:env(safe-area-inset-bottom);
  }
  .nav-item{
    flex:1;border:none;background:transparent;cursor:pointer;font-family:inherit;
    padding:8px 4px 7px;display:flex;flex-direction:column;align-items:center;gap:2px;
    color:#c98bb3;transition:transform .12s;
  }
  .nav-item:active{transform:scale(.9);}
  .nav-ic{font-size:24px;line-height:1;filter:grayscale(.4);opacity:.65;transition:transform .15s;}
  .nav-lb{font-size:12px;font-weight:bold;}
  .nav-item.active{color:var(--pink-deep);}
  .nav-item.active .nav-ic{filter:none;opacity:1;transform:scale(1.12);}

  header h1{
    margin:0;font-size:30px;line-height:1.1;
    color:#fff;
    /* белая заливка с розовой обводкой по контуру — читается на любом фоне */
    -webkit-text-stroke:3px var(--pink-deep);
    paint-order:stroke fill;
    text-shadow:0 4px 0 #c93283,0 7px 10px rgba(122,61,104,.28);
    animation:titleBounce 3s ease-in-out infinite;
  }
  @keyframes titleBounce{0%,100%{transform:translateY(0) rotate(-1deg);}50%{transform:translateY(-5px) rotate(1deg);}}

  .scorebar{
    display:flex;gap:8px;justify-content:center;margin:12px 0 4px;
  }
  .score-pill{
    background:#fff;border-radius:22px;padding:7px 13px;
    box-shadow:var(--shadow);display:flex;align-items:center;gap:6px;
    font-size:19px;font-weight:bold;border:3px solid var(--pink-soft);
  }
  .score-pill .ic{font-size:24px;animation:wiggle 2.5s ease-in-out infinite;}
  @keyframes wiggle{0%,100%{transform:rotate(-8deg);}50%{transform:rotate(8deg);}}
  .score-pill #stars{color:var(--pink-deep);}
  .score-pill #points{color:var(--purple);}
  .pop{animation:pop .5s cubic-bezier(.3,1.6,.5,1);}
  @keyframes pop{0%{transform:scale(1);}40%{transform:scale(1.5);}100%{transform:scale(1);}}

  /* единорог-маскот: единорог зафиксирован слева, текст справа — длина текста его не двигает */
  .mascot{display:flex;align-items:center;gap:10px;margin:8px 2px 2px;}
  .mascot .uni{flex:0 0 auto;font-size:52px;display:inline-block;animation:hop 2.2s ease-in-out infinite;cursor:pointer;}
  @keyframes hop{0%,100%{transform:translateY(0) scale(1);}30%{transform:translateY(-12px) scale(1.05);}60%{transform:translateY(0) scale(.97);}}
  .speech{
    flex:1;background:#fff;border:3px solid var(--pink-soft);
    border-radius:18px;padding:8px 14px;font-size:15px;text-align:left;
    box-shadow:0 4px 10px rgba(0,0,0,.06);
  }

  /* кнопка добавить */
  .add-btn{
    display:block;width:100%;margin:16px 0 8px;border:none;cursor:pointer;
    background:linear-gradient(135deg,var(--pink),var(--purple));
    color:#fff;font-size:20px;font-weight:bold;font-family:inherit;
    padding:16px;border-radius:24px;box-shadow:var(--shadow);
    transition:transform .15s;
  }
  .add-btn:active{transform:scale(.95);}

  .install-btn{
    display:block;width:100%;margin:0 0 8px;border:none;cursor:pointer;
    background:#fff;border:3px dashed var(--purple);color:var(--purple);
    font-size:17px;font-weight:bold;font-family:inherit;
    padding:13px;border-radius:22px;box-shadow:var(--shadow);
    animation:cardIn .4s;transition:transform .15s;
  }
  .install-btn:active{transform:scale(.95);}
  .install-btn[hidden]{display:none;}

  /* карточка задания */
  .task{
    background:#fff;border-radius:26px;padding:14px;margin:14px 0;
    box-shadow:var(--shadow);border:3px solid var(--pink-soft);
    animation:cardIn .4s cubic-bezier(.3,1.4,.5,1);overflow:hidden;
  }
  @keyframes cardIn{0%{transform:scale(.7) translateY(20px);opacity:0;}100%{transform:scale(1) translateY(0);opacity:1;}}
  .task.removing{animation:cardOut .35s forwards;}
  @keyframes cardOut{to{transform:scale(.6) translateY(-10px);opacity:0;height:0;margin:0;padding:0;}}
  .task.done{background:linear-gradient(135deg,#fff,#f1ffe9);border-color:var(--mint);}

  .task-head{display:flex;align-items:center;gap:8px;}
  .task-emoji{font-size:32px;flex:0 0 auto;animation:wiggle 3s ease-in-out infinite;}
  .task-title{font-size:19px;font-weight:bold;flex:1;word-break:break-word;line-height:1.15;}
  .task.done .task-title{text-decoration:line-through;opacity:.6;}
  .icon-btn{
    border:none;background:var(--lilac);color:var(--purple);font-size:18px;
    width:38px;height:38px;border-radius:50%;cursor:pointer;flex:0 0 auto;
    display:flex;align-items:center;justify-content:center;transition:transform .15s;
  }
  .icon-btn:active{transform:scale(.85) rotate(15deg);}
  .icon-btn.del{background:#ffe0e9;color:var(--pink-deep);}

  /* прогресс */
  .progress-wrap{margin:12px 0 4px;}
  .progress-track{background:var(--lilac);height:16px;border-radius:10px;overflow:hidden;}
  .progress-fill{
    height:100%;width:0%;border-radius:10px;
    background:linear-gradient(90deg,var(--pink),var(--purple),var(--mint));
    background-size:200% 100%;transition:width .5s cubic-bezier(.3,1.3,.5,1);
    animation:shimmer 3.4s ease-in-out infinite alternate;   /* плавно туда-сюда, без резкого стыка */
  }
  @keyframes shimmer{0%{background-position:0% 50%;}100%{background-position:100% 50%;}}
  /* завершённое задание: спокойный статичный бар, не отвлекает */
  .task.done .progress-fill{animation:none;background:var(--mint);}

  /* свёрнутые задания: видны только шапка и прогресс; шаги — по тапу */
  .task.collapsed .subs,.task.collapsed .add-sub{display:none;}
  .task.collapsed .icon-btn.edit{display:none;}   /* карандаш — только когда развёрнуто */
  .task.collapsed .task-head{cursor:pointer;}
  .task.collapsed .progress-wrap{margin-bottom:0;}
  .task:not(.collapsed) .subs{animation:fade .25s;}
  .icon-btn.again{background:#e6fff4;color:#0e9c6e;}
  .progress-label{font-size:13px;text-align:right;margin-top:3px;opacity:.7;}

  /* подзадания */
  .subs{list-style:none;margin:8px 0 0;padding:0;}
  .sub{
    display:flex;align-items:center;gap:10px;padding:10px;margin:7px 0;
    background:var(--cream);border-radius:16px;cursor:pointer;
    border:2px solid transparent;transition:transform .12s,background .2s;
    animation:cardIn .3s;
  }
  .sub:active{transform:scale(.97);}
  .sub.checked{background:#eafff3;border-color:var(--mint);}
  .check{
    width:30px;height:30px;border-radius:50%;flex:0 0 auto;
    border:3px solid var(--pink);display:flex;align-items:center;justify-content:center;
    font-size:18px;color:#fff;transition:transform .2s;
  }
  .sub.checked .check{background:var(--mint);border-color:var(--mint);transform:scale(1);animation:pop .4s;}
  .sub-text{font-size:17px;flex:1;word-break:break-word;}
  .sub.checked .sub-text{text-decoration:line-through;opacity:.55;}
  .sub-del{
    border:none;background:transparent;color:#e3a7c4;font-size:18px;cursor:pointer;
    flex:0 0 auto;padding:4px;
  }
  .add-sub{
    display:flex;gap:6px;margin-top:8px;
  }
  .add-sub input{
    flex:1;border:2px dashed var(--pink);border-radius:14px;padding:9px 12px;
    font-size:15px;font-family:inherit;color:var(--ink);background:var(--cream);outline:none;
  }
  .add-sub input::placeholder{color:#d9a8c6;}
  .add-sub button{
    border:none;background:var(--mint);color:#0e7a59;font-weight:bold;font-size:16px;
    border-radius:14px;padding:0 16px;cursor:pointer;font-family:inherit;transition:transform .15s;
  }
  .add-sub button:active{transform:scale(.9);}

  .empty{
    text-align:center;padding:30px 16px;color:#c98bb3;font-size:18px;
  }
  .empty .big{font-size:60px;display:block;margin-bottom:8px;animation:hop 2s ease-in-out infinite;}

  /* заголовки разделов Открытые / Сделанные */
  .section-title{
    display:flex;align-items:center;gap:8px;margin:22px 4px 2px;
    font-size:20px;font-weight:bold;color:var(--ink);
  }
  .section-title .count{
    background:#fff;border:3px solid var(--pink-soft);border-radius:14px;
    font-size:15px;padding:1px 10px;color:var(--purple);
  }
  .section-title.done-title{color:#0e9c6e;}
  .section-title.done-title .count{border-color:var(--mint);color:#0e9c6e;}
  .done-empty{text-align:center;color:#c4b3d6;font-size:15px;padding:8px 0 0;}

  /* модалка */
  .overlay{
    position:fixed;inset:0;background:rgba(120,60,104,.4);backdrop-filter:blur(3px);
    display:none;align-items:flex-end;justify-content:center;z-index:50;
  }
  .overlay.show{display:flex;animation:fade .25s;}
  @keyframes fade{from{opacity:0;}to{opacity:1;}}
  .sheet{
    background:var(--cream);width:100%;max-width:520px;border-radius:30px 30px 0 0;
    padding:22px 18px 30px;box-shadow:0 -8px 30px rgba(0,0,0,.2);
    animation:slideUp .35s cubic-bezier(.3,1.3,.5,1);
    max-height:90vh;max-height:90dvh;overflow-y:auto;overscroll-behavior:contain;
    scrollbar-width:thin;scrollbar-color:var(--pink-soft) transparent;
  }
  .sheet::-webkit-scrollbar{width:8px;}
  .sheet::-webkit-scrollbar-track{background:transparent;}
  .sheet::-webkit-scrollbar-thumb{background:var(--pink-soft);border-radius:8px;}
  @keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
  .sheet h2{margin:0 0 14px;text-align:center;font-size:24px;color:var(--pink-deep);}
  .sheet label{font-size:15px;font-weight:bold;display:block;margin:10px 0 5px;}
  .sheet input[type=text]{
    width:100%;border:3px solid var(--pink-soft);border-radius:16px;padding:12px;
    font-size:18px;font-family:inherit;color:var(--ink);outline:none;background:#fff;
  }
  .sheet input:focus{border-color:var(--pink);}
  .preset-pick{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px;}
  .preset-pick button{
    border:3px solid var(--pink-soft);background:#fff;border-radius:16px;
    padding:8px 12px;font-size:15px;font-family:inherit;color:var(--ink);
    cursor:pointer;transition:transform .15s;font-weight:bold;
  }
  .preset-pick button:active{transform:scale(.9);}
  .preset-pick button.sel{border-color:var(--pink);background:var(--pink-soft);}
  .emoji-pick{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px;}
  .emoji-pick button{
    font-size:26px;border:3px solid transparent;background:#fff;border-radius:14px;
    width:46px;height:46px;cursor:pointer;transition:transform .15s;
  }
  .emoji-pick button:active{transform:scale(.85);}
  .emoji-pick button.sel{border-color:var(--pink);background:var(--pink-soft);transform:scale(1.1);}
  .sheet-actions{display:flex;gap:10px;margin-top:20px;}
  .sheet-actions button{
    flex:1;border:none;border-radius:18px;padding:14px;font-size:18px;font-weight:bold;
    font-family:inherit;cursor:pointer;transition:transform .15s;
  }
  .sheet-actions .cancel{background:var(--lilac);color:var(--purple);}
  .sheet-actions .ok{background:linear-gradient(135deg,var(--pink),var(--purple));color:#fff;}
  .sheet-actions button:active{transform:scale(.95);}

  /* конфетти */
  #confetti{position:fixed;inset:0;pointer-events:none;z-index:100;}

  /* всплывашка-награда */
  .reward{
    position:fixed;top:40%;left:50%;transform:translate(-50%,-50%) scale(0);
    background:#fff;border:4px solid var(--yellow);border-radius:26px;
    padding:20px 28px;text-align:center;z-index:110;box-shadow:0 12px 40px rgba(0,0,0,.25);
    font-size:20px;font-weight:bold;color:var(--pink-deep);
  }
  .reward.show{animation:rewardPop 1.6s forwards;}
  .reward .big{font-size:54px;display:block;}
  @keyframes rewardPop{
    0%{transform:translate(-50%,-50%) scale(0) rotate(-20deg);}
    20%{transform:translate(-50%,-50%) scale(1.15) rotate(6deg);}
    35%{transform:translate(-50%,-50%) scale(1) rotate(0);}
    80%{transform:translate(-50%,-50%) scale(1) rotate(0);opacity:1;}
    100%{transform:translate(-50%,-60%) scale(.8);opacity:0;}
  }

  /* ===== новые элементы ===== */
  .mute-btn.gear{left:0;right:auto;}

  /* кнопка магазина */
  .shop-btn{
    display:block;width:100%;margin:0 0 8px;border:none;cursor:pointer;
    background:linear-gradient(135deg,#ffd36e,#ff8fc7);
    color:#fff;font-size:18px;font-weight:bold;font-family:inherit;
    padding:14px;border-radius:22px;box-shadow:var(--shadow);transition:transform .15s;
  }
  .shop-btn:active{transform:scale(.95);}

  /* бейджи на карточке: повтор и стрик */
  .task-badges{display:flex;gap:5px;align-items:center;flex:0 0 auto;}
  .badge{
    font-size:13px;font-weight:bold;border-radius:12px;padding:2px 8px;white-space:nowrap;
  }
  .badge.repeat{background:var(--lilac);color:var(--purple);}
  .badge.streak{background:#fff0d6;color:#e8730c;border:2px solid #ffd9a0;}

  /* ручка перетаскивания */
  .drag-handle{
    flex:0 0 auto;cursor:grab;color:#d9a8c6;font-size:22px;line-height:1;
    padding:4px 2px;touch-action:none;user-select:none;
  }
  .drag-handle:active{cursor:grabbing;}
  .task.dragging{box-shadow:0 18px 40px rgba(255,95,168,.45);opacity:.96;}
  .task-placeholder{
    border:3px dashed var(--pink);border-radius:26px;margin:14px 0;
    background:rgba(255,143,199,.08);
  }

  /* переключатель «повторять» */
  .switch-row{
    display:flex;align-items:center;gap:10px;margin-top:14px;font-size:16px;
    background:#fff;border:3px solid var(--pink-soft);border-radius:16px;padding:10px 14px;cursor:pointer;
  }
  .switch-row input{width:22px;height:22px;accent-color:var(--pink-deep);}

  /* выбор повторения: режим + дни недели */
  .repeat-pick{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px;}
  .repeat-pick button{
    flex:1;min-width:96px;border:3px solid var(--pink-soft);background:#fff;border-radius:16px;
    padding:10px 8px;font-family:inherit;font-weight:bold;font-size:14px;color:var(--ink);
    cursor:pointer;transition:transform .15s;
  }
  .repeat-pick button:active{transform:scale(.93);}
  .repeat-pick button.sel{border-color:var(--pink);background:var(--pink-soft);color:var(--pink-deep);}
  .weekday-pick{display:flex;gap:6px;margin-top:8px;}
  .weekday-pick[hidden]{display:none;}
  .weekday-pick button{
    flex:1;border:3px solid var(--pink-soft);background:#fff;border-radius:12px;
    padding:9px 0;font-family:inherit;font-weight:bold;font-size:14px;color:var(--ink);
    cursor:pointer;transition:transform .12s;
  }
  .weekday-pick button:active{transform:scale(.9);}
  .weekday-pick button.sel{border-color:var(--pink);background:var(--pink-soft);color:var(--pink-deep);}

  /* полноэкранный просмотр задания: маскот/табы/список скрыты, шкала ⭐💎 сверху остаётся */
  #viewTasks.detail-mode .mascot,#viewTasks.detail-mode .tabs{display:none;}
  .detail-back{
    border:3px solid var(--pink-soft);background:#fff;color:var(--pink-deep);
    font-family:inherit;font-weight:bold;font-size:16px;border-radius:16px;padding:10px 16px;
    margin:6px 0 4px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;
  }
  .detail-back:active{transform:scale(.95);}
  .task.detail{margin:8px 0;}
  .task.detail .task-title{font-size:22px;}
  .task.detail .task-emoji{font-size:40px;}

  /* магазин */
  .shop-balance{text-align:center;font-size:20px;font-weight:bold;color:var(--purple);margin:0 0 12px;}
  .reward-card{
    display:flex;flex-direction:column;gap:8px;background:#fff;border:3px solid var(--pink-soft);
    border-radius:18px;padding:10px 12px;margin:8px 0;animation:cardIn .3s;
  }
  .reward-top{display:flex;align-items:center;gap:10px;}
  .reward-card .r-emoji{font-size:30px;flex:0 0 auto;}
  .reward-card .r-name{flex:1;font-weight:bold;font-size:16px;word-break:break-word;}
  .reward-card .r-cost{font-size:15px;font-weight:bold;color:var(--purple);white-space:nowrap;}
  .reward-actions{display:flex;gap:8px;align-items:center;}
  .buy-btn{
    flex:1;border:none;border-radius:14px;padding:10px 14px;font-family:inherit;font-weight:bold;font-size:15px;

<script>
//==== данные ====
const STORE_KEY='unicornTasks_v1';
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}

function defaultRewards(){
  return [
    {id:uid(),emoji:'🎮',name:'15 минут игры',cost:90},
    {id:uid(),emoji:'📺',name:'15 минут мультфильма',cost:60},
    {id:uid(),emoji:'🎡',name:'Аттракцион',cost:300},
  ];
}

// приводим любое сохранение/импорт к корректному виду (заполняем недостающие поля)
function normalize(s){
  s=s||{};
  if(!Array.isArray(s.tasks))s.tasks=[];
  s.stars=+s.stars||0; s.points=+s.points||0; s.trophies=+s.trophies||0;
  s.muted=!!s.muted;
  if(typeof s.lastSeenDate!=='string')s.lastSeenDate='';
  if(!Array.isArray(s.rewards))s.rewards=defaultRewards();
  if(!Array.isArray(s.claimed))s.claimed=[];
  s.tasks.forEach(t=>{
    if(typeof t.repeat!=='string'||(t.repeat!=='daily'&&t.repeat!=='weekly'))t.repeat='once';
    if(!Array.isArray(t.days))t.days=[];
    if(typeof t.streak!=='number')t.streak=0;
    if(!('lastDoneDate'in t))t.lastDoneDate=null;
    if(!Array.isArray(t.subs))t.subs=[];
    if(typeof t.awarded!=='boolean')t.awarded=t.subs.length>0&&t.subs.every(x=>x.done);
    t.subs.forEach(x=>{
      if(typeof x.done!=='boolean')x.done=false;
      if(typeof x.awarded!=='boolean')x.awarded=!!x.done;
    });
  });
  return s;
}
function loadState(){
  try{const s=JSON.parse(localStorage.getItem(STORE_KEY));if(s&&s.tasks)return normalize(s);}catch(e){}
  return normalize({});
}
let state=loadState();
function save(){localStorage.setItem(STORE_KEY,JSON.stringify(state));}

//==== даты и ежедневный сброс ====
function todayStr(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function dayDiff(a,b){const da=new Date(a+'T00:00:00'),db=new Date(b+'T00:00:00');return Math.round((db-da)/86400000);}
// сколько дней подряд для отображения 🔥 (0 если стрик прерван)
function streakInfo(t){
  if(t.repeat!=='daily'||!t.lastDoneDate)return 0;
  const d=dayDiff(t.lastDoneDate,todayStr());
  return (d===0||d===1)?(t.streak||0):0;   // сделано сегодня или вчера — стрик жив
}
// при новом дне сбрасываем ежедневные дела, чтобы их можно было выполнить снова
function dailyRollover(){
  const today=todayStr();
  if(state.lastSeenDate===today)return;
  const dow=new Date().getDay();
  state.tasks.forEach(t=>{
    if(t.repeat==='daily'||(t.repeat==='weekly'&&t.days&&t.days.includes(dow))){
      t.subs.forEach(s=>{s.done=false;s.awarded=false;});
      t.awarded=false;
    }
  });
  state.lastSeenDate=today;
  save();
}
dailyRollover();

//==== фон: плавающие штучки ====
const bgIcons=['🌸','⭐','💖','🦄','🌈','✨','🍬','🎀','💎','🌷'];
for(let i=0;i<14;i++){
  const e=document.createElement('div');
  e.className='floaty';e.textContent=bgIcons[i%bgIcons.length];
  e.style.left=Math.random()*100+'vw';
  e.style.animationDuration=(10+Math.random()*12)+'s';
  e.style.animationDelay=(-Math.random()*15)+'s';
  e.style.fontSize=(18+Math.random()*22)+'px';
  document.body.appendChild(e);
}

//==== эмодзи для выбора ====
const EMOJIS=['🧹','🧺','🛏️','🪥','🛁','🍽️','📚','✏️','🌱','🐶','🧸','👗','🎨','🎒','💧','🍎','🧼','🗑️','📦','🎹'];
let pickedEmoji=EMOJIS[0];
let editingId=null;

const emojiPick=document.getElementById('emojiPick');
EMOJIS.forEach(em=>{
  const b=document.createElement('button');b.textContent=em;
  b.onclick=()=>{pickedEmoji=em;[...emojiPick.children].forEach(c=>c.classList.remove('sel'));b.classList.add('sel');};
  emojiPick.appendChild(b);
});

//==== типовые (готовые) дела ====
const PRESETS=[
  {name:'Уборка в комнате',emoji:'🧹',subs:['Убрать игрушки','Застелить кровать','Протереть пыль','Пропылесосить']},
  {name:'Уроки',emoji:'📚',daily:true,subs:['Математика','Чтение','Письмо','Проверить дневник']},
  {name:'Принять ванну',emoji:'🛁',subs:['Намочить волосы','Помыть голову','Помыться','Вытереться насухо']},
  {name:'Почистить зубы',emoji:'🪥',daily:true,subs:['Щётка с пастой','Чистить 2 минуты','Прополоскать рот']},
  {name:'Накрыть на стол',emoji:'🍽️',daily:true,subs:['Тарелки','Вилки и ложки','Салфетки']},
  {name:'Покормить питомца',emoji:'🐶',daily:true,subs:['Насыпать корм','Налить свежей воды']},
  {name:'Собрать рюкзак',emoji:'🎒',daily:true,subs:['Учебники','Тетради','Пенал','Форма для физкультуры']},
  {name:'Полить цветы',emoji:'🌱',subs:['Проверить землю','Полить водой']},
  {name:'Заправить кровать',emoji:'🛏️',daily:true,subs:['Расправить простыню','Поправить подушку','Накрыть покрывалом']},
  {name:'Помочь на кухне',emoji:'🍎',subs:['Помыть фрукты','Убрать со стола','Помыть посуду']},
];
let pendingSubs=[];   // подзадачи выбранного готового дела (добавятся при сохранении нового дела)
const presetPick=document.getElementById('presetPick');
PRESETS.forEach(p=>{
  const b=document.createElement('button');b.textContent=p.emoji+' '+p.name;
  b.onclick=()=>{
    sfxClick();
    taskName.value=p.name;
    pickEmoji(p.emoji);
    pendingSubs=p.subs.slice();
    pickedDays.clear();setRepeat(p.daily?'daily':'once');renderDays();   // авто-режим для ежедневных
    [...presetPick.children].forEach(c=>c.classList.remove('sel'));
    b.classList.add('sel');
  };
  presetPick.appendChild(b);
});

//==== фразы маскота ====
const cheers=['Ты супер! 🌟','Молодец! 💖','Так держать! 🦄','Ура! Получилось! 🎉','Я тобой горжусь! 🌈','Ещё чуть-чуть! 💪','Какая умничка! ✨'];
const idle=['Привет! Давай выполнять задания! 💕','Нажми на квадратик, когда сделаешь! ✅','Ты сегодня большая молодец! 🌸','Каждая звёздочка — твоя! ⭐'];
function speak(txt){document.getElementById('speech').textContent=txt;}
function cheer(){speak(cheers[Math.floor(Math.random()*cheers.length)]);}

document.getElementById('uni').onclick=()=>{
  speak(idle[Math.floor(Math.random()*idle.length)]);
  burstAt(window.innerWidth/2,window.innerHeight*0.3,16);
  sfxSparkle();
};

//==== рендер ====
const list=document.getElementById('list');
function isDone(t){return t.subs.length>0&&t.subs.every(s=>s.done);}

let taskTab='open';     // активная вкладка: open (открытые) | daily (режим дня) | done (закрытые)
let currentView='tasks';// активный экран нижней навигации
let detailId=null;      // id задания, открытого на весь экран (null — список)
const DOW_SHORT=['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];
function daysLabel(days){
  if(!days||!days.length)return 'по дням';
  return [1,2,3,4,5,6,0].filter(d=>days.includes(d)).map(d=>DOW_SHORT[d]).join(' ');
}
function render(){
  document.getElementById('stars').textContent=state.stars;
  document.getElementById('points').textContent=state.points;
  const once=state.tasks.filter(t=>t.repeat==='once');
  const recurring=state.tasks.filter(t=>t.repeat==='daily'||t.repeat==='weekly');
  const open=once.filter(t=>!isDone(t));
  const done=once.filter(t=>isDone(t));
  document.getElementById('cntOpen').textContent=open.length;
  document.getElementById('cntDaily').textContent=recurring.length;
  document.getElementById('cntDone').textContent=done.length;

  const viewTasks=document.getElementById('viewTasks');
  // полноэкранный просмотр одного задания
  if(detailId){
    const t=state.tasks.find(x=>x.id===detailId);
    if(t){
      viewTasks.classList.add('detail-mode');updateFab();
      list.innerHTML='';
      const back=document.createElement('button');back.className='detail-back';back.textContent='← Назад';back.onclick=closeDetail;
      list.appendChild(back);
      list.appendChild(taskCard(t,true));
      return;
    }
    detailId=null;   // задание удалили — выходим из просмотра
  }
  viewTasks.classList.remove('detail-mode');updateFab();
  const tabsEl=document.getElementById('taskTabs');     // подсветка вкладки всегда по taskTab
  [...tabsEl.querySelectorAll('.tab')].forEach(tb=>tb.classList.toggle('active',tb.dataset.tab===taskTab));
  const actTab=tabsEl.querySelector('.tab.active');if(actTab)actTab.scrollIntoView({inline:'nearest',block:'nearest'});

  list.innerHTML='';
  if(state.tasks.length===0){
    list.innerHTML='<div class="empty"><span class="big">🦄</span>Пока нет заданий!<br>Нажми «➕» внизу справа 💕</div>';
    return;
  }
  const shown=taskTab==='open'?open:taskTab==='daily'?recurring:done;
  if(shown.length===0){
    const e=document.createElement('div');e.className='empty';
    e.innerHTML=taskTab==='open'?'<span class="big">🌈</span>Открытых заданий нет 💖'
      :taskTab==='daily'?'<span class="big">🗓️</span>Дел на каждый день пока нет'
      :'<span class="big">💪</span>Пока пусто —<br>выполни задание целиком';
    list.appendChild(e);
  }else{
    shown.forEach(t=>list.appendChild(taskCard(t)));
  }
}
function updateFab(){fab.hidden=!(currentView==='tasks'&&!detailId);}

//==== вкладки Открытые / Режим дня / Закрытые ====
function setTab(name){
  taskTab=name;
  [...document.querySelectorAll('#taskTabs .tab')].forEach(t=>t.classList.toggle('active',t.dataset.tab===name));
  const act=document.querySelector('#taskTabs .tab.active');
  if(act)act.scrollIntoView({inline:'center',block:'nearest'});   // активная вкладка всегда видна
  document.querySelector('.content').scrollTop=0;
  render();
}
document.getElementById('taskTabs').addEventListener('click',(e)=>{
  const b=e.target.closest('.tab');if(!b||b.dataset.tab===taskTab)return;
  sfxClick();setTab(b.dataset.tab);
});
// перетаскивание ленты вкладок мышью (палец скроллит нативно)
(function(){
  const el=document.getElementById('taskTabs');
  let down=false,moved=false,startX=0,startScroll=0;
  el.addEventListener('pointerdown',(e)=>{
    if(e.pointerType!=='mouse')return;
    down=true;moved=false;startX=e.clientX;startScroll=el.scrollLeft;
  });
  el.addEventListener('pointermove',(e)=>{
    if(!down)return;
    const dx=e.clientX-startX;
    if(!moved&&Math.abs(dx)>5){moved=true;try{el.setPointerCapture(e.pointerId);}catch(_){}}
    if(moved){el.scrollLeft=startScroll-dx;e.preventDefault();}
  });
  const end=()=>{down=false;};
  el.addEventListener('pointerup',end);
  el.addEventListener('pointercancel',end);
  el.addEventListener('lostpointercapture',end);
  el.addEventListener('click',(e)=>{if(moved){e.stopPropagation();e.preventDefault();moved=false;}},true);  // после протяжки не переключаем вкладку
})();

//==== полноэкранный просмотр задания (по тапу) ====
function openDetail(id){detailId=id;sfxClick();document.querySelector('.content').scrollTop=0;render();}
function closeDetail(){detailId=null;document.querySelector('.content').scrollTop=0;render();}

//==== сделать копию закрытого задания заново в «Открытые» ====
function recreateTask(id){
  const t=state.tasks.find(x=>x.id===id);if(!t)return;
  const nid=uid();
  state.tasks.unshift({id:nid,name:t.name,emoji:t.emoji,repeat:'once',days:[],streak:0,lastDoneDate:null,awarded:false,
    subs:t.subs.map(s=>({id:uid(),text:s.text,done:false,awarded:false}))});
  save();sfxPop();speak('Задание создано заново! 💪');
  taskTab='open';openDetail(nid);
}

//==== нижняя навигация: переключение экранов ====
const fab=document.getElementById('openAdd');
function switchView(name){
  currentView=name;
  detailId=null;                               // выходим из полноэкранного просмотра
  const id='view'+name.charAt(0).toUpperCase()+name.slice(1);
  document.querySelectorAll('.view').forEach(v=>v.classList.toggle('active',v.id===id));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.toggle('active',n.dataset.view===name));
  document.getElementById('viewTasks').classList.remove('detail-mode');
  updateFab();
  document.querySelector('.content').scrollTop=0;
  if(name==='tasks')render();
  if(name==='shop')renderShop();
  if(name==='settings'){renderSettingsStats();renderMute();}
}
document.querySelector('.bottom-nav').addEventListener('click',(e)=>{
  const b=e.target.closest('.nav-item');if(!b)return;
  sfxClick();switchView(b.dataset.view);
});

function taskCard(t,detail){
  const total=t.subs.length;
  const done=t.subs.filter(s=>s.done).length;
  const pct=total?Math.round(done/total*100):0;
  const allDone=total>0&&done===total;
  const streak=streakInfo(t);

  const card=document.createElement('div');
  card.className='task'+(allDone?' done':'')+(detail?' detail':' collapsed');
  card.dataset.id=t.id;

  // шапка
  const head=document.createElement('div');head.className='task-head';
  let handle=null;
  if(!detail){handle=document.createElement('span');handle.className='drag-handle';handle.textContent='⠿';handle.title='Перетащи, чтобы поменять порядок';}
  const emoji=document.createElement('span');emoji.className='task-emoji';emoji.textContent=t.emoji;
  const title=document.createElement('span');title.className='task-title';title.textContent=t.name;
  const edit=document.createElement('button');edit.className='icon-btn edit';edit.textContent='✏️';edit.onclick=(e)=>{e.stopPropagation();openEdit(t.id);};
  const del=document.createElement('button');del.className='icon-btn del';del.textContent='🗑️';del.onclick=(e)=>{e.stopPropagation();removeTask(t.id,card);};
  if(handle)head.append(handle);
  head.append(emoji,title);
  if(allDone&&t.repeat==='once'){     // в «Закрытых» — сделать копию задания заново в «Открытые»
    const again=document.createElement('button');again.className='icon-btn again';again.textContent='🔄';again.title='Сделать снова';
    again.onclick=(e)=>{e.stopPropagation();recreateTask(t.id);};
    head.append(again);
  }
  head.append(edit,del);
  if(!detail)head.onclick=(e)=>{if(e.target.closest('.icon-btn')||e.target.closest('.drag-handle'))return;openDetail(t.id);};
  card.appendChild(head);
  if(!detail)attachDrag(card,handle);

  // бейджи: повтор + стрик
  if(t.repeat!=='once'||streak>0){
    const b=document.createElement('div');b.className='task-badges';b.style.marginTop='8px';
    if(t.repeat==='daily'){const r=document.createElement('span');r.className='badge repeat';r.textContent='🔁 каждый день';b.appendChild(r);}
    else if(t.repeat==='weekly'){const r=document.createElement('span');r.className='badge repeat';r.textContent='🔁 '+daysLabel(t.days);b.appendChild(r);}
    if(streak>0){const sx=document.createElement('span');sx.className='badge streak';sx.textContent='🔥 '+streak+(streak%10===1&&streak%100!==11?' день':' дн.');b.appendChild(sx);}
    card.appendChild(b);
  }

  // прогресс
  const pw=document.createElement('div');pw.className='progress-wrap';
  pw.innerHTML=`<div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="progress-label">${done} из ${total} ${allDone?'— Готово! 🎉':''}</div>`;
  card.appendChild(pw);

  // подзадания
  const ul=document.createElement('ul');ul.className='subs';
  t.subs.forEach(s=>{
    const li=document.createElement('li');li.className='sub'+(s.done?' checked':'');
    const ck=document.createElement('span');ck.className='check';ck.textContent=s.done?'✓':'';
    const tx=document.createElement('span');tx.className='sub-text';tx.textContent=s.text;
    const sd=document.createElement('button');sd.className='sub-del';sd.textContent='✕';
    li.append(ck,tx,sd);
    li.onclick=(e)=>{if(e.target.closest('.sub-del'))return;toggleSub(t.id,s.id,li);};
    sd.onclick=(e)=>{e.stopPropagation();removeSub(t.id,s.id);};
    ul.appendChild(li);
  });
  card.appendChild(ul);

  // добавить подзадание
  const as=document.createElement('div');as.className='add-sub';
  const inp=document.createElement('input');inp.type='text';inp.placeholder='Добавить шаг...';inp.maxLength=50;
  const ab=document.createElement('button');ab.textContent='＋';
  const doAdd=()=>{const v=inp.value.trim();if(!v)return;addSub(t.id,v);inp.value='';};
  ab.onclick=doAdd;
  inp.onkeydown=(e)=>{if(e.key==='Enter')doAdd();};
  as.appendChild(inp);as.appendChild(ab);
  card.appendChild(as);

  return card;
}

function esc(s){return s.replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

//==== действия ====
function toggleSub(taskId,subId,li){
  const t=state.tasks.find(x=>x.id===taskId);if(!t)return;
  const s=t.subs.find(x=>x.id===subId);if(!s)return;
  const wasAllDone=t.subs.length>0&&t.subs.every(x=>x.done);
  s.done=!s.done;
  if(s.done){
    cheer();sfxPop();burstAtEl(li,10);
    if(!s.awarded){              // награда только за ПЕРВОЕ выполнение шага (защита от накрутки)
      s.awarded=true;
      state.stars+=1;            // ⭐ за шаг — валюта на виртуальные покупки (одевалка)
      bumpScore('stars');
    }
  }
  const nowAllDone=t.subs.length>0&&t.subs.every(x=>x.done);
  save();render();
  if(nowAllDone&&!wasAllDone){
    if(!t.awarded){             // кубок и крупные очки — только за первое полное выполнение (в этот день)
      t.awarded=true;
      state.trophies+=1;state.points+=50;   // 🏆 счётчик за кадром (в настройках), 💎 алмазы → магазин реальных призов
      // стрик для ежедневных дел — обновляем один раз в день
      if(t.repeat==='daily'){
        const today=todayStr();
        if(t.lastDoneDate!==today){
          t.streak=(t.lastDoneDate&&dayDiff(t.lastDoneDate,today)===1)?(t.streak||0)+1:1;
          t.lastDoneDate=today;
        }
      }
      save();
      bumpScore('points');
      render();
    }
    bigCelebrate(t.name);
  }
}

//==== звуки (Web Audio — генерируются в коде, без файлов) ====
let actx=null;
function audio(){
  if(!actx){try{actx=new (window.AudioContext||window.webkitAudioContext)();}catch(e){}}
  if(actx&&actx.state==='suspended')actx.resume();
  return actx;
}
// одна нота с мягкой атакой и затуханием
function tone(freq,start,dur,type,vol){
  const a=audio();if(!a)return;
  const t0=a.currentTime+start;
  const osc=a.createOscillator();
  const g=a.createGain();
  osc.type=type||'sine';
  osc.frequency.setValueAtTime(freq,t0);
  g.gain.setValueAtTime(0,t0);
  g.gain.linearRampToValueAtTime(vol||.25,t0+0.012);          // быстрый удар = «сочно»
  g.gain.exponentialRampToValueAtTime(0.0001,t0+dur);          // плавный хвост
  osc.connect(g);g.connect(a.destination);
  osc.start(t0);osc.stop(t0+dur+0.02);
}
// нота со скольжением вверх (звонкий «поп»)
function blip(f1,f2,start,dur,vol){
  const a=audio();if(!a)return;
  const t0=a.currentTime+start;
  const osc=a.createOscillator();const g=a.createGain();
  osc.type='triangle';
  osc.frequency.setValueAtTime(f1,t0);
  osc.frequency.exponentialRampToValueAtTime(f2,t0+dur*0.8);
  g.gain.setValueAtTime(0,t0);
  g.gain.linearRampToValueAtTime(vol||.3,t0+0.01);
  g.gain.exponentialRampToValueAtTime(0.0001,t0+dur);
  osc.connect(g);g.connect(a.destination);
  osc.start(t0);osc.stop(t0+dur+0.02);
}
function canPlay(){return !state.muted;}

// галочка на шаге — звонкий весёлый «дзынь-поп»
function sfxPop(){
  if(!canPlay())return;
  blip(520,880,0,0.16,.32);
  tone(1320,0.05,0.18,'sine',.18);
}
// большое задание выполнено — радостное арпеджио + финальный аккорд
function sfxWin(){
  if(!canPlay())return;
  const notes=[523.25,659.25,783.99,1046.5];        // до-ми-соль-до (мажор)
  notes.forEach((f,i)=>tone(f,i*0.1,0.32,'triangle',.28));
  // искристые верхушки
  [1568,2093].forEach((f,i)=>tone(f,0.42+i*0.06,0.4,'sine',.16));
  // тёплый финальный аккорд
  [523.25,659.25,783.99].forEach(f=>tone(f,0.46,0.6,'sine',.14));
}

//==== конфетти ====
const cv=document.getElementById('confetti');
const ctx=cv.getContext('2d');
let parts=[];
const MAX_PARTS=200;            // потолок частиц — без него праздник может «завалить» кадр
function sizeCanvas(){cv.width=innerWidth;cv.height=innerHeight;}
sizeCanvas();addEventListener('resize',sizeCanvas);
const colors=['#ff8fc7','#b98cff','#9ff0d8','#ffe27a','#ff5fa8','#ffffff'];
const shapes=['🌸','⭐','💖','✨','🎀','🦄'];

// Один раз заранее рисуем каждый эмодзи в маленький canvas-спрайт.
// В анимации копируем готовый спрайт через drawImage — это намного дешевле,
// чем растеризовать эмодзи-глиф (fillText) для каждой частицы на каждом кадре.
const SPRITE=72;
const spriteCache={};
function buildSprites(){
  shapes.forEach(em=>{
    const c=document.createElement('canvas');c.width=c.height=SPRITE;
    const g=c.getContext('2d');
    g.font=(SPRITE*0.8)+'px serif';g.textAlign='center';g.textBaseline='middle';
    g.fillText(em,SPRITE/2,SPRITE/2+SPRITE*0.05);
    spriteCache[em]=c;
  });
}
buildSprites();

function burstAt(x,y,n){
  for(let i=0;i<n&&parts.length<MAX_PARTS;i++){
    parts.push({
      x,y,
      vx:(Math.random()-.5)*9,
      vy:-Math.random()*9-3,
      g:.28,
      life:90+Math.random()*40,
      size:14+Math.random()*16,
      sprite:Math.random()<.6?spriteCache[shapes[Math.floor(Math.random()*shapes.length)]]:null,
      color:colors[Math.floor(Math.random()*colors.length)],
      rot:Math.random()*6,vr:(Math.random()-.5)*.3
    });
  }
  if(!running)loop();
}
function burstAtEl(el,n){
  const r=el.getBoundingClientRect();
  burstAt(r.left+r.width/2,r.top+r.height/2,n);
}
let running=false;
function loop(){
  running=true;
  ctx.clearRect(0,0,cv.width,cv.height);
  for(let i=0;i<parts.length;i++){
    const p=parts[i];
    p.vy+=p.g;p.x+=p.vx;p.y+=p.vy;p.life--;p.rot+=p.vr;
    ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot);
    ctx.globalAlpha=p.life<40?Math.max(0,p.life/40):1;
    if(p.sprite){ctx.drawImage(p.sprite,-p.size/2,-p.size/2,p.size,p.size);}
    else{ctx.fillStyle=p.color;ctx.fillRect(-p.size/2,-p.size/2,p.size,p.size*.6);}
    ctx.restore();
  }
  parts=parts.filter(p=>p.life>0&&p.y<cv.height+40);
  if(parts.length){requestAnimationFrame(loop);}else{ctx.clearRect(0,0,cv.width,cv.height);running=false;}
}

//==== перетаскивание заданий (зажать ручку ⠿ и двигать) ====
let drag=null;
function attachDrag(card,handle){
  handle.addEventListener('pointerdown',(e)=>{
    e.preventDefault();
    const rect=card.getBoundingClientRect();
    const ph=document.createElement('div');ph.className='task-placeholder';ph.style.height=rect.height+'px';
    card.parentNode.insertBefore(ph,card.nextSibling);
    card.classList.add('dragging');
    Object.assign(card.style,{position:'fixed',left:rect.left+'px',top:rect.top+'px',width:rect.width+'px',margin:'0',zIndex:'200',pointerEvents:'none'});
    drag={card,ph,offsetY:e.clientY-rect.top};
    sfxClick();
    window.addEventListener('pointermove',onDragMove);
    window.addEventListener('pointerup',onDragEnd,{once:true});
  });
}
function onDragMove(e){
  if(!drag)return;
  drag.card.style.top=(e.clientY-drag.offsetY)+'px';
  const others=[...list.querySelectorAll('.task:not(.dragging)')];
  let target=null;
  for(const c of others){const r=c.getBoundingClientRect();if(e.clientY<r.top+r.height/2){target=c;break;}}
  if(target)list.insertBefore(drag.ph,target);else list.appendChild(drag.ph);
}
function onDragEnd(){
  window.removeEventListener('pointermove',onDragMove);
  if(!drag)return;
  const {card,ph}=drag;
  list.insertBefore(card,ph);ph.remove();
  card.classList.remove('dragging');
  ['position','left','top','width','margin','zIndex','pointerEvents','transform'].forEach(p=>card.style[p]='');
  drag=null;
  // переупорядочиваем только видимые карточки (текущая вкладка), скрытые остаются на местах
  const order=[...list.querySelectorAll('.task')].map(c=>c.dataset.id);
  const byId=Object.fromEntries(state.tasks.map(t=>[t.id,t]));
  const visible=new Set(order);
  let oi=0;
  state.tasks=state.tasks.map(t=>visible.has(t.id)?byId[order[oi++]]:t);
  save();sfxPop();render();
}

  save();renderShop();render();bumpScore('points');
  sfxWin();burstAt(innerWidth/2,innerHeight*0.5,26);
  popReward(`<span class="big">${r.emoji}</span>Награда твоя!<br><span style="font-size:16px;opacity:.8">${esc(r.name)}</span>`);
}

  sfxClick();
  const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='moi-zadaniya-backup.json';
  document.body.appendChild(a);a.click();a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1500);
  speak('Файл сохранён! 💾');
};
const importFile=document.getElementById('importFile');
document.getElementById('importBtn').onclick=()=>{sfxClick();importFile.click();};
importFile.onchange=async()=>{
  const f=importFile.files[0];if(!f)return;
  try{
    const data=JSON.parse(await f.text());
    if(!Array.isArray(data.tasks))throw new Error('bad');
    state=normalize(data);
    dailyRollover();save();
    renderMute();renderSettingsStats();render();renderShop();
    switchView('tasks');
    speak('Данные загружены! 🎉');sfxWin();
  }catch(e){alert('Не получилось загрузить файл 😢 Проверь, что это файл из этого приложения.');}
  importFile.value='';
};

render();

//==== PWA: оффлайн + установка на домашний экран ====
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
}
let deferredPrompt=null;
const installBtn=document.getElementById('installBtn');
window.addEventListener('beforeinstallprompt',(e)=>{
  e.preventDefault();           // не показываем стандартную мини-плашку, делаем свою кнопку
  deferredPrompt=e;
  installBtn.hidden=false;
});
installBtn.onclick=async()=>{
  sfxClick();
  if(!deferredPrompt)return;
  deferredPrompt.prompt();
  await deferredPrompt.userChoice;
  deferredPrompt=null;
  installBtn.hidden=true;
};
window.addEventListener('appinstalled',()=>{
  installBtn.hidden=true;
  speak('Ура! Теперь я живу на твоём экране 🦄💖');
  sfxWin();
});
</script>
