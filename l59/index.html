<script type="importmap">

<div id="winOverlay" style="position:fixed; inset:0; display:none; align-items:center; justify-content:center; background:rgba(0,0,0,0.85); color:#7dd97a; font-family:system-ui,sans-serif; font-size:2rem; text-align:center; pointer-events:none;">

</div>

    <div>
        <div style="font-size:3rem; margin-bottom:0.5rem;">Ouch.</div>
        <div id="loseDetail" style="font-size:1rem; opacity:0.6;"></div>
        <div style="font-size:0.9rem; opacity:0.4; margin-top:1rem;">F5 to retry.</div>

<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';
const objLoader = new OBJLoader();

// ----- Renderer, scene, camera -----
const app = document.getElementById('app');
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x000000, 1);
app.appendChild(renderer.domElement);
const canvas = renderer.domElement;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.05, 60);

// ----- Echo shader material (wireframe lines that light up as wave passes) -----
const MAX_ECHOES = 16;
const MAX_WALLS = 24;

const echoOrigins = [];
const echoTimes = [];
const echoColors = [];
const echoRanges = [];
const echoForwards = [];   // vec2 forward direction (xz plane)
const echoCones = [];      // cos(halfAngle); < -1 means omnidirectional
for (let i = 0; i < MAX_ECHOES; i++) {
    echoOrigins.push(new THREE.Vector3(0, -100, 0));
    echoTimes.push(-1);
    echoColors.push(new THREE.Vector3(0.9, 0.97, 1.0));
    echoRanges.push(9.0);
    echoForwards.push(new THREE.Vector2(0, 1));
    echoCones.push(-2.0);
}
const wallUniform = [];
for (let i = 0; i < MAX_WALLS; i++) {
    wallUniform.push(new THREE.Vector4(1e6, 1e6, -1e6, -1e6));
}

const echoMaterial = new THREE.ShaderMaterial({
    transparent: true,
    depthWrite: false,
    depthTest: true,
    blending: THREE.AdditiveBlending,
    uniforms: {
        uEchoOrigin: { value: echoOrigins },
        uEchoTime: { value: echoTimes },
        uEchoColor: { value: echoColors },
        uEchoRange: { value: echoRanges },
        uEchoForward: { value: echoForwards },
        uEchoCone: { value: echoCones },
        uWalls: { value: wallUniform },
        uSpeed: { value: 9.0 },
        uFadeMul: { value: 2.0 },
    },
    vertexShader: `
        varying vec3 vWorldPos;
        void main() {
            vec4 wp = modelMatrix * vec4(position, 1.0);
            vWorldPos = wp.xyz;
            gl_Position = projectionMatrix * viewMatrix * wp;
        }
    `,
    fragmentShader: `
        precision highp float;
        varying vec3 vWorldPos;
        uniform vec3 uEchoOrigin[${MAX_ECHOES}];
        uniform float uEchoTime[${MAX_ECHOES}];
        uniform vec3 uEchoColor[${MAX_ECHOES}];
        uniform float uEchoRange[${MAX_ECHOES}];
        uniform vec2 uEchoForward[${MAX_ECHOES}];
        uniform float uEchoCone[${MAX_ECHOES}];
        uniform vec4 uWalls[${MAX_WALLS}];
        uniform float uSpeed;
        uniform float uFadeMul;
        const float THICKNESS = 1.0;

        bool rayBlockedByAABB(vec2 a, vec2 b, vec4 w) {
            if (w.x > w.z) return false; // degenerate
            // if origin is inside this wall, don't count it
            if (a.x >= w.x && a.x <= w.z && a.y >= w.y && a.y <= w.w) return false;
            vec2 d = b - a;
            vec2 safe = vec2(
                abs(d.x) < 0.0001 ? 0.0001 : d.x,
                abs(d.y) < 0.0001 ? 0.0001 : d.y
            );
            vec2 inv = 1.0 / safe;
            vec2 t1 = (w.xy - a) * inv;
            vec2 t2 = (w.zw - a) * inv;
            vec2 tMin2 = min(t1, t2);
            vec2 tMax2 = max(t1, t2);
            float tEnter = max(tMin2.x, tMin2.y);
            float tExit  = min(tMax2.x, tMax2.y);
            if (tEnter > tExit) return false;
            // Ray tangent to surface (tEnter ≈ 1) means fragment is on near face → visible.
            // Ray passes through AABB interior (tEnter < 1) → fragment is on back/side edge → blocked.
            if (tEnter >= 0.999 || tExit <= 0.0) return false;
            return true;
        }

        void main() {
            vec3 col = vec3(0.0);
            vec2 frag2D = vWorldPos.xz;

            for (int i = 0; i < ${MAX_ECHOES}; i++) {
                float t = uEchoTime[i];
                if (t < 0.0) continue;

                vec2 origin2D = uEchoOrigin[i].xz;

                bool blocked = false;
                for (int j = 0; j < ${MAX_WALLS}; j++) {
                    if (rayBlockedByAABB(origin2D, frag2D, uWalls[j])) {
                        blocked = true;
                        break;
                    }
                }
                if (blocked) continue;

                float range = uEchoRange[i];
                float wavefrontLife = range / uSpeed;
                float totalLife     = wavefrontLife * uFadeMul;
                float d = distance(vWorldPos, uEchoOrigin[i]);
                if (d > range) continue;

                // Directional cone check (omnidirectional if uEchoCone < -1)
                float coneFalloff = 1.0;
                if (uEchoCone[i] > -1.0 && d > 0.001) {
                    vec2 dir = normalize(frag2D - origin2D);
                    float cosA = dot(dir, uEchoForward[i]);
                    coneFalloff = smoothstep(uEchoCone[i] - 0.2, uEchoCone[i] + 0.05, cosA);
                    if (coneFalloff <= 0.0) continue;
                }

                float wavefront = t * uSpeed;
                // ring: fades as wavefront approaches edge
                float ringFade = 1.0 - smoothstep(wavefrontLife * 0.7, wavefrontLife, t);
                float ring = smoothstep(THICKNESS, 0.0, abs(d - wavefront)) * ringFade;
                // afterglow: everything inside the wavefront, fading over totalLife
                float inside = step(d, wavefront);
                float afterglow = inside * (1.0 - smoothstep(0.0, totalLife, t));
                // radial falloff toward edge
                float falloff = 1.0 - smoothstep(range * 0.6, range, d);
                float intensity = (ring * 2.5 + afterglow * 1.2) * falloff * coneFalloff;
                col += uEchoColor[i] * intensity;
            }

            float lit = max(col.r, max(col.g, col.b));
            gl_FragColor = vec4(col, min(lit, 1.0));
        }
    `,
});

// Hostile spirits use this material — identical to echoMaterial but the player's beat
// echo (tracked via uBeatSlot) is always rendered red regardless of echo color.
const hostileEchoMaterial = new THREE.ShaderMaterial({
    transparent: true,
    depthWrite: false,
    depthTest: true,
    blending: THREE.AdditiveBlending,
    uniforms: {
        uEchoOrigin:  echoMaterial.uniforms.uEchoOrigin,
        uEchoTime:    echoMaterial.uniforms.uEchoTime,
        uEchoColor:   echoMaterial.uniforms.uEchoColor,
        uEchoRange:   echoMaterial.uniforms.uEchoRange,
        uEchoForward: echoMaterial.uniforms.uEchoForward,
        uEchoCone:    echoMaterial.uniforms.uEchoCone,
        uWalls:       echoMaterial.uniforms.uWalls,
        uSpeed:       echoMaterial.uniforms.uSpeed,
        uFadeMul:     echoMaterial.uniforms.uFadeMul,
        uBeatSlot:    { value: -1 },
    },
    vertexShader: echoMaterial.vertexShader,
    fragmentShader: `
        precision highp float;
        varying vec3 vWorldPos;
        uniform vec3 uEchoOrigin[${MAX_ECHOES}];
        uniform float uEchoTime[${MAX_ECHOES}];
        uniform vec3 uEchoColor[${MAX_ECHOES}];
        uniform float uEchoRange[${MAX_ECHOES}];
        uniform vec2 uEchoForward[${MAX_ECHOES}];
        uniform float uEchoCone[${MAX_ECHOES}];
        uniform vec4 uWalls[${MAX_WALLS}];
        uniform float uSpeed;
        uniform float uFadeMul;
        uniform int uBeatSlot;
        const float THICKNESS = 1.0;

        bool rayBlockedByAABB(vec2 a, vec2 b, vec4 w) {
            if (w.x > w.z) return false;
            if (a.x >= w.x && a.x <= w.z && a.y >= w.y && a.y <= w.w) return false;
            vec2 d = b - a;
            vec2 safe = vec2(
                abs(d.x) < 0.0001 ? 0.0001 : d.x,
                abs(d.y) < 0.0001 ? 0.0001 : d.y
            );
            vec2 inv = 1.0 / safe;
            vec2 t1 = (w.xy - a) * inv;
            vec2 t2 = (w.zw - a) * inv;
            vec2 tMin2 = min(t1, t2);
            vec2 tMax2 = max(t1, t2);
            float tEnter = max(tMin2.x, tMin2.y);
            float tExit  = min(tMax2.x, tMax2.y);
            if (tEnter > tExit) return false;
            if (tEnter >= 0.999 || tExit <= 0.0) return false;
            return true;
        }

        void main() {
            vec3 col = vec3(0.0);
            vec2 frag2D = vWorldPos.xz;

            for (int i = 0; i < ${MAX_ECHOES}; i++) {
                float t = uEchoTime[i];
                if (t < 0.0) continue;

                vec2 origin2D = uEchoOrigin[i].xz;

                bool blocked = false;
                for (int j = 0; j < ${MAX_WALLS}; j++) {
                    if (rayBlockedByAABB(origin2D, frag2D, uWalls[j])) {
                        blocked = true;
                        break;
                    }
                }
                if (blocked) continue;

                float range = uEchoRange[i];
                float wavefrontLife = range / uSpeed;
                float totalLife     = wavefrontLife * uFadeMul;
                float d = distance(vWorldPos, uEchoOrigin[i]);
                if (d > range) continue;

                float coneFalloff = 1.0;
                if (uEchoCone[i] > -1.0 && d > 0.001) {
                    vec2 dir = normalize(frag2D - origin2D);
                    float cosA = dot(dir, uEchoForward[i]);
                    coneFalloff = smoothstep(uEchoCone[i] - 0.2, uEchoCone[i] + 0.05, cosA);
                    if (coneFalloff <= 0.0) continue;
                }

                float wavefront = t * uSpeed;
                float ringFade = 1.0 - smoothstep(wavefrontLife * 0.7, wavefrontLife, t);
                float ring = smoothstep(THICKNESS, 0.0, abs(d - wavefront)) * ringFade;
                float inside = step(d, wavefront);
                float afterglow = inside * (1.0 - smoothstep(0.0, totalLife, t));
                float falloff = 1.0 - smoothstep(range * 0.6, range, d);
                float intensity = (ring * 2.5 + afterglow * 1.2) * falloff * coneFalloff;
                vec3 echoCol = (i == uBeatSlot) ? vec3(0.75, 0.08, 0.05) : uEchoColor[i];
                col += echoCol * intensity;
            }

            float lit = max(col.r, max(col.g, col.b));
            gl_FragColor = vec4(col, min(lit, 1.0));
        }
    `,
});

// ----- Level (walls as line-edges, floor grid) -----
const walls = [];

const solidMat = new THREE.MeshBasicMaterial({
    color: 0x000000,
    polygonOffset: true,
    polygonOffsetFactor: 1,
    polygonOffsetUnits: 2,
});
// Registry for all grid wireframes — slider can rebuild them live
const gridMeshes = [];
function registerGridMesh(mesh, rebuildFn) {
    gridMeshes.push({ mesh, rebuildFn });
}
function rebuildAllGrids(newStep) {
    for (const { mesh, rebuildFn } of gridMeshes) {
        const oldGeom = mesh.geometry;
        mesh.geometry = rebuildFn(newStep);
        oldGeom.dispose();
    }
}

// Build a box wireframe with interior grid lines on all 5 visible faces (bottom skipped).
function buildBoxWireGeom(w, h, d, step) {
    const hw = w / 2, hh = h / 2, hd = d / 2;
    const pts = [];
    const eps = 1e-4;
    function lineX(y, z, sign) { pts.push(-hw, y, z * sign, hw, y, z * sign); }
    function lineY(x, z, sign) { pts.push(x * sign, -hh, z, x * sign, hh, z); }
    function lineZ(x, y, sign) { pts.push(x, y * sign, -hd, x, y * sign, hd); }

    // Front (z=+hd) and back (z=-hd): grid in XY
    for (const zs of [1, -1]) {
        for (let x = -hw; x <= hw + eps; x += step) pts.push(x, -hh, hd * zs, x, hh, hd * zs);
        for (let y = -hh; y <= hh + eps; y += step) pts.push(-hw, y, hd * zs, hw, y, hd * zs);
    }
    // Right (x=+hw) and left (x=-hw): grid in YZ
    for (const xs of [1, -1]) {
        for (let y = -hh; y <= hh + eps; y += step) pts.push(hw * xs, y, -hd, hw * xs, y, hd);
        for (let z = -hd; z <= hd + eps; z += step) pts.push(hw * xs, -hh, z, hw * xs, hh, z);
    }
    // Top (y=+hh): grid in XZ
    for (let x = -hw; x <= hw + eps; x += step) pts.push(x, hh, -hd, x, hh, hd);
    for (let z = -hd; z <= hd + eps; z += step) pts.push(-hw, hh, z, hw, hh, z);

    const geom = new THREE.BufferGeometry();
    geom.setAttribute('position', new THREE.Float32BufferAttribute(pts, 3));
    return geom;
}

function addBox(cx, cy, w, d, h = 1.5, baseY = 0) {
    const box = new THREE.BoxGeometry(w, h, d);
    const solid = new THREE.Mesh(box, solidMat);
    const posY = baseY + h / 2;
    solid.position.set(cx, posY, cy);
    scene.add(solid);
    walkableMeshes.push(solid);
    const lines = new THREE.LineSegments(buildBoxWireGeom(w, h, d, cfg.gridStep), echoMaterial);
    lines.position.set(cx, posY, cy);
    lines.renderOrder = 1;
    scene.add(lines);
    registerGridMesh(lines, (step) => buildBoxWireGeom(w, h, d, step));
    // Only axis-aligned walls near ground level contribute to echo occlusion
    if (baseY < 0.1) {
        const minX = cx - w / 2, minY = cy - d / 2, maxX = cx + w / 2, maxY = cy + d / 2;
        walls.push({ minX, minY, maxX, maxY });
        const idx = walls.length - 1;
        if (idx < MAX_WALLS) wallUniform[idx].set(minX, minY, maxX, maxY);
    }
}

// Free-3D cube (rotatable, not axis-aligned, not added to AABB walls)
function addCube(d) {
    const sx = d.sx ?? 1, sy = d.sy ?? 1, sz = d.sz ?? 1;
    const geom = new THREE.BoxGeometry(sx, sy, sz);
    const solid = new THREE.Mesh(geom, solidMat);
    const lines = new THREE.LineSegments(buildBoxWireGeom(sx, sy, sz, cfg.gridStep), echoMaterial);
    lines.renderOrder = 1;
    const group = new THREE.Group();
    group.add(solid);
    group.add(lines);
    group.position.set(d.x || 0, d.yWorld ?? 0.5, d.y || 0);
    group.rotation.set(d.rx || 0, d.ry || 0, d.rz || 0);
    scene.add(group);
    registerGridMesh(lines, (step) => buildBoxWireGeom(sx, sy, sz, step));
    walkableMeshes.push(solid);
}

// Low-poly sphere (icosahedron detail=1), wireframe scannable by echo
function addSphere(d) {
    const r = d.radius ?? 0.5;
    const geom = new THREE.IcosahedronGeometry(r, 1);
    const solid = new THREE.Mesh(geom, solidMat);
    const lines = new THREE.LineSegments(new THREE.WireframeGeometry(geom), echoMaterial);
    lines.renderOrder = 1;
    const group = new THREE.Group();
    group.add(solid);
    group.add(lines);
    group.position.set(d.x || 0, d.yWorld ?? r, d.y || 0);
    scene.add(group);
}

function buildFlatGridGeom(y, size, step) {
    const positions = [];
    for (let i = -size; i <= size; i += step) {
        positions.push(i, y, -size, i, y, size);
        positions.push(-size, y, i, size, y, i);
    }
    const g = new THREE.BufferGeometry();
    g.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
    return g;
}
function addGrid(y, size, step) {
    const grid = new THREE.LineSegments(buildFlatGridGeom(y, size, step), echoMaterial);
    grid.renderOrder = 1;
    scene.add(grid);
    registerGridMesh(grid, (s) => buildFlatGridGeom(y, size, s));
}
function addFloorGrid(size, step) { addGrid(0, size, step); }

function addCeiling(size, y) {
    const geom = new THREE.PlaneGeometry(size * 2, size * 2);
    const mesh = new THREE.Mesh(geom, solidMat);
    mesh.rotation.x = Math.PI / 2;  // face downward
    mesh.position.set(0, y, 0);
    scene.add(mesh);
}

// ----- Tunable config (declared early so level-building functions see it) -----
const CFG_VERSION = 8;
const cfg = {
    beatRange: 5.5,
    beatCooldown: 2.2,
    bodyRange: 2.5,
    bodyPulsePeriod: 2.0,
    signalSpeed: 4.0,
    mouseSens: 0.0025,
    flashOnBeat: 0.5,
    fadeMul: 3.4,
    autoBeatPreview: 1,
    autoBeatPeriod: 2.0,
    beatCone: 120,
    smellRange: 5.0,
    smellCount: 80,
    smellSize: 0.22,
    soundRange: 2.5,
    soundHearRange: 6.0,
    gridStep: 0.125,
    moveSpeed: 1.6,
    eyeHeight: 1.1,
    bobAmplitude: 0.03,
    bobFrequency: 2,
    ceilingHeight: 3.0,
    showFps: 0,
    virtualJoystick: 0,
    touchLookSens: 0.006,
    musicVolume: 0.5,
};

ambientEl.volume = cfg.musicVolume;

// Smell zones — colored vapor drifting upward
const smellZones = [];
const smellDefs = []; // persistent zone definitions, used to rebuild on count change

function buildSmellZone(def) {
    const N = cfg.smellCount;
    const positions = new Float32Array(N * 3);
    const velocities = new Array(N);
    function spawnParticle(i, startYRand) {
        const r = Math.sqrt(Math.random()) * def.radius;
        const a = Math.random() * Math.PI * 2;
        positions[i*3]   = def.cx + r * Math.cos(a);
        positions[i*3+1] = startYRand ? Math.random() * 2.0 : 0.05 + Math.random() * 0.2;
        positions[i*3+2] = def.cy + r * Math.sin(a);
        velocities[i] = {
            vy: 0.08 + Math.random() * 0.12,
            dx: (Math.random() - 0.5) * 0.08,
            dz: (Math.random() - 0.5) * 0.08,
        };
    }
    for (let i = 0; i < N; i++) spawnParticle(i, true);
    const geom = new THREE.BufferGeometry();
    geom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    const mat = new THREE.PointsMaterial({
        color: def.color, size: cfg.smellSize, transparent: true, opacity: 0.55,
        blending: THREE.AdditiveBlending, depthWrite: false,
        sizeAttenuation: true,
    });
    const points = new THREE.Points(geom, mat);
    scene.add(points);
    return { ...def, positions, velocities, geom, mat, points, spawnParticle };
}

function addSmellZone(cx, cy, radius, color) {
    const def = { cx, cy, radius, color };
    smellDefs.push(def);
    smellZones.push(buildSmellZone(def));
}

function rebuildSmellZones() {
    for (const z of smellZones) {
        scene.remove(z.points);
        z.geom.dispose();
        z.mat.dispose();
    }
    smellZones.length = 0;
    for (const d of smellDefs) smellZones.push(buildSmellZone(d));
}

function updateSmellZones(dt) {
    for (const s of smellZones) {
        const N = s.velocities.length;
        for (let i = 0; i < N; i++) {
            const v = s.velocities[i];
            s.positions[i*3]     += v.dx * dt;
            s.positions[i*3 + 1] += v.vy * dt;
            s.positions[i*3 + 2] += v.dz * dt;
            if (s.positions[i*3 + 1] > 2.25) s.spawnParticle(i, false);
        }
        s.geom.attributes.position.needsUpdate = true;
        // distance-based fade: full opacity close, invisible beyond cfg.smellRange
        const distToSoul = Math.hypot(s.cx - soul.x, s.cy - soul.y);
        const strength = 1.0 - Math.min(1, Math.max(0,
            (distToSoul - cfg.smellRange * 0.3) / (cfg.smellRange * 0.7)
        ));
        s.mat.opacity = 0.6 * strength;
        s.mat.size = cfg.smellSize;
        s.mat.visible = strength > 0.01;
    }
}

// Scene built from level.json (or DEFAULT_LEVEL fallback) at bottom of script.

// ----- Soul (camera carrier + collision); start position set by level -----
const soul = {
    x: 0, y: 0, yaw: 0, pitch: 0,
    radius: 0.3,
    floorY: 0,   // current feet Y (updated each frame by slope raycast)
};

// Walkable surfaces — populated in buildLevel. Raycaster uses these for floor height.
const walkableMeshes = [];
const slopeRaycaster = new THREE.Raycaster();
const slopeDirDown = new THREE.Vector3(0, -1, 0);
const MAX_SLOPE_COS = Math.cos(40 * Math.PI / 180); // ~0.766 for 40°
const MAX_STEP_UP = 0.35; // cannot climb onto surfaces higher than this above current floor

function sampleFloorAt(x, y, fromY) {
    slopeRaycaster.set(new THREE.Vector3(x, fromY + 3, y), slopeDirDown);
    slopeRaycaster.far = 8;
    const hits = slopeRaycaster.intersectObjects(walkableMeshes, true);
    for (const h of hits) {
        if (!h.face) continue;
        const worldNormal = h.face.normal.clone().transformDirection(h.object.matrixWorld).normalize();
        if (worldNormal.y < MAX_SLOPE_COS) continue; // too steep
        // reject surfaces too high above current floor (walls/prop tops)
        if (h.point.y > fromY + MAX_STEP_UP) continue;
        return h.point.y;
    }
    return 0;
}

function updateFloorY() {
    soul.floorY = sampleFloorAt(soul.x, soul.y, soul.floorY);
}

function soulCollides(x, y) {
    for (const w of walls) {
        const cx = Math.max(w.minX, Math.min(x, w.maxX));
        const cy = Math.max(w.minY, Math.min(y, w.maxY));
        const dx = x - cx, dy = y - cy;
        if (dx * dx + dy * dy < soul.radius * soul.radius) return true;
    }
    return false;
}

function moveSoul(ix, iy, dt) {
    if (ix === 0 && iy === 0) return;
    const s = Math.sin(soul.yaw), c = Math.cos(soul.yaw);
    const speed = cfg.moveSpeed;
    const dx = (iy * s + ix * c) * speed * dt;
    const dy = (iy * c - ix * s) * speed * dt;
    const nx = soul.x + dx;
    if (!soulCollides(nx, soul.y)) soul.x = nx;
    const ny = soul.y + dy;
    if (!soulCollides(soul.x, ny)) soul.y = ny;
}

// ----- Input (old-style handlers) -----
const keys = new Set();
let mouseDX = 0, mouseDY = 0, locked = false;

const BEAT_COOLDOWN = 1.2;
let lastBeatTime = -999;
let flashT = 0;
let elapsed = 0;
let beatEchoSlot = -1;

const echoes = [];
for (let i = 0; i < MAX_ECHOES; i++) {
    echoes.push({
        origin: new THREE.Vector3(),
        color: new THREE.Vector3(0.9, 0.97, 1.0),
        range: 4.5,
        forward: new THREE.Vector2(0, 1),
        cone: -2.0,
        start: -999, active: false,
    });
}

const COLOR_BEAT    = new THREE.Vector3(0.9, 0.97, 1.0);
const COLOR_BODY   = new THREE.Vector3(0.1, 0.55, 0.15);   // green
const COLOR_DANGER  = new THREE.Vector3(0.65, 0.08, 0.05);  // red
const COLOR_SOUND   = new THREE.Vector3(0.55, 0.45, 0.05);  // yellow

function spawnEcho(x, y, z, color, range, forwardX, forwardZ, coneHalfDeg) {
    let slot = echoes.find(e => !e.active);
    if (!slot) slot = echoes.reduce((a, b) => a.start < b.start ? a : b);
    slot.origin.set(x, y, z);
    slot.color.copy(color);
    slot.range = range;
    if (typeof coneHalfDeg === 'number') {
        slot.forward.set(forwardX, forwardZ).normalize();
        slot.cone = Math.cos(coneHalfDeg * Math.PI / 180);
    } else {
        slot.cone = -2.0; // omnidirectional
    }
    slot.start = elapsed;
    slot.active = true;
    return echoes.indexOf(slot);
}

function fireBeat() {
    if (elapsed - lastBeatTime < cfg.beatCooldown) return;
    lastBeatTime = elapsed;
    // Directional: 120° cone = 60° half-angle, forward = soul's facing
    const fx = Math.sin(soul.yaw);
    const fz = Math.cos(soul.yaw);
    beatEchoSlot = spawnEcho(soul.x, 0.6, soul.y, COLOR_BEAT, cfg.beatRange, fx, fz, cfg.beatCone / 2);
    flashT = cfg.flashOnBeat;
}

// ----- Body (goal) — position set by level -----
const body = { x: 0, y: 0, lastPulse: -10 };
const points = []; // unified entities: spirits / pickups / sounds / smells / arbitrary
let lost = false;

// ---- Legacy-to-point migration (same shape as editor) ----
function blankPointRT(x, y) {
    return { x, y, label: '', r: 0.5, modelName: '',
        hostile: false, pickup: false,
        pulse: null, sound: null, smell: null, patrol: null };
}
function migrateSpiritRT(s) {
    const wps = (s.waypoints || []).map(w => Array.isArray(w) ? [w[0], w[1]] : [w.x, w.y]);
    return {
        x: s.x, y: s.y, label: s.label || '', r: s.r ?? 0.7, modelName: s.modelName || '',
        hostile: s.hostile !== false, pickup: false,
        pulse: { period: s.period ?? 2.8 }, sound: null, smell: null,
        patrol: wps.length ? { waypoints: wps, speed: s.speed ?? 1, turnRate: s.turnRate ?? 2 } : null,
    };
}
function migratePickupRT(s) { return { ...blankPointRT(s.x, s.y), label: s.label || '', r: s.r ?? 0.5, modelName: s.modelName || '', pickup: true }; }
function migrateSoundRT(s)  { return { ...blankPointRT(s.x, s.y), label: s.label || '', r: s.r ?? 0.4, modelName: s.modelName || '', sound: { period: s.period ?? 3 } }; }
function migrateSmellRT(s)  { return { ...blankPointRT(s.cx, s.cy), label: s.label || '', r: s.r ?? 0.5, modelName: s.modelName || '', smell: { radius: s.radius ?? 1.5, color: s.color || '#4aaaff' } }; }
function collectPointsFromLevel(data) {
    const out = [];
    for (const x of data.spirits || []) out.push(migrateSpiritRT(x));
    for (const x of data.pickups || []) out.push(migratePickupRT(x));
    for (const x of data.sounds  || []) out.push(migrateSoundRT(x));
    for (const x of data.smells  || []) out.push(migrateSmellRT(x));
    for (const x of data.points  || []) out.push({ ...blankPointRT(x.x, x.y), ...x });
    return out;
}

// Visible body silhouette — lying (torso + head). Solid body for camera occlusion,
// line edges on top lit by echoes. Called from buildLevel once body position is known.
function buildBodyMesh() {
    const group = new THREE.Group();
    group.position.set(body.x, 0, body.y);
    function addPart(w, h, d, px, py, pz) {
        const geom = new THREE.BoxGeometry(w, h, d);
        const solid = new THREE.Mesh(geom, solidMat);
        solid.position.set(px, py, pz);
        group.add(solid);
        const lines = new THREE.LineSegments(new THREE.EdgesGeometry(geom), echoMaterial);
        lines.position.set(px, py, pz);
        lines.renderOrder = 1;
        group.add(lines);
    }
    addPart(1.7, 0.35, 0.6, 0, 0.18, 0);     // torso
    addPart(0.45, 0.35, 0.45, 1.05, 0.18, 0); // head
    scene.add(group);
}
let won = false;
function showWin() {
    const el = document.getElementById('winOverlay');
    if (el) el.style.display = 'flex';
}
function showLose(what) {
    const el = document.getElementById('loseOverlay');
    const detail = document.getElementById('loseDetail');
    if (detail) detail.textContent = `You hit the ${what}.`;
    if (el) el.style.display = 'flex';
}

// Use e.code (physical key) — layout-independent (RU/EN/etc.)
window.onkeydown = (e) => {
    keys.add(e.code);
    if (e.code === 'Space') {
        fireBeat();
        e.preventDefault();
    }
};
window.onkeyup = (e) => { keys.delete(e.code); };
window.onblur = () => keys.clear();

canvas.onmousedown = (e) => {
    fireBeat();
    if (!locked) canvas.requestPointerLock();
    e.preventDefault();
};
document.onpointerlockchange = () => {
    locked = document.pointerLockElement === canvas;
};
document.onmousemove = (e) => {
    if (!locked) return;
    mouseDX += e.movementX;
    mouseDY += e.movementY;
};

function readMove() {
    if (cfg.virtualJoystick && joy.active) return [-joy.dx, joy.dy];
    let x = 0, y = 0;
    if (keys.has('KeyW') || keys.has('ArrowUp')) y += 1;
    if (keys.has('KeyS') || keys.has('ArrowDown')) y -= 1;
    if (keys.has('KeyA') || keys.has('ArrowLeft')) x += 1;
    if (keys.has('KeyD') || keys.has('ArrowRight')) x -= 1;
    const l = Math.hypot(x, y);
    if (l > 0) { x /= l; y /= l; }
    return [x, y];
}

// ----- Virtual joystick + BEAT button (touch/mouse) -----
const joy = { active: false, pid: -1, dx: 0, dy: 0, radius: 60 };
const joyEl = document.getElementById('joystick');
const joyKnobEl = document.getElementById('joyKnob');
const beatBtnEl = document.getElementById('beatBtn');
let lookPid = -1, lookLastX = 0, lookLastY = 0;
const pcHintsEl = document.getElementById('pcHints');
function applyJoystickVisibility() {
    const on = !!cfg.virtualJoystick;
    joyEl.classList.toggle('on', on);
    beatBtnEl.classList.toggle('on', on);
    pcHintsEl.style.display = on ? 'none' : '';
}
applyJoystickVisibility();
function joyUpdateKnob() {
    joyKnobEl.style.transform = `translate(${joy.dx * joy.radius}px, ${-joy.dy * joy.radius}px)`;
}
function joyReset() {
    joy.active = false; joy.pid = -1; joy.dx = 0; joy.dy = 0;
    joyKnobEl.style.transform = '';
}
joyEl.addEventListener('pointerdown', e => {
    joy.active = true; joy.pid = e.pointerId;
    const rect = joyEl.getBoundingClientRect();
    const rx = e.clientX - (rect.left + rect.width / 2);
    const ry = -(e.clientY - (rect.top + rect.height / 2));
    const l = Math.hypot(rx, ry);
    const n = Math.min(1, l / joy.radius);
    joy.dx = (l > 0 ? rx / l : 0) * n;
    joy.dy = (l > 0 ? ry / l : 0) * n;
    joyUpdateKnob();
    joyEl.setPointerCapture(e.pointerId);
    e.preventDefault();
});
joyEl.addEventListener('pointermove', e => {
    if (e.pointerId !== joy.pid) return;
    const rect = joyEl.getBoundingClientRect();
    const rx = e.clientX - (rect.left + rect.width / 2);
    const ry = -(e.clientY - (rect.top + rect.height / 2));
    const l = Math.hypot(rx, ry);
    const n = Math.min(1, l / joy.radius);
    joy.dx = (l > 0 ? rx / l : 0) * n;
    joy.dy = (l > 0 ? ry / l : 0) * n;
    joyUpdateKnob();
});
function joyEnd(e) { if (e.pointerId === joy.pid) joyReset(); }
joyEl.addEventListener('pointerup', joyEnd);
joyEl.addEventListener('pointercancel', joyEnd);

beatBtnEl.addEventListener('pointerdown', e => {
    fireBeat();
    e.preventDefault(); e.stopPropagation();
});

window.addEventListener('pointerdown', e => {
    if (!cfg.virtualJoystick) return;
    if (e.pointerType === 'mouse') return;
    if (lookPid !== -1) return;
    if (e.target === joyEl || joyEl.contains(e.target)) return;
    if (e.target === beatBtnEl) return;
    lookPid = e.pointerId;
    lookLastX = e.clientX; lookLastY = e.clientY;
});
window.addEventListener('pointermove', e => {
    if (e.pointerId !== lookPid) return;
    mouseDX += (e.clientX - lookLastX) * (cfg.touchLookSens / cfg.mouseSens);
    mouseDY += (e.clientY - lookLastY) * (cfg.touchLookSens / cfg.mouseSens);
    lookLastX = e.clientX; lookLastY = e.clientY;
});
window.addEventListener('pointerup', e => { if (e.pointerId === lookPid) lookPid = -1; });
window.addEventListener('pointercancel', e => { if (e.pointerId === lookPid) lookPid = -1; });

// ----- Postprocess: noise + flash overlay -----
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));

const NoiseShader = {
    uniforms: {
        tDiffuse: { value: null },
        uTime: { value: 0 },
        uFlash: { value: 0 },
    },
    vertexShader: `
        varying vec2 vUv;
        void main() {
            vUv = uv;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
    `,
    fragmentShader: `
        precision highp float;
        uniform sampler2D tDiffuse;
        uniform float uTime;
        uniform float uFlash;
        varying vec2 vUv;
        float hash(vec2 p) {
            p = fract(p * vec2(123.34, 456.21));
            p += dot(p, p + 45.32);
            return fract(p.x * p.y);
        }
        void main() {
            vec3 col = texture2D(tDiffuse, vUv).rgb;
            float n = hash(vUv * vec2(1920.0, 1080.0) + uTime * 60.0);
            col += vec3((n - 0.4) * 0.18);
            float n2 = hash(floor(vUv * 80.0) * 0.1 + floor(uTime * 8.0));
            col += vec3(n2 * 0.05);
            col += 0.04;
            col += sin(vUv.y * 480.0 + uTime * 3.0) * 0.02;
            col += vec3(uFlash * 0.35);
            vec2 q = vUv - 0.5;
            col *= 1.0 - dot(q, q) * 0.9;
            gl_FragColor = vec4(col, 1.0);
        }
    `,
};
const noisePass = new ShaderPass(NoiseShader);
composer.addPass(noisePass);

// ----- Main loop -----
const clock = new THREE.Clock();
let bobPhase = 0;
let bobSettle = 0;
const fpsEl = document.getElementById('fps');
let fpsFrames = 0, fpsAccum = 0, fpsDisplay = 0;

function animate() {
    const dt = Math.min(clock.getDelta(), 1 / 30);
    elapsed += dt;
    fpsAccum += dt; fpsFrames++;
    if (fpsAccum >= 0.5) {
        fpsDisplay = Math.round(fpsFrames / fpsAccum);
        fpsFrames = 0; fpsAccum = 0;
        if (cfg.showFps) fpsEl.textContent = fpsDisplay + ' fps';
    }

    // look
    soul.yaw -= mouseDX * cfg.mouseSens;
    soul.pitch -= mouseDY * cfg.mouseSens;
    soul.pitch = Math.max(-0.8, Math.min(0.4, soul.pitch));
    mouseDX = 0; mouseDY = 0;

    // move
    const [ix, iy] = readMove();
    moveSoul(ix, iy, dt);

    // Body auto-pulse (green, navigation aid)
    if (!won && !lost && elapsed - body.lastPulse > cfg.bodyPulsePeriod) {
        spawnEcho(body.x, 0.6, body.y, COLOR_BODY, cfg.bodyRange);
        body.lastPulse = elapsed;
    }

    // Points: patrol + pulses + sounds + contact
    const COLOR_GRAY = new THREE.Vector3(0.7, 0.7, 0.8);
    if (!won && !lost) {
        for (const pt of points) {
            if (pt.collected) continue;
            // patrol
            const wps = pt.patrol?.waypoints;
            if (wps && wps.length > 0) {
                const wp = wps[pt.wpIdx % wps.length];
                const wx = Array.isArray(wp) ? wp[0] : wp.x;
                const wy = Array.isArray(wp) ? wp[1] : wp.y;
                const ddx = wx - pt.x, ddy = wy - pt.y;
                const dist = Math.hypot(ddx, ddy);
                if (dist < 0.15) {
                    pt.wpIdx = (pt.wpIdx + 1) % wps.length;
                } else {
                    const step = Math.min(pt.patrol.speed * dt, dist);
                    pt.x += (ddx / dist) * step;
                    pt.y += (ddy / dist) * step;
                    const targetYaw = Math.atan2(ddx, ddy);
                    let dy = targetYaw - pt.yaw;
                    while (dy > Math.PI) dy -= 2 * Math.PI;
                    while (dy < -Math.PI) dy += 2 * Math.PI;
                    const turnStep = pt.patrol.turnRate * dt;
                    pt.yaw += Math.max(-turnStep, Math.min(turnStep, dy));
                }
                if (pt.mesh) pt.mesh.position.set(pt.x, 0, pt.y);
            }
            if (pt.mesh) pt.mesh.rotation.y = pt.yaw;
            // self-pulse (spirit-style)
            if (pt.pulse && elapsed - pt.lastPulseSelf > pt.pulse.period) {
                pt.lastPulseSelf = elapsed;
                spawnEcho(pt.x, 0.8, pt.y, pt.hostile ? COLOR_DANGER : COLOR_GRAY, 2.5);
            }
            // ambient sound (yellow, clarity fades with distance)
            if (pt.sound && elapsed - pt.lastPulseSound > pt.sound.period) {
                pt.lastPulseSound = elapsed;
                const dToSoul = Math.hypot(pt.x - soul.x, pt.y - soul.y);
                const clarity = Math.max(0, 1 - dToSoul / cfg.soundHearRange);
                if (clarity >= 0.03) {
                    const dimmed = COLOR_SOUND.clone().multiplyScalar(clarity);
                    spawnEcho(pt.x, 0.8, pt.y, dimmed, cfg.soundRange);
                }
            }
            // contact checks
            const ddSoul = Math.hypot(soul.x - pt.x, soul.y - pt.y);
            if (pt.hostile && ddSoul < (pt.r || 0.7) + soul.radius) {
                lost = true;
                showLose(pt.label || 'spirit');
                break;
            }
            if (pt.pickup && !pt.collected && ddSoul < (pt.r || 0.5) + soul.radius) {
                pt.collected = true;
                if (pt.mesh) pt.mesh.visible = false;
            }
        }
    }

    // Win check — soul reached body
    if (!won && !lost) {
        const d = Math.hypot(soul.x - body.x, soul.y - body.y);
        if (d < 1.2) {
            won = true;
            showWin();
        }
    }

    // echoes — expire after total life (fadeMul * wavefront life, matches shader)
    for (const e of echoes) {
        if (e.active && elapsed - e.start > cfg.fadeMul * e.range / cfg.signalSpeed) e.active = false;
    }
    echoMaterial.uniforms.uSpeed.value = cfg.signalSpeed;
    echoMaterial.uniforms.uFadeMul.value = cfg.fadeMul;
    const origUniform = echoMaterial.uniforms.uEchoOrigin.value;
    const colorUniform = echoMaterial.uniforms.uEchoColor.value;
    const rangeUniform = echoMaterial.uniforms.uEchoRange.value;
    const forwardUniform = echoMaterial.uniforms.uEchoForward.value;
    const coneUniform = echoMaterial.uniforms.uEchoCone.value;
    const timeUniform = [];
    for (let i = 0; i < MAX_ECHOES; i++) {
        const e = echoes[i];
        if (e.active) {
            origUniform[i].copy(e.origin);
            colorUniform[i].copy(e.color);
            rangeUniform[i] = e.range;
            forwardUniform[i].copy(e.forward);
            coneUniform[i] = e.cone;
            timeUniform.push(elapsed - e.start);
        } else {
            origUniform[i].set(0, -100, 0);
            coneUniform[i] = -2.0;
            timeUniform.push(-1);
        }
    }
    echoMaterial.uniforms.uEchoTime.value = timeUniform;
    if (beatEchoSlot >= 0 && !echoes[beatEchoSlot].active) beatEchoSlot = -1;
    hostileEchoMaterial.uniforms.uBeatSlot.value = beatEchoSlot;

    // slope walking — raycast down to find floor height
    updateFloorY();

    // head bob when walking
    const moving = (ix !== 0 || iy !== 0);
    bobPhase += dt * (moving ? cfg.bobFrequency : 0);
    const bobY = Math.sin(bobPhase * Math.PI * 2) * cfg.bobAmplitude * (moving ? 1 : 0);
    if (!moving) bobSettle = Math.max(0, bobSettle - dt * 4);
    else bobSettle = 1;

    const headY = soul.floorY + cfg.eyeHeight + bobY * bobSettle;
    camera.position.set(soul.x, headY, soul.y);
    const fx = Math.sin(soul.yaw) * Math.cos(soul.pitch);
    const fy = Math.sin(soul.pitch);
    const fz = Math.cos(soul.yaw) * Math.cos(soul.pitch);
    camera.lookAt(soul.x + fx, headY + fy, soul.y + fz);
    // keep echo-listener at camera height for positional audio consistency


    updateSmellZones(dt);

    flashT = Math.max(0, flashT - dt * 0.8);
    noisePass.uniforms.uTime.value = elapsed;
    noisePass.uniforms.uFlash.value = flashT;

    composer.render();
    requestAnimationFrame(animate);
}

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
    composer.setSize(window.innerWidth, window.innerHeight);
});

// ----- OBJ model loader (imported from editor) -----
// Each instance references a library entry by libraryId; we parse library once.
const parsedLibrary = new Map(); // libraryId → Group template
async function buildLibraryCache(modelLibrary = {}) {
    for (const [id, entry] of Object.entries(modelLibrary)) {
        let text = entry.obj;
        if (!text && entry.path) {
            try {
                const r = await fetch('./' + entry.path, { cache: 'no-cache' });
                if (r.ok) text = await r.text();
                else console.warn('OBJ fetch failed', entry.path, r.status);
            } catch (e) { console.warn('OBJ fetch error', entry.path, e); }
        }
        if (!text) continue;
        try {
            const parsed = objLoader.parse(text);
            parsedLibrary.set(id, parsed);
            if (entry.name) spiritModelByName.set(entry.name, parsed);
        }
        catch (e) { console.warn('lib parse failed', entry.name, e); }
    }
}
function addModel(m) {
    // Back-compat: accept inline `obj` text, or reference library via libraryId
    let template = null;
    if (m.libraryId && parsedLibrary.has(m.libraryId)) template = parsedLibrary.get(m.libraryId);
    else if (m.obj) template = objLoader.parse(m.obj);
    if (!template) return;
    try {
        const parsed = template.clone(true);
        const container = new THREE.Group();
        container.position.set(m.x || 0, m.yWorld || 0, m.y || 0);
        container.rotation.set(m.rx || 0, m.ry || 0, m.rz || 0);
        const s = m.scale ?? 1;
        container.scale.set(s, s, s);

        parsed.traverse(c => {
            if (c.isMesh) {
                c.material = solidMat;
                const edges = new THREE.LineSegments(
                    new THREE.EdgesGeometry(c.geometry, 20),
                    echoMaterial
                );
                edges.renderOrder = 1;
                c.add(edges);
            }
        });
        container.add(parsed);
        scene.add(container);
    } catch (e) { console.warn('model instance failed', e); }
}

// ----- Point mesh builder (spirit / pickup / sound / smell-source / arbitrary) -----
function buildPointRuntimeMesh(pt) {
    const group = new THREE.Group();
    const wireMat = pt.hostile ? hostileEchoMaterial : echoMaterial;
    const template = pt.modelName && spiritModelByName.has(pt.modelName) ? spiritModelByName.get(pt.modelName) : null;
    if (template) {
        const parsed = template.clone(true);
        parsed.traverse(c => {
            if (c.isMesh) {
                c.material = solidMat;
                const edges = new THREE.LineSegments(new THREE.EdgesGeometry(c.geometry, 20), wireMat);
                edges.renderOrder = 1;
                c.add(edges);
            }
        });
        group.add(parsed);
    } else if (pt.hostile || pt.pulse) {
        // spirit-style silhouette (cone + head)
        const mat = solidMat;
        const coneGeom = new THREE.ConeGeometry(0.35, 1.4, 10);
        const body = new THREE.Mesh(coneGeom, mat);
        body.position.y = 0.7;
        const headGeom = new THREE.SphereGeometry(0.22, 10, 8);
        const head = new THREE.Mesh(headGeom, mat);
        head.position.y = 1.55;
        body.add(new THREE.LineSegments(new THREE.EdgesGeometry(coneGeom, 20), wireMat));
        head.add(new THREE.LineSegments(new THREE.EdgesGeometry(headGeom, 20), wireMat));
        group.add(body); group.add(head);
    } else if (pt.pickup) {
        // small lit octahedron marker
        const g = new THREE.OctahedronGeometry(0.22);
        const m = new THREE.Mesh(g, solidMat);
        m.position.y = 0.6;
        m.add(new THREE.LineSegments(new THREE.EdgesGeometry(g), echoMaterial));
        group.add(m);
    }
    // else: invisible (pure sound source / pure smell source)
    return group;
}

async function buildLevel(data) {
    addFloorGrid(data.floorSize ?? 40, cfg.gridStep);
    // extra floor slabs (for multi-story levels)
    for (const f of data.floors || []) addGrid(f.y, f.size ?? 12, cfg.gridStep);
    // Ceiling NOT auto-added — build it yourself with walls/cubes

    for (const w of data.walls || []) addBox(w.cx, w.cy, w.w, w.d, w.h ?? 2.4, w.baseY ?? 0);
    for (const f of data.furniture || []) addBox(f.cx, f.cy, f.w, f.d, f.h ?? 1); // legacy
    for (const c of data.cubes || []) addCube(c);
    for (const sp of data.spheres || []) addSphere(sp);
    await buildLibraryCache(data.modelLibrary || {});
    for (const m of data.models || []) addModel(m);

    if (data.soulStart) { soul.x = data.soulStart.x; soul.y = data.soulStart.y; }
    if (data.body) { body.x = data.body.x; body.y = data.body.y; }

    // clear old points
    for (const p of points) if (p.mesh) scene.remove(p.mesh);
    points.length = 0;
    const loaded = collectPointsFromLevel(data);
    let i = 0;
    for (const p of loaded) {
        const pt = {
            ...p,
            yaw: 0,
            wpIdx: 0,
            lastPulseSelf: (i * 0.5),
            lastPulseSound: (i * 0.3),
            collected: false,
            mesh: buildPointRuntimeMesh(p),
        };
        pt.mesh.position.set(pt.x, 0, pt.y);
        const s = pt.scale ?? 1;
        pt.mesh.scale.set(s, s, s);
        scene.add(pt.mesh);
        points.push(pt);
        if (pt.smell) addSmellZone(pt.x, pt.y, pt.smell.radius, pt.smell.color);
        i++;
    }

    buildBodyMesh();
}

        }
    } catch (e) {
        console.log('[level] fetch failed, using default', e.message);
    }
    await buildLevel(data);
    animate();
}

(function buildPanel() {
    const groups = [
        { title: 'Beat (SPACE)', params: [
            { key: 'beatRange',     label: 'Beat range',     min: 1,    max: 15,   step: 0.5 },
            { key: 'beatCooldown',  label: 'Beat cooldown',  min: 0.2,  max: 3,    step: 0.1 },
            { key: 'beatCone',      label: 'Beat cone (deg)',min: 30,   max: 360,  step: 5 },
            { key: 'flashOnBeat',   label: 'Beat flash',     min: 0,    max: 1,    step: 0.05 },
        ]},
        { title: 'Signal (echo)', params: [
            { key: 'signalSpeed',   label: 'Signal speed',   min: 2,    max: 25,   step: 0.5 },
            { key: 'fadeMul',       label: 'Fade length',    min: 0.5,  max: 6,    step: 0.1 },
            { key: 'gridStep',      label: 'Grid step',      min: 0.03125, max: 0.5, step: 0.03125,
              onChange: () => rebuildAllGrids(cfg.gridStep) },
        ]},
        { title: 'Body (goal)', params: [
            { key: 'bodyRange',        label: 'Body range',  min: 2, max: 20, step: 0.5 },
            { key: 'bodyPulsePeriod',  label: 'Body pulse',  min: 1, max: 10, step: 0.5 },
        ]},
        { title: 'Senses (smells & sounds)', params: [
            { key: 'smellRange',     label: 'Smell range',    min: 1,    max: 12,   step: 0.5 },
            { key: 'smellCount',     label: 'Smell count',    min: 10,   max: 300,  step: 10, onChange: rebuildSmellZones },
            { key: 'smellSize',      label: 'Smell size',     min: 0.05, max: 0.8,  step: 0.02 },
            { key: 'soundRange',     label: 'Sound range',    min: 1,    max: 15,   step: 0.5 },
            { key: 'soundHearRange', label: 'Sound clarity',  min: 1,    max: 20,   step: 0.5 },
        ]},
        { title: 'Movement & camera', params: [
            { key: 'moveSpeed',      label: 'Move speed',     min: 1,    max: 8,    step: 0.1 },
            { key: 'eyeHeight',      label: 'Eye height',     min: 0.3,  max: 2.2,  step: 0.05 },
            { key: 'bobAmplitude',   label: 'Head bob',       min: 0,    max: 0.2,  step: 0.01 },
            { key: 'bobFrequency',   label: 'Bob frequency',  min: 2,    max: 16,   step: 0.5 },
            { key: 'mouseSens',      label: 'Mouse sens',     min: 0.0005, max: 0.01, step: 0.0005 },
        ]},
        { title: 'Preview (panel open)', params: [
            { key: 'autoBeatPreview', label: 'Auto-beat preview', type: 'bool' },
            { key: 'autoBeatPeriod',  label: 'Auto-beat period (s)', min: 0.3, max: 8, step: 0.1 },
        ]},
        { title: 'Input & audio', params: [
            { key: 'showFps',         label: 'Show FPS',         type: 'bool', onChange: () => { fpsEl.style.display = cfg.showFps ? 'block' : 'none'; if (!cfg.showFps) fpsEl.textContent = ''; } },
            { key: 'virtualJoystick', label: 'Virtual joystick', type: 'bool', onChange: applyJoystickVisibility },
            { key: 'musicVolume',     label: 'Music volume',   min: 0, max: 1, step: 0.05, onChange: () => { ambientEl.volume = cfg.musicVolume; } },
        ]},
    ];
    const params = groups.flatMap(g => g.params);
    const body = document.getElementById('panelBody');
    // Copy-settings button
    const copyBtn = document.createElement('button');
    copyBtn.textContent = '📋 copy settings';
    copyBtn.style.cssText = 'width:100%; margin-bottom:6px; padding:4px; background:#2a3a55; color:#c9d9ff; border:1px solid #445; cursor:pointer; font-size:11px;';
    copyBtn.addEventListener('click', async () => {
        const lines = Object.entries(cfg).map(([k, v]) => `${k}: ${v}`).join('\n');
        try {
            await navigator.clipboard.writeText(lines);
            copyBtn.textContent = '✓ copied';
            setTimeout(() => copyBtn.textContent = '📋 copy settings', 1200);
        } catch (e) {
            // fallback: show in prompt
            window.prompt('Copy settings:', lines);
        }
    });
    body.appendChild(copyBtn);
    // Build accordion sections (one per group). First group open by default.
    const groupBodies = new Map();
    groups.forEach((g, gi) => {
        const gEl = document.createElement('div');
        gEl.className = 'group' + (gi === 0 ? ' open' : '');
        const head = document.createElement('div');
        head.className = 'group-head';
        head.textContent = g.title;
        head.addEventListener('click', () => gEl.classList.toggle('open'));
        const gBody = document.createElement('div');
        gBody.className = 'group-body';
        gEl.appendChild(head); gEl.appendChild(gBody);
        body.appendChild(gEl);
        for (const p of g.params) groupBodies.set(p, gBody);
    });
    for (const p of params) {
        const row = document.createElement('div');
        row.className = 'row';
        const label = document.createElement('label');
        label.textContent = p.label;
        const input = document.createElement('input');
        const val = document.createElement('span');
        val.className = 'val';
        if (p.type === 'bool') {
            input.type = 'checkbox';
            input.checked = !!cfg[p.key];
            input.addEventListener('change', () => {
                cfg[p.key] = input.checked ? 1 : 0;
                if (p.onChange) p.onChange();
                try { localStorage.setItem('ld59_cfg_v' + CFG_VERSION, JSON.stringify(cfg)); } catch (e) {}
            });
        } else {
            input.type = 'range';
            input.min = p.min; input.max = p.max; input.step = p.step;
            input.value = cfg[p.key];
            val.textContent = cfg[p.key];
            input.addEventListener('input', () => {
                cfg[p.key] = parseFloat(input.value);
                val.textContent = input.value;
                if (p.onChange) p.onChange();
                try { localStorage.setItem('ld59_cfg_v' + CFG_VERSION, JSON.stringify(cfg)); } catch (e) {}
            });
        }
        row.appendChild(label);
        row.appendChild(input);
        row.appendChild(val);
        (groupBodies.get(p) || body).appendChild(row);
    }
    const panel = document.getElementById('panel');
    document.getElementById('panelToggle').addEventListener('click', () => {
        panel.classList.toggle('open');
    });
    // Auto-beat while panel is open (so you can preview settings live).
    // Uses its own period (cfg.autoBeatPeriod), independent of beatCooldown.
    let lastAuto = 0;
    setInterval(() => {
        if (!cfg.autoBeatPreview) return;
        if (!panel.classList.contains('open')) return;
        const now = performance.now() / 1000;
        if (now - lastAuto < cfg.autoBeatPeriod) return;
        lastAuto = now;
        // bypass cooldown for preview
        const saved = lastBeatTime;
        lastBeatTime = -999;
        fireBeat();
        lastBeatTime = Math.max(lastBeatTime, saved);
    }, 100);
    // Load saved (version-scoped — older saves ignored)
    try {
        localStorage.removeItem('ld59_cfg'); // clear old unversioned storage
        const saved = JSON.parse(localStorage.getItem('ld59_cfg_v' + CFG_VERSION) || 'null');
        if (saved) {
            Object.assign(cfg, saved);
            for (const input of body.querySelectorAll('input[type=range]')) {
                const key = input.previousSibling.textContent;
                const p = params.find(x => x.label === key);
                if (p) {
                    input.value = cfg[p.key];
                    input.nextSibling.textContent = cfg[p.key];
                }
            }
        }
        // Auto-enable mobile controls on real touch devices if user hasn't explicitly set it
        const isTouch = (navigator.maxTouchPoints || 0) > 0 || 'ontouchstart' in window
            || window.matchMedia('(pointer: coarse)').matches;
        if (!saved && isTouch) {
            cfg.virtualJoystick = 1;
        }
        applyJoystickVisibility();
    } catch (e) {}
})();
