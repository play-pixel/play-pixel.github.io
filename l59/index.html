<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';

// ----- Renderer, scene, camera -----
const app = document.getElementById('app');
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x000000, 1);
app.appendChild(renderer.domElement);
const canvas = renderer.domElement;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.05, 60);

// ----- Echo shader material (wireframe lines that light up as wave passes) -----
const MAX_ECHOES = 4;
const MAX_WALLS = 24;

const echoOrigins = [];
const echoTimes = [];
const echoColors = [];
const echoRanges = [];
const echoForwards = [];   // vec2 forward direction (xz plane)
const echoCones = [];      // cos(halfAngle); < -1 means omnidirectional
for (let i = 0; i < MAX_ECHOES; i++) {
    echoOrigins.push(new THREE.Vector3(0, -100, 0));
    echoTimes.push(-1);
    echoColors.push(new THREE.Vector3(0.9, 0.97, 1.0));
    echoRanges.push(9.0);
    echoForwards.push(new THREE.Vector2(0, 1));
    echoCones.push(-2.0);
}
const wallUniform = [];
for (let i = 0; i < MAX_WALLS; i++) {
    wallUniform.push(new THREE.Vector4(1e6, 1e6, -1e6, -1e6));
}

const echoMaterial = new THREE.ShaderMaterial({
    transparent: true,
    depthWrite: false,
    depthTest: true,
    blending: THREE.AdditiveBlending,
    uniforms: {
        uEchoOrigin: { value: echoOrigins },
        uEchoTime: { value: echoTimes },
        uEchoColor: { value: echoColors },
        uEchoRange: { value: echoRanges },
        uEchoForward: { value: echoForwards },
        uEchoCone: { value: echoCones },
        uWalls: { value: wallUniform },
        uSpeed: { value: 9.0 },
        uFadeMul: { value: 2.0 },
    },
    vertexShader: `
        varying vec3 vWorldPos;
        void main() {
            vec4 wp = modelMatrix * vec4(position, 1.0);
            vWorldPos = wp.xyz;
            gl_Position = projectionMatrix * viewMatrix * wp;
        }
    `,
    fragmentShader: `
        precision highp float;
        varying vec3 vWorldPos;
        uniform vec3 uEchoOrigin[${MAX_ECHOES}];
        uniform float uEchoTime[${MAX_ECHOES}];
        uniform vec3 uEchoColor[${MAX_ECHOES}];
        uniform float uEchoRange[${MAX_ECHOES}];
        uniform vec2 uEchoForward[${MAX_ECHOES}];
        uniform float uEchoCone[${MAX_ECHOES}];
        uniform vec4 uWalls[${MAX_WALLS}];
        uniform float uSpeed;
        uniform float uFadeMul;
        const float THICKNESS = 1.0;

        bool rayBlockedByAABB(vec2 a, vec2 b, vec4 w) {
            if (w.x > w.z) return false; // degenerate
            // if origin is inside this wall, don't count it
            if (a.x >= w.x && a.x <= w.z && a.y >= w.y && a.y <= w.w) return false;
            vec2 d = b - a;
            vec2 safe = vec2(
                abs(d.x) < 0.0001 ? 0.0001 : d.x,
                abs(d.y) < 0.0001 ? 0.0001 : d.y
            );
            vec2 inv = 1.0 / safe;
            vec2 t1 = (w.xy - a) * inv;
            vec2 t2 = (w.zw - a) * inv;
            vec2 tMin2 = min(t1, t2);
            vec2 tMax2 = max(t1, t2);
            float tEnter = max(tMin2.x, tMin2.y);
            float tExit  = min(tMax2.x, tMax2.y);
            if (tEnter > tExit) return false;
            // Ray tangent to surface (tEnter ≈ 1) means fragment is on near face → visible.
            // Ray passes through AABB interior (tEnter < 1) → fragment is on back/side edge → blocked.
            if (tEnter >= 0.999 || tExit <= 0.0) return false;
            return true;
        }

        void main() {
            vec3 col = vec3(0.0);
            vec2 frag2D = vWorldPos.xz;

            for (int i = 0; i < ${MAX_ECHOES}; i++) {
                float t = uEchoTime[i];
                if (t < 0.0) continue;

                vec2 origin2D = uEchoOrigin[i].xz;

                bool blocked = false;
                for (int j = 0; j < ${MAX_WALLS}; j++) {
                    if (rayBlockedByAABB(origin2D, frag2D, uWalls[j])) {
                        blocked = true;
                        break;
                    }
                }
                if (blocked) continue;

                float range = uEchoRange[i];
                float wavefrontLife = range / uSpeed;
                float totalLife     = wavefrontLife * uFadeMul;
                float d = distance(vWorldPos, uEchoOrigin[i]);
                if (d > range) continue;

                // Directional cone check (omnidirectional if uEchoCone < -1)
                float coneFalloff = 1.0;
                if (uEchoCone[i] > -1.0 && d > 0.001) {
                    vec2 dir = normalize(frag2D - origin2D);
                    float cosA = dot(dir, uEchoForward[i]);
                    coneFalloff = smoothstep(uEchoCone[i] - 0.2, uEchoCone[i] + 0.05, cosA);
                    if (coneFalloff <= 0.0) continue;
                }

                float wavefront = t * uSpeed;
                // ring: fades as wavefront approaches edge
                float ringFade = 1.0 - smoothstep(wavefrontLife * 0.7, wavefrontLife, t);
                float ring = smoothstep(THICKNESS, 0.0, abs(d - wavefront)) * ringFade;
                // afterglow: everything inside the wavefront, fading over totalLife
                float inside = step(d, wavefront);
                float afterglow = inside * (1.0 - smoothstep(0.0, totalLife, t));
                // radial falloff toward edge
                float falloff = 1.0 - smoothstep(range * 0.6, range, d);
                float intensity = (ring * 2.5 + afterglow * 1.2) * falloff * coneFalloff;
                col += uEchoColor[i] * intensity;
            }

            float lit = max(col.r, max(col.g, col.b));
            gl_FragColor = vec4(col, min(lit, 1.0));
        }
    `,
});

// ----- Level (walls as line-edges, floor grid) -----
const walls = [];

const solidMat = new THREE.MeshBasicMaterial({
    color: 0x000000,
    polygonOffset: true,
    polygonOffsetFactor: 1,
    polygonOffsetUnits: 2,
});
const GRID_STEP = 0.125;

// Build a box wireframe with interior grid lines on all 5 visible faces (bottom skipped).
function buildBoxWireGeom(w, h, d, step) {
    const hw = w / 2, hh = h / 2, hd = d / 2;
    const pts = [];
    const eps = 1e-4;
    function lineX(y, z, sign) { pts.push(-hw, y, z * sign, hw, y, z * sign); }
    function lineY(x, z, sign) { pts.push(x * sign, -hh, z, x * sign, hh, z); }
    function lineZ(x, y, sign) { pts.push(x, y * sign, -hd, x, y * sign, hd); }

    // Front (z=+hd) and back (z=-hd): grid in XY
    for (const zs of [1, -1]) {
        for (let x = -hw; x <= hw + eps; x += step) pts.push(x, -hh, hd * zs, x, hh, hd * zs);
        for (let y = -hh; y <= hh + eps; y += step) pts.push(-hw, y, hd * zs, hw, y, hd * zs);
    }
    // Right (x=+hw) and left (x=-hw): grid in YZ
    for (const xs of [1, -1]) {
        for (let y = -hh; y <= hh + eps; y += step) pts.push(hw * xs, y, -hd, hw * xs, y, hd);
        for (let z = -hd; z <= hd + eps; z += step) pts.push(hw * xs, -hh, z, hw * xs, hh, z);
    }
    // Top (y=+hh): grid in XZ
    for (let x = -hw; x <= hw + eps; x += step) pts.push(x, hh, -hd, x, hh, hd);
    for (let z = -hd; z <= hd + eps; z += step) pts.push(-hw, hh, z, hw, hh, z);

    const geom = new THREE.BufferGeometry();
    geom.setAttribute('position', new THREE.Float32BufferAttribute(pts, 3));
    return geom;
}

function addBox(cx, cy, w, d, h = 1.5) {
    const box = new THREE.BoxGeometry(w, h, d);
    const solid = new THREE.Mesh(box, solidMat);
    solid.position.set(cx, h / 2, cy);
    scene.add(solid);
    const lines = new THREE.LineSegments(buildBoxWireGeom(w, h, d, GRID_STEP), echoMaterial);
    lines.position.set(cx, h / 2, cy);
    lines.renderOrder = 1;
    scene.add(lines);
    const minX = cx - w / 2, minY = cy - d / 2, maxX = cx + w / 2, maxY = cy + d / 2;
    walls.push({ minX, minY, maxX, maxY });
    const idx = walls.length - 1;
    if (idx < MAX_WALLS) wallUniform[idx].set(minX, minY, maxX, maxY);
}

function addGrid(y, size, step) {
    const positions = [];
    for (let i = -size; i <= size; i += step) {
        positions.push(i, y, -size, i, y, size);
        positions.push(-size, y, i, size, y, i);
    }
    const g = new THREE.BufferGeometry();
    g.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
    const grid = new THREE.LineSegments(g, echoMaterial);
    grid.renderOrder = 1;
    scene.add(grid);
}
function addFloorGrid(size, step) { addGrid(0, size, step); }

function addCeiling(size, y) {
    const geom = new THREE.PlaneGeometry(size * 2, size * 2);
    const mesh = new THREE.Mesh(geom, solidMat);
    mesh.rotation.x = Math.PI / 2;  // face downward
    mesh.position.set(0, y, 0);
    scene.add(mesh);
}

// Smell zone — colored vapor hanging in the air (drifting particle cloud)
const smellZones = [];
function addSmellZone(cx, cy, radius, color) {
    const N = 80;
    const positions = new Float32Array(N * 3);
    const velocities = new Array(N);
    function spawnParticle(i, startYRand) {
        const r = Math.sqrt(Math.random()) * radius;
        const a = Math.random() * Math.PI * 2;
        positions[i*3]   = cx + r * Math.cos(a);
        positions[i*3+1] = startYRand ? Math.random() * 2.0 : 0.05 + Math.random() * 0.2;
        positions[i*3+2] = cy + r * Math.sin(a);
        velocities[i] = {
            vy: 0.08 + Math.random() * 0.12,
            dx: (Math.random() - 0.5) * 0.08,
            dz: (Math.random() - 0.5) * 0.08,
        };
    }
    for (let i = 0; i < N; i++) spawnParticle(i, true);
    const geom = new THREE.BufferGeometry();
    geom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    const mat = new THREE.PointsMaterial({
        color, size: 0.22, transparent: true, opacity: 0.55,
        blending: THREE.AdditiveBlending, depthWrite: false,
        sizeAttenuation: true,
    });
    const points = new THREE.Points(geom, mat);
    scene.add(points);
    smellZones.push({ cx, cy, radius, positions, velocities, geom, mat, spawnParticle });
}

function updateSmellZones(dt) {
    for (const s of smellZones) {
        const N = s.velocities.length;
        for (let i = 0; i < N; i++) {
            const v = s.velocities[i];
            s.positions[i*3]     += v.dx * dt;
            s.positions[i*3 + 1] += v.vy * dt;
            s.positions[i*3 + 2] += v.dz * dt;
            if (s.positions[i*3 + 1] > 2.25) s.spawnParticle(i, false);
        }
        s.geom.attributes.position.needsUpdate = true;
        // distance-based fade: full opacity close, invisible beyond cfg.smellRange
        const distToDog = Math.hypot(s.cx - dog.x, s.cy - dog.y);
        const strength = 1.0 - Math.min(1, Math.max(0,
            (distToDog - cfg.smellRange * 0.3) / (cfg.smellRange * 0.7)
        ));
        s.mat.opacity = 0.6 * strength;
        s.mat.visible = strength > 0.01;
    }
}

addFloorGrid(12, 0.125);
addGrid(2.4, 12, 0.125);   // ceiling grid (lit by echoes)
addCeiling(12, 2.4);       // solid ceiling — blocks view upward

// Smell zones (decorative for now, represent regions of smell)
addSmellZone(6, -5, 1.5, 0x2e8b42);   // owner's smell (green)
addSmellZone(-7.5, -7, 1.6, 0xaa2020); // stove/smoke (red)
addSmellZone(8.5, 6.5, 1.6, 0x3060a0); // water/tub (blue)
addSmellZone(-8, 6, 1.2, 0x806020);    // dining table (warm)

// ----- House layout -----
// Coordinate system (top-down): X right, Y down.
// House outline: (-10,-8) to (10,8). One bedroom (NE), bathroom (SE), open living/kitchen (west).
const T = 0.3;  // wall thickness
const WH = 2.4; // wall height
// Outer walls
addBox(0, -8, 20, T, WH);   // north
addBox(0,  8, 20, T, WH);   // south
addBox(-10, 0, T, 16, WH);  // west
addBox( 10, 0, T, 16, WH);  // east
// Vertical interior wall at x=0, with doorway from y=-2 to y=2
addBox(0, -5, T, 6, WH);
addBox(0,  5, T, 6, WH);
// Horizontal interior wall at y=0 (right half only), with doorway from x=4 to x=6
addBox(2, 0, 4, T, WH);
addBox(8, 0, 4, T, WH);

// ----- Furniture (low primitives) -----
// Living room / kitchen (west half)
addBox(-8.5, -7, 0.9, 0.9, 1.3); // fridge
addBox(-7,   -7, 1.2, 0.7, 0.85);// stove
addBox(-4,   -6, 2.4, 1.0, 0.8); // counter
addBox(-6,    3, 3.2, 1.2, 0.5); // sofa
addBox(-4,    1, 1.4, 1.4, 0.45);// coffee table
addBox(-8,    6, 1.5, 2.5, 0.75);// dining table
// NE bedroom (owner's bedroom — goal)
addBox( 7,   -5, 3.2, 2.0, 0.5); // bed
addBox( 2.5, -7, 1.0, 0.6, 0.8); // nightstand
// SE bathroom
addBox( 8.5,  6.5, 1.2, 1.2, 0.5); // tub
addBox( 8.5,  2.5, 0.8, 0.8, 0.7); // toilet
addBox( 2.5,  6,   1.0, 0.8, 0.9); // sink

// ----- Dog (camera carrier + collision) -----
const dog = {
    x: -5, y: -3, yaw: 0, pitch: 0,
    radius: 0.3, speed: 3.2,
};

function dogCollides(x, y) {
    for (const w of walls) {
        const cx = Math.max(w.minX, Math.min(x, w.maxX));
        const cy = Math.max(w.minY, Math.min(y, w.maxY));
        const dx = x - cx, dy = y - cy;
        if (dx * dx + dy * dy < dog.radius * dog.radius) return true;
    }
    return false;
}

function moveDog(ix, iy, dt) {
    if (ix === 0 && iy === 0) return;
    const s = Math.sin(dog.yaw), c = Math.cos(dog.yaw);
    const dx = (iy * s + ix * c) * dog.speed * dt;
    const dy = (iy * c - ix * s) * dog.speed * dt;
    const nx = dog.x + dx;
    if (!dogCollides(nx, dog.y)) dog.x = nx;
    const ny = dog.y + dy;
    if (!dogCollides(dog.x, ny)) dog.y = ny;
}

// ----- Input (old-style handlers) -----
const keys = new Set();
let mouseDX = 0, mouseDY = 0, locked = false;

const BARK_COOLDOWN = 1.2;
let lastBarkTime = -999;
let flashT = 0;
let elapsed = 0;

const echoes = [];
for (let i = 0; i < MAX_ECHOES; i++) {
    echoes.push({
        origin: new THREE.Vector3(),
        color: new THREE.Vector3(0.9, 0.97, 1.0),
        range: 4.5,
        forward: new THREE.Vector2(0, 1),
        cone: -2.0,
        start: -999, active: false,
    });
}

const COLOR_BARK    = new THREE.Vector3(0.9, 0.97, 1.0);
const COLOR_OWNER   = new THREE.Vector3(0.1, 0.55, 0.15);   // green
const COLOR_DANGER  = new THREE.Vector3(0.65, 0.08, 0.05);  // red
const COLOR_SOUND   = new THREE.Vector3(0.55, 0.45, 0.05);  // yellow

const cfg = {
    barkRange: 3.5,
    barkCooldown: 2.2,
    ownerRange: 2.5,
    ownerPeriod: 2.0,
    signalSpeed: 4.0,
    mouseSens: 0.0025,
    flashOnBark: 0.7,
    fadeMul: 2.0,
    barkCone: 120,
    smellRange: 5.0, // dog sees vapor only within this distance
};

function spawnEcho(x, y, z, color, range, forwardX, forwardZ, coneHalfDeg) {
    let slot = echoes.find(e => !e.active);
    if (!slot) slot = echoes.reduce((a, b) => a.start < b.start ? a : b);
    slot.origin.set(x, y, z);
    slot.color.copy(color);
    slot.range = range;
    if (typeof coneHalfDeg === 'number') {
        slot.forward.set(forwardX, forwardZ).normalize();
        slot.cone = Math.cos(coneHalfDeg * Math.PI / 180);
    } else {
        slot.cone = -2.0; // omnidirectional
    }
    slot.start = elapsed;
    slot.active = true;
}

function fireBark() {
    if (elapsed - lastBarkTime < cfg.barkCooldown) return;
    lastBarkTime = elapsed;
    // Directional: 120° cone = 60° half-angle, forward = dog's facing
    const fx = Math.sin(dog.yaw);
    const fz = Math.cos(dog.yaw);
    spawnEcho(dog.x, 0.6, dog.y, COLOR_BARK, cfg.barkRange, fx, fz, cfg.barkCone / 2);
    flashT = cfg.flashOnBark;
}

// ----- Owner (goal) -----
const owner = {
    x: 6, y: -5,
    lastPulse: -10,
};

// ----- Dangers (red, touch = lose) -----
const dangers = [
    { x: -7.5, y: -7, r: 0.7, label: 'stove',   period: 2.8, lastPulse: 0 },
    { x:  8.5, y:  6.5, r: 0.7, label: 'tub',   period: 3.2, lastPulse: 1 },
];

// ----- Ambient sound sources (yellow, decorative) -----
const sounds = [
    { x: -9,  y:  7,  range: 2.5, period: 3.0, lastPulse: 0,   label: 'bird window' },
    { x:  4,  y:  7,  range: 2.0, period: 4.5, lastPulse: 1.5, label: 'clock tick' },
    { x:  9,  y: -7,  range: 2.0, period: 5.0, lastPulse: 2.8, label: 'bird' },
];

let lost = false;

// Visible owner silhouette — lying body (torso + head). Solid body for camera occlusion,
// line edges on top lit by echoes.
(function addOwnerMesh() {
    const group = new THREE.Group();
    group.position.set(owner.x, 0, owner.y);
    function addPart(w, h, d, px, py, pz) {
        const geom = new THREE.BoxGeometry(w, h, d);
        const solid = new THREE.Mesh(geom, solidMat);
        solid.position.set(px, py, pz);
        group.add(solid);
        const lines = new THREE.LineSegments(new THREE.EdgesGeometry(geom), echoMaterial);
        lines.position.set(px, py, pz);
        lines.renderOrder = 1;
        group.add(lines);
    }
    addPart(1.7, 0.35, 0.6, 0, 0.18, 0);     // torso
    addPart(0.45, 0.35, 0.45, 1.05, 0.18, 0); // head
    scene.add(group);
})();
let won = false;
function showWin() {
    const el = document.getElementById('winOverlay');
    if (el) el.style.display = 'flex';
}
function showLose(what) {
    const el = document.getElementById('loseOverlay');
    const detail = document.getElementById('loseDetail');
    if (detail) detail.textContent = `You hit the ${what}.`;
    if (el) el.style.display = 'flex';
}

// Use e.code (physical key) — layout-independent (RU/EN/etc.)
window.onkeydown = (e) => {
    keys.add(e.code);
    if (e.code === 'Space') {
        fireBark();
        e.preventDefault();
    }
};
window.onkeyup = (e) => { keys.delete(e.code); };
window.onblur = () => keys.clear();

canvas.onmousedown = (e) => {
    fireBark();
    if (!locked) canvas.requestPointerLock();
    e.preventDefault();
};
document.onpointerlockchange = () => {
    locked = document.pointerLockElement === canvas;
};
document.onmousemove = (e) => {
    if (!locked) return;
    mouseDX += e.movementX;
    mouseDY += e.movementY;
};

function readMove() {
    let x = 0, y = 0;
    if (keys.has('KeyW') || keys.has('ArrowUp')) y += 1;
    if (keys.has('KeyS') || keys.has('ArrowDown')) y -= 1;
    if (keys.has('KeyA') || keys.has('ArrowLeft')) x += 1;
    if (keys.has('KeyD') || keys.has('ArrowRight')) x -= 1;
    const l = Math.hypot(x, y);
    if (l > 0) { x /= l; y /= l; }
    return [x, y];
}

// ----- Postprocess: noise + flash overlay -----
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));

const NoiseShader = {
    uniforms: {
        tDiffuse: { value: null },
        uTime: { value: 0 },
        uFlash: { value: 0 },
    },
    vertexShader: `
        varying vec2 vUv;
        void main() {
            vUv = uv;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
    `,
    fragmentShader: `
        precision highp float;
        uniform sampler2D tDiffuse;
        uniform float uTime;
        uniform float uFlash;
        varying vec2 vUv;
        float hash(vec2 p) {
            p = fract(p * vec2(123.34, 456.21));
            p += dot(p, p + 45.32);
            return fract(p.x * p.y);
        }
        void main() {
            vec3 col = texture2D(tDiffuse, vUv).rgb;
            float n = hash(vUv * vec2(1920.0, 1080.0) + uTime * 60.0);
            col += vec3((n - 0.4) * 0.18);
            float n2 = hash(floor(vUv * 80.0) * 0.1 + floor(uTime * 8.0));
            col += vec3(n2 * 0.05);
            col += 0.04;
            col += sin(vUv.y * 480.0 + uTime * 3.0) * 0.02;
            col += vec3(uFlash * 0.35);
            vec2 q = vUv - 0.5;
            col *= 1.0 - dot(q, q) * 0.9;
            gl_FragColor = vec4(col, 1.0);
        }
    `,
};
const noisePass = new ShaderPass(NoiseShader);
composer.addPass(noisePass);

// ----- Main loop -----
const clock = new THREE.Clock();

function animate() {
    const dt = Math.min(clock.getDelta(), 1 / 30);
    elapsed += dt;

    // look
    dog.yaw -= mouseDX * cfg.mouseSens;
    dog.pitch -= mouseDY * cfg.mouseSens;
    dog.pitch = Math.max(-0.8, Math.min(0.4, dog.pitch));
    mouseDX = 0; mouseDY = 0;

    // move
    const [ix, iy] = readMove();
    moveDog(ix, iy, dt);

    // Owner auto-pulse (green, navigation aid)
    if (!won && !lost && elapsed - owner.lastPulse > cfg.ownerPeriod) {
        spawnEcho(owner.x, 0.6, owner.y, COLOR_OWNER, cfg.ownerRange);
        owner.lastPulse = elapsed;
    }

    // Dangers auto-pulse (red)
    if (!won && !lost) {
        for (const d of dangers) {
            if (elapsed - d.lastPulse > d.period) {
                spawnEcho(d.x, 0.5, d.y, COLOR_DANGER, 2.5);
                d.lastPulse = elapsed;
            }
        }
    }

    // Ambient sounds (yellow)
    if (!won && !lost) {
        for (const s of sounds) {
            if (elapsed - s.lastPulse > s.period) {
                spawnEcho(s.x, 0.8, s.y, COLOR_SOUND, s.range);
                s.lastPulse = elapsed;
            }
        }
    }

    // Win check — dog reached owner
    if (!won && !lost) {
        const d = Math.hypot(dog.x - owner.x, dog.y - owner.y);
        if (d < 1.2) {
            won = true;
            showWin();
        }
        // Lose check — touched a danger
        for (const dg of dangers) {
            const dd = Math.hypot(dog.x - dg.x, dog.y - dg.y);
            if (dd < dg.r + dog.radius) {
                lost = true;
                showLose(dg.label);
                break;
            }
        }
    }

    // echoes — expire after total life (fadeMul * wavefront life, matches shader)
    for (const e of echoes) {
        if (e.active && elapsed - e.start > cfg.fadeMul * e.range / cfg.signalSpeed) e.active = false;
    }
    echoMaterial.uniforms.uSpeed.value = cfg.signalSpeed;
    echoMaterial.uniforms.uFadeMul.value = cfg.fadeMul;
    const origUniform = echoMaterial.uniforms.uEchoOrigin.value;
    const colorUniform = echoMaterial.uniforms.uEchoColor.value;
    const rangeUniform = echoMaterial.uniforms.uEchoRange.value;
    const forwardUniform = echoMaterial.uniforms.uEchoForward.value;
    const coneUniform = echoMaterial.uniforms.uEchoCone.value;
    const timeUniform = [];
    for (let i = 0; i < MAX_ECHOES; i++) {
        const e = echoes[i];
        if (e.active) {
            origUniform[i].copy(e.origin);
            colorUniform[i].copy(e.color);
            rangeUniform[i] = e.range;
            forwardUniform[i].copy(e.forward);
            coneUniform[i] = e.cone;
            timeUniform.push(elapsed - e.start);
        } else {
            origUniform[i].set(0, -100, 0);
            coneUniform[i] = -2.0;
            timeUniform.push(-1);
        }
    }
    echoMaterial.uniforms.uEchoTime.value = timeUniform;

    // camera at dog head
    const headY = 0.55;
    camera.position.set(dog.x, headY, dog.y);
    const fx = Math.sin(dog.yaw) * Math.cos(dog.pitch);
    const fy = Math.sin(dog.pitch);
    const fz = Math.cos(dog.yaw) * Math.cos(dog.pitch);
    camera.lookAt(dog.x + fx, headY + fy, dog.y + fz);

    updateSmellZones(dt);

    flashT = Math.max(0, flashT - dt * 0.8);
    noisePass.uniforms.uTime.value = elapsed;
    noisePass.uniforms.uFlash.value = flashT;

    composer.render();
    requestAnimationFrame(animate);
}

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
    composer.setSize(window.innerWidth, window.innerHeight);
});

animate();

// ----- Settings panel -----
(function buildPanel() {
    const params = [
        { key: 'barkRange',     label: 'Bark range',     min: 1,    max: 15,   step: 0.5 },
        { key: 'barkCooldown',  label: 'Bark cooldown',  min: 0.2,  max: 3,    step: 0.1 },
        { key: 'ownerRange',    label: 'Owner range',    min: 2,    max: 20,   step: 0.5 },
        { key: 'ownerPeriod',   label: 'Owner period',   min: 1,    max: 10,   step: 0.5 },
        { key: 'signalSpeed',   label: 'Signal speed',   min: 2,    max: 25,   step: 0.5 },
        { key: 'mouseSens',     label: 'Mouse sens',     min: 0.0005, max: 0.01, step: 0.0005 },
        { key: 'flashOnBark',   label: 'Bark flash',     min: 0,    max: 1,    step: 0.05 },
        { key: 'fadeMul',       label: 'Fade length',    min: 0.5,  max: 6,    step: 0.1 },
        { key: 'barkCone',      label: 'Bark cone (deg)',min: 30,   max: 360,  step: 5 },
        { key: 'smellRange',    label: 'Smell range',    min: 1,    max: 12,   step: 0.5 },
    ];
    const body = document.getElementById('panelBody');
    for (const p of params) {
        const row = document.createElement('div');
        row.className = 'row';
        const label = document.createElement('label');
        label.textContent = p.label;
        const input = document.createElement('input');
        input.type = 'range';
        input.min = p.min; input.max = p.max; input.step = p.step;
        input.value = cfg[p.key];
        const val = document.createElement('span');
        val.className = 'val';
        val.textContent = cfg[p.key];
        input.addEventListener('input', () => {
            cfg[p.key] = parseFloat(input.value);
            val.textContent = input.value;
            try { localStorage.setItem('ld59_cfg', JSON.stringify(cfg)); } catch (e) {}
        });
        row.appendChild(label);
        row.appendChild(input);
        row.appendChild(val);
        body.appendChild(row);
    }
    const panel = document.getElementById('panel');
    document.getElementById('panelToggle').addEventListener('click', () => {
        panel.classList.toggle('open');
    });
    // Auto-bark while panel is open, respecting cfg.barkCooldown
    setInterval(() => {
        if (panel.classList.contains('open')) fireBark();
    }, 100);
    // Load saved
    try {
        const saved = JSON.parse(localStorage.getItem('ld59_cfg') || 'null');
        if (saved) {
            Object.assign(cfg, saved);
            for (const input of body.querySelectorAll('input[type=range]')) {
                const key = input.previousSibling.textContent;
                const p = params.find(x => x.label === key);
                if (p) {
                    input.value = cfg[p.key];
                    input.nextSibling.textContent = cfg[p.key];
                }
            }
        }
    } catch (e) {}
})();
</script>
