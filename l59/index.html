<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Good Boy — LD59</title>
<style>
    html, body {
        margin: 0; padding: 0; height: 100%;
        background: #000; overflow: hidden;
        font-family: system-ui, sans-serif; color: #aaa;
        cursor: crosshair;
    }
    #app { width: 100vw; height: 100vh; }
    #hud {
        position: fixed; top: 12px; left: 12px;
        padding: 8px 12px;
        background: rgba(0,0,0,0.55);
        border: 1px solid #222;
        font-size: 12px;
        pointer-events: none;
        letter-spacing: 0.05em;
    }
    #hud b { color: #c9d9ff; }
    #reticle {
        position: fixed; top: 50%; left: 50%;
        width: 4px; height: 4px; margin: -2px 0 0 -2px;
        background: #555; border-radius: 50%;
        pointer-events: none;
    }
</style>
<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/"
    }
}
</script>
</head>
<body>
<div id="app"></div>
<div id="hud">
    <div><b>CLICK</b> — capture mouse</div>
    <div><b>WASD</b> — move</div>
    <div><b>MOUSE</b> — look</div>
    <div><b>SPACE</b> — bark</div>
</div>
<div id="reticle"></div>

<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';

// ----- Renderer, scene, camera -----
const app = document.getElementById('app');
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x000000, 1);
app.appendChild(renderer.domElement);
const canvas = renderer.domElement;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.05, 60);

// ----- Echo shader material (wireframe lines that light up as wave passes) -----
const MAX_ECHOES = 4;
const MAX_WALLS = 24;

const echoOrigins = [];
const echoTimes = [];
for (let i = 0; i < MAX_ECHOES; i++) {
    echoOrigins.push(new THREE.Vector3(0, -100, 0));
    echoTimes.push(-1);
}
const wallUniform = [];
for (let i = 0; i < MAX_WALLS; i++) {
    // degenerate AABB — min>max so ray tests always miss until we fill
    wallUniform.push(new THREE.Vector4(1e6, 1e6, -1e6, -1e6));
}

const echoMaterial = new THREE.ShaderMaterial({
    transparent: true,
    depthWrite: false,
    depthTest: false,
    blending: THREE.AdditiveBlending,
    uniforms: {
        uEchoOrigin: { value: echoOrigins },
        uEchoTime: { value: echoTimes },
        uWalls: { value: wallUniform },
    },
    vertexShader: `
        varying vec3 vWorldPos;
        void main() {
            vec4 wp = modelMatrix * vec4(position, 1.0);
            vWorldPos = wp.xyz;
            gl_Position = projectionMatrix * viewMatrix * wp;
        }
    `,
    fragmentShader: `
        precision highp float;
        varying vec3 vWorldPos;
        uniform vec3 uEchoOrigin[${MAX_ECHOES}];
        uniform float uEchoTime[${MAX_ECHOES}];
        uniform vec4 uWalls[${MAX_WALLS}];
        const float SPEED = 9.0;
        const float DURATION = 4.0;
        const float THICKNESS = 1.4;

        bool rayBlockedByAABB(vec2 a, vec2 b, vec4 w) {
            if (w.x > w.z) return false; // degenerate
            // if origin is inside this wall, don't count it
            if (a.x >= w.x && a.x <= w.z && a.y >= w.y && a.y <= w.w) return false;
            vec2 d = b - a;
            vec2 safe = vec2(
                abs(d.x) < 0.0001 ? 0.0001 : d.x,
                abs(d.y) < 0.0001 ? 0.0001 : d.y
            );
            vec2 inv = 1.0 / safe;
            vec2 t1 = (w.xy - a) * inv;
            vec2 t2 = (w.zw - a) * inv;
            vec2 tMin2 = min(t1, t2);
            vec2 tMax2 = max(t1, t2);
            float tEnter = max(tMin2.x, tMin2.y);
            float tExit  = min(tMax2.x, tMax2.y);
            if (tEnter > tExit) return false;
            // Ray tangent to surface (tEnter ≈ 1) means fragment is on near face → visible.
            // Ray passes through AABB interior (tEnter < 1) → fragment is on back/side edge → blocked.
            if (tEnter >= 0.999 || tExit <= 0.0) return false;
            return true;
        }

        void main() {
            float lit = 0.0;
            vec2 frag2D = vWorldPos.xz;

            for (int i = 0; i < ${MAX_ECHOES}; i++) {
                float t = uEchoTime[i];
                if (t < 0.0) continue;

                vec2 origin2D = uEchoOrigin[i].xz;

                // Occlusion: does any wall block line origin→fragment?
                bool blocked = false;
                for (int j = 0; j < ${MAX_WALLS}; j++) {
                    if (rayBlockedByAABB(origin2D, frag2D, uWalls[j])) {
                        blocked = true;
                        break;
                    }
                }
                if (blocked) continue;

                float wavefront = t * SPEED;
                float d = distance(vWorldPos, uEchoOrigin[i]);
                float ring = smoothstep(THICKNESS, 0.0, abs(d - wavefront));
                float inside = step(d, wavefront);
                float afterglow = inside * (1.0 - smoothstep(0.0, DURATION, t));
                lit = max(lit, ring * 2.5 + afterglow * 1.2);
            }

            vec3 col = vec3(0.9, 0.97, 1.0);
            gl_FragColor = vec4(col * lit, min(lit, 1.0));
        }
    `,
});

// ----- Level (walls as line-edges, floor grid) -----
const walls = [];

function addBox(cx, cy, w, d, h = 1.5) {
    const box = new THREE.BoxGeometry(w, h, d);
    const edges = new THREE.EdgesGeometry(box);
    const mesh = new THREE.LineSegments(edges, echoMaterial);
    mesh.position.set(cx, h / 2, cy);
    scene.add(mesh);
    const minX = cx - w / 2, minY = cy - d / 2, maxX = cx + w / 2, maxY = cy + d / 2;
    walls.push({ minX, minY, maxX, maxY });
    // mirror to shader uniform (for ray occlusion of echo)
    const idx = walls.length - 1;
    if (idx < MAX_WALLS) wallUniform[idx].set(minX, minY, maxX, maxY);
}

function addFloorGrid(size, step) {
    const positions = [];
    for (let i = -size; i <= size; i += step) {
        positions.push(i, 0, -size, i, 0, size);
        positions.push(-size, 0, i, size, 0, i);
    }
    const g = new THREE.BufferGeometry();
    g.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
    scene.add(new THREE.LineSegments(g, echoMaterial));
}

addFloorGrid(12, 0.125);

// ----- House layout -----
// Coordinate system (top-down): X right, Y down.
// House outline: (-10,-8) to (10,8). One bedroom (NE), bathroom (SE), open living/kitchen (west).
const T = 0.3;  // wall thickness
const WH = 2.4; // wall height
// Outer walls
addBox(0, -8, 20, T, WH);   // north
addBox(0,  8, 20, T, WH);   // south
addBox(-10, 0, T, 16, WH);  // west
addBox( 10, 0, T, 16, WH);  // east
// Vertical interior wall at x=0, with doorway from y=-2 to y=2
addBox(0, -5, T, 6, WH);
addBox(0,  5, T, 6, WH);
// Horizontal interior wall at y=0 (right half only), with doorway from x=4 to x=6
addBox(2, 0, 4, T, WH);
addBox(8, 0, 4, T, WH);

// ----- Furniture (low primitives) -----
// Living room / kitchen (west half)
addBox(-8.5, -7, 0.9, 0.9, 1.3); // fridge
addBox(-7,   -7, 1.2, 0.7, 0.85);// stove
addBox(-4,   -6, 2.4, 1.0, 0.8); // counter
addBox(-6,    3, 3.2, 1.2, 0.5); // sofa
addBox(-4,    1, 1.4, 1.4, 0.45);// coffee table
addBox(-8,    6, 1.5, 2.5, 0.75);// dining table
// NE bedroom (owner's bedroom — goal)
addBox( 7,   -5, 3.2, 2.0, 0.5); // bed
addBox( 2.5, -7, 1.0, 0.6, 0.8); // nightstand
// SE bathroom
addBox( 8.5,  6.5, 1.2, 1.2, 0.5); // tub
addBox( 8.5,  2.5, 0.8, 0.8, 0.7); // toilet
addBox( 2.5,  6,   1.0, 0.8, 0.9); // sink

// ----- Dog (camera carrier + collision) -----
const dog = {
    x: -5, y: -3, yaw: 0, pitch: 0,
    radius: 0.3, speed: 3.2,
};

function dogCollides(x, y) {
    for (const w of walls) {
        const cx = Math.max(w.minX, Math.min(x, w.maxX));
        const cy = Math.max(w.minY, Math.min(y, w.maxY));
        const dx = x - cx, dy = y - cy;
        if (dx * dx + dy * dy < dog.radius * dog.radius) return true;
    }
    return false;
}

function moveDog(ix, iy, dt) {
    if (ix === 0 && iy === 0) return;
    const s = Math.sin(dog.yaw), c = Math.cos(dog.yaw);
    const dx = (iy * s + ix * c) * dog.speed * dt;
    const dy = (iy * c - ix * s) * dog.speed * dt;
    const nx = dog.x + dx;
    if (!dogCollides(nx, dog.y)) dog.x = nx;
    const ny = dog.y + dy;
    if (!dogCollides(dog.x, ny)) dog.y = ny;
}

// ----- Input (old-style handlers) -----
const keys = new Set();
let mouseDX = 0, mouseDY = 0, locked = false;

const BARK_COOLDOWN = 1.2;
let lastBarkTime = -999;
let flashT = 0;
let elapsed = 0;

const echoes = [];
for (let i = 0; i < MAX_ECHOES; i++) echoes.push({ origin: new THREE.Vector3(), start: -999, active: false });

function fireBark() {
    if (elapsed - lastBarkTime < BARK_COOLDOWN) return;
    lastBarkTime = elapsed;
    let slot = echoes.find(e => !e.active);
    if (!slot) slot = echoes.reduce((a, b) => a.start < b.start ? a : b);
    slot.origin.set(dog.x, 0.6, dog.y);
    slot.start = elapsed;
    slot.active = true;
    flashT = 0.25;
}

window.onkeydown = (e) => {
    keys.add(e.key.toLowerCase());
    if (e.code === 'Space' || e.key === ' ') {
        fireBark();
        e.preventDefault();
    }
};
window.onkeyup = (e) => { keys.delete(e.key.toLowerCase()); };
window.onblur = () => keys.clear();

canvas.onmousedown = (e) => {
    fireBark();
    if (!locked) canvas.requestPointerLock();
    e.preventDefault();
};
document.onpointerlockchange = () => {
    locked = document.pointerLockElement === canvas;
};
document.onmousemove = (e) => {
    if (!locked) return;
    mouseDX += e.movementX;
    mouseDY += e.movementY;
};

function readMove() {
    let x = 0, y = 0;
    if (keys.has('w') || keys.has('arrowup')) y += 1;
    if (keys.has('s') || keys.has('arrowdown')) y -= 1;
    if (keys.has('a') || keys.has('arrowleft')) x += 1;
    if (keys.has('d') || keys.has('arrowright')) x -= 1;
    const l = Math.hypot(x, y);
    if (l > 0) { x /= l; y /= l; }
    return [x, y];
}

// ----- Postprocess: noise + flash overlay -----
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));

const NoiseShader = {
    uniforms: {
        tDiffuse: { value: null },
        uTime: { value: 0 },
        uFlash: { value: 0 },
    },
    vertexShader: `
        varying vec2 vUv;
        void main() {
            vUv = uv;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
    `,
    fragmentShader: `
        precision highp float;
        uniform sampler2D tDiffuse;
        uniform float uTime;
        uniform float uFlash;
        varying vec2 vUv;
        float hash(vec2 p) {
            p = fract(p * vec2(123.34, 456.21));
            p += dot(p, p + 45.32);
            return fract(p.x * p.y);
        }
        void main() {
            vec3 col = texture2D(tDiffuse, vUv).rgb;
            float n = hash(vUv * vec2(1920.0, 1080.0) + uTime * 60.0);
            col += vec3((n - 0.4) * 0.18);
            float n2 = hash(floor(vUv * 80.0) * 0.1 + floor(uTime * 8.0));
            col += vec3(n2 * 0.05);
            col += 0.04;
            col += sin(vUv.y * 480.0 + uTime * 3.0) * 0.02;
            col += vec3(uFlash * 0.35);
            vec2 q = vUv - 0.5;
            col *= 1.0 - dot(q, q) * 0.9;
            gl_FragColor = vec4(col, 1.0);
        }
    `,
};
const noisePass = new ShaderPass(NoiseShader);
composer.addPass(noisePass);

// ----- Main loop -----
const ECHO_DURATION = 4.0;
const clock = new THREE.Clock();

function animate() {
    const dt = Math.min(clock.getDelta(), 1 / 30);
    elapsed += dt;

    // look
    dog.yaw -= mouseDX * 0.0025;
    dog.pitch -= mouseDY * 0.0025;
    dog.pitch = Math.max(-0.8, Math.min(0.4, dog.pitch));
    mouseDX = 0; mouseDY = 0;

    // move
    const [ix, iy] = readMove();
    moveDog(ix, iy, dt);

    // echoes
    for (const e of echoes) {
        if (e.active && elapsed - e.start > ECHO_DURATION) e.active = false;
    }
    const origUniform = echoMaterial.uniforms.uEchoOrigin.value;
    const timeUniform = [];
    for (let i = 0; i < MAX_ECHOES; i++) {
        const e = echoes[i];
        if (e.active) {
            origUniform[i].copy(e.origin);
            timeUniform.push(elapsed - e.start);
        } else {
            origUniform[i].set(0, -100, 0);
            timeUniform.push(-1);
        }
    }
    echoMaterial.uniforms.uEchoTime.value = timeUniform;

    // camera at dog head
    const headY = 0.55;
    camera.position.set(dog.x, headY, dog.y);
    const fx = Math.sin(dog.yaw) * Math.cos(dog.pitch);
    const fy = Math.sin(dog.pitch);
    const fz = Math.cos(dog.yaw) * Math.cos(dog.pitch);
    camera.lookAt(dog.x + fx, headY + fy, dog.y + fz);

    flashT = Math.max(0, flashT - dt * 0.8);
    noisePass.uniforms.uTime.value = elapsed;
    noisePass.uniforms.uFlash.value = flashT;

    composer.render();
    requestAnimationFrame(animate);
}

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
    composer.setSize(window.innerWidth, window.innerHeight);
});

animate();
</script>
</body>
</html>
