<style>

        <div class="row"><label>angle</label><input id="camAngle" type="range" min="0" max="360" step="1"><span class="val" id="camAngleVal"></span></div>

<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
const objLoader = new OBJLoader();
const gltfLoader = new GLTFLoader();
function parseGLB(buffer) {
    return new Promise((resolve, reject) => {
        gltfLoader.parse(buffer, '', (gltf) => resolve(gltf.scene), reject);
    });
}

// ----- Renderer, scene, camera -----
const app = document.getElementById('app');
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x000000, 1);
app.appendChild(renderer.domElement);
const canvas = renderer.domElement;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.05, 60);

// ----- Echo shader material (wireframe lines that light up as wave passes) -----
const MAX_ECHOES = 16;
const MAX_WALLS = 24;

const echoOrigins = [];
const echoTimes = [];
const echoColors = [];
const echoRanges = [];
const echoForwards = [];   // vec2 forward direction (xz plane)
const echoCones = [];      // cos(halfAngle); < -1 means omnidirectional
for (let i = 0; i < MAX_ECHOES; i++) {
    echoOrigins.push(new THREE.Vector3(0, -100, 0));
    echoTimes.push(-1);
    echoColors.push(new THREE.Vector3(0.9, 0.97, 1.0));
    echoRanges.push(9.0);
    echoForwards.push(new THREE.Vector2(0, 1));
    echoCones.push(-2.0);
}
const wallUniform = [];
for (let i = 0; i < MAX_WALLS; i++) {
    wallUniform.push(new THREE.Vector4(1e6, 1e6, -1e6, -1e6));
}

const echoMaterial = new THREE.ShaderMaterial({
    transparent: true,
    depthWrite: false,
    depthTest: true,
    blending: THREE.AdditiveBlending,
    uniforms: {
        uEchoOrigin: { value: echoOrigins },
        uEchoTime: { value: echoTimes },
        uEchoColor: { value: echoColors },
        uEchoRange: { value: echoRanges },
        uEchoForward: { value: echoForwards },
        uEchoCone: { value: echoCones },
        uWalls: { value: wallUniform },
        uSpeed: { value: 9.0 },
        uFadeMul: { value: 2.0 },
    },
    vertexShader: `
        varying vec3 vWorldPos;
        void main() {
            vec4 wp = modelMatrix * vec4(position, 1.0);
            vWorldPos = wp.xyz;
            gl_Position = projectionMatrix * viewMatrix * wp;
        }
    `,
    fragmentShader: `
        precision highp float;
        varying vec3 vWorldPos;
        uniform vec3 uEchoOrigin[${MAX_ECHOES}];
        uniform float uEchoTime[${MAX_ECHOES}];
        uniform vec3 uEchoColor[${MAX_ECHOES}];
        uniform float uEchoRange[${MAX_ECHOES}];
        uniform vec2 uEchoForward[${MAX_ECHOES}];
        uniform float uEchoCone[${MAX_ECHOES}];
        uniform vec4 uWalls[${MAX_WALLS}];
        uniform float uSpeed;
        uniform float uFadeMul;
        const float THICKNESS = 1.0;

        bool rayBlockedByAABB(vec2 a, vec2 b, vec4 w) {
            if (w.x > w.z) return false; // degenerate
            // if origin is inside this wall, don't count it
            if (a.x >= w.x && a.x <= w.z && a.y >= w.y && a.y <= w.w) return false;
            vec2 d = b - a;
            vec2 safe = vec2(
                abs(d.x) < 0.0001 ? 0.0001 : d.x,
                abs(d.y) < 0.0001 ? 0.0001 : d.y
            );
            vec2 inv = 1.0 / safe;
            vec2 t1 = (w.xy - a) * inv;
            vec2 t2 = (w.zw - a) * inv;
            vec2 tMin2 = min(t1, t2);
            vec2 tMax2 = max(t1, t2);
            float tEnter = max(tMin2.x, tMin2.y);
            float tExit  = min(tMax2.x, tMax2.y);
            if (tEnter > tExit) return false;
            // Ray tangent to surface (tEnter ≈ 1) means fragment is on near face → visible.
            // Ray passes through AABB interior (tEnter < 1) → fragment is on back/side edge → blocked.
            if (tEnter >= 0.999 || tExit <= 0.0) return false;
            return true;
        }

        void main() {
            vec3 col = vec3(0.0);
            vec2 frag2D = vWorldPos.xz;

            for (int i = 0; i < ${MAX_ECHOES}; i++) {
                float t = uEchoTime[i];
                if (t < 0.0) continue;

                vec2 origin2D = uEchoOrigin[i].xz;

                bool blocked = false;
                for (int j = 0; j < ${MAX_WALLS}; j++) {
                    if (rayBlockedByAABB(origin2D, frag2D, uWalls[j])) {
                        blocked = true;
                        break;
                    }
                }
                if (blocked) continue;

                float range = uEchoRange[i];
                float wavefrontLife = range / uSpeed;
                float totalLife     = wavefrontLife * uFadeMul;
                float d = distance(vWorldPos, uEchoOrigin[i]);
                if (d > range) continue;

                // Directional cone check (omnidirectional if uEchoCone < -1)
                float coneFalloff = 1.0;
                if (uEchoCone[i] > -1.0 && d > 0.001) {
                    vec2 dir = normalize(frag2D - origin2D);
                    float cosA = dot(dir, uEchoForward[i]);
                    coneFalloff = smoothstep(uEchoCone[i] - 0.2, uEchoCone[i] + 0.05, cosA);
                    if (coneFalloff <= 0.0) continue;
                }

                float wavefront = t * uSpeed;
                // ring: fades as wavefront approaches edge
                float ringFade = 1.0 - smoothstep(wavefrontLife * 0.7, wavefrontLife, t);
                float ring = smoothstep(THICKNESS, 0.0, abs(d - wavefront)) * ringFade;
                // afterglow: everything inside the wavefront, fading over totalLife
                float inside = step(d, wavefront);
                float afterglow = inside * (1.0 - smoothstep(0.0, totalLife, t));
                // radial falloff toward edge
                float falloff = 1.0 - smoothstep(range * 0.6, range, d);
                float intensity = (ring * 2.5 + afterglow * 1.2) * falloff * coneFalloff;
                col += uEchoColor[i] * intensity;
            }

            float lit = max(col.r, max(col.g, col.b));
            gl_FragColor = vec4(col, min(lit, 1.0));
        }
    `,
});

// Hostile spirits use this material — identical to echoMaterial but the player's beat
// echo (tracked via uBeatSlot) is always rendered red regardless of echo color.
const hostileEchoMaterial = new THREE.ShaderMaterial({
    transparent: true,
    depthWrite: false,
    depthTest: true,
    blending: THREE.AdditiveBlending,
    uniforms: {
        uEchoOrigin:  echoMaterial.uniforms.uEchoOrigin,
        uEchoTime:    echoMaterial.uniforms.uEchoTime,
        uEchoColor:   echoMaterial.uniforms.uEchoColor,
        uEchoRange:   echoMaterial.uniforms.uEchoRange,
        uEchoForward: echoMaterial.uniforms.uEchoForward,
        uEchoCone:    echoMaterial.uniforms.uEchoCone,
        uWalls:       echoMaterial.uniforms.uWalls,
        uSpeed:       echoMaterial.uniforms.uSpeed,
        uFadeMul:     echoMaterial.uniforms.uFadeMul,
        uBeatSlot:    { value: -1 },
    },
    vertexShader: echoMaterial.vertexShader,
    fragmentShader: `
        precision highp float;
        varying vec3 vWorldPos;
        uniform vec3 uEchoOrigin[${MAX_ECHOES}];
        uniform float uEchoTime[${MAX_ECHOES}];
        uniform vec3 uEchoColor[${MAX_ECHOES}];
        uniform float uEchoRange[${MAX_ECHOES}];
        uniform vec2 uEchoForward[${MAX_ECHOES}];
        uniform float uEchoCone[${MAX_ECHOES}];
        uniform vec4 uWalls[${MAX_WALLS}];
        uniform float uSpeed;
        uniform float uFadeMul;
        uniform int uBeatSlot;
        const float THICKNESS = 1.0;

        bool rayBlockedByAABB(vec2 a, vec2 b, vec4 w) {
            if (w.x > w.z) return false;
            if (a.x >= w.x && a.x <= w.z && a.y >= w.y && a.y <= w.w) return false;
            vec2 d = b - a;
            vec2 safe = vec2(
                abs(d.x) < 0.0001 ? 0.0001 : d.x,
                abs(d.y) < 0.0001 ? 0.0001 : d.y
            );
            vec2 inv = 1.0 / safe;
            vec2 t1 = (w.xy - a) * inv;
            vec2 t2 = (w.zw - a) * inv;
            vec2 tMin2 = min(t1, t2);
            vec2 tMax2 = max(t1, t2);
            float tEnter = max(tMin2.x, tMin2.y);
            float tExit  = min(tMax2.x, tMax2.y);
            if (tEnter > tExit) return false;
            if (tEnter >= 0.999 || tExit <= 0.0) return false;
            return true;
        }

        void main() {
            vec3 col = vec3(0.0);
            vec2 frag2D = vWorldPos.xz;

            for (int i = 0; i < ${MAX_ECHOES}; i++) {
                float t = uEchoTime[i];
                if (t < 0.0) continue;

                vec2 origin2D = uEchoOrigin[i].xz;

                bool blocked = false;
                for (int j = 0; j < ${MAX_WALLS}; j++) {
                    if (rayBlockedByAABB(origin2D, frag2D, uWalls[j])) {
                        blocked = true;
                        break;
                    }
                }
                if (blocked) continue;

                float range = uEchoRange[i];
                float wavefrontLife = range / uSpeed;
                float totalLife     = wavefrontLife * uFadeMul;
                float d = distance(vWorldPos, uEchoOrigin[i]);
                if (d > range) continue;

                float coneFalloff = 1.0;
                if (uEchoCone[i] > -1.0 && d > 0.001) {
                    vec2 dir = normalize(frag2D - origin2D);
                    float cosA = dot(dir, uEchoForward[i]);
                    coneFalloff = smoothstep(uEchoCone[i] - 0.2, uEchoCone[i] + 0.05, cosA);
                    if (coneFalloff <= 0.0) continue;
                }

                float wavefront = t * uSpeed;
                float ringFade = 1.0 - smoothstep(wavefrontLife * 0.7, wavefrontLife, t);
                float ring = smoothstep(THICKNESS, 0.0, abs(d - wavefront)) * ringFade;
                float inside = step(d, wavefront);
                float afterglow = inside * (1.0 - smoothstep(0.0, totalLife, t));
                float falloff = 1.0 - smoothstep(range * 0.6, range, d);
                float intensity = (ring * 2.5 + afterglow * 1.2) * falloff * coneFalloff;
                vec3 echoCol = (i == uBeatSlot) ? vec3(0.75, 0.08, 0.05) : uEchoColor[i];
                col += echoCol * intensity;
            }

            float lit = max(col.r, max(col.g, col.b));
            gl_FragColor = vec4(col, min(lit, 1.0));
        }
    `,
});

const walls = [];

    color: 0x000000,
    polygonOffset: true,

// Registry for all grid wireframes — slider can rebuild them live
const gridMeshes = [];
function registerGridMesh(mesh, rebuildFn) {
    gridMeshes.push({ mesh, rebuildFn });
}
function rebuildAllGrids(newStep) {
    for (const { mesh, rebuildFn } of gridMeshes) {
        const oldGeom = mesh.geometry;
        mesh.geometry = rebuildFn(newStep);
        oldGeom.dispose();

// Build a box wireframe with interior grid lines on all 5 visible faces (bottom skipped).
function buildBoxWireGeom(w, h, d, step) {
    const hw = w / 2, hh = h / 2, hd = d / 2;
    const pts = [];
    const eps = 1e-4;
    function lineX(y, z, sign) { pts.push(-hw, y, z * sign, hw, y, z * sign); }
    function lineY(x, z, sign) { pts.push(x * sign, -hh, z, x * sign, hh, z); }
    function lineZ(x, y, sign) { pts.push(x, y * sign, -hd, x, y * sign, hd); }

    // Front (z=+hd) and back (z=-hd): grid in XY
    for (const zs of [1, -1]) {
        for (let x = -hw; x <= hw + eps; x += step) pts.push(x, -hh, hd * zs, x, hh, hd * zs);
        for (let y = -hh; y <= hh + eps; y += step) pts.push(-hw, y, hd * zs, hw, y, hd * zs);
    }
    // Right (x=+hw) and left (x=-hw): grid in YZ
    for (const xs of [1, -1]) {
        for (let y = -hh; y <= hh + eps; y += step) pts.push(hw * xs, y, -hd, hw * xs, y, hd);
        for (let z = -hd; z <= hd + eps; z += step) pts.push(hw * xs, -hh, z, hw * xs, hh, z);
    }
    // Top (y=+hh): grid in XZ
    for (let x = -hw; x <= hw + eps; x += step) pts.push(x, hh, -hd, x, hh, hd);
    for (let z = -hd; z <= hd + eps; z += step) pts.push(-hw, hh, z, hw, hh, z);

    const geom = new THREE.BufferGeometry();
    geom.setAttribute('position', new THREE.Float32BufferAttribute(pts, 3));
    return geom;
}

function addBox(cx, cy, w, d, h = 1.5, baseY = 0) {
    const box = new THREE.BoxGeometry(w, h, d);
    const solid = new THREE.Mesh(box, solidMat);
    const posY = baseY + h / 2;
    solid.position.set(cx, posY, cy);
    scene.add(solid);
    walkableMeshes.push(solid);
    const lines = new THREE.LineSegments(buildBoxWireGeom(w, h, d, cfg.gridStep), echoMaterial);
    lines.position.set(cx, posY, cy);
    lines.renderOrder = 1;
    scene.add(lines);
    registerGridMesh(lines, (step) => buildBoxWireGeom(w, h, d, step));
    // Only axis-aligned walls near ground level contribute to echo occlusion
    if (baseY < 0.1) {
        const minX = cx - w / 2, minY = cy - d / 2, maxX = cx + w / 2, maxY = cy + d / 2;
        walls.push({ minX, minY, maxX, maxY });
        const idx = walls.length - 1;
        if (idx < MAX_WALLS) wallUniform[idx].set(minX, minY, maxX, maxY);
    }
}

// Free-3D cube (rotatable, not axis-aligned, not added to AABB walls)
function addCube(d) {
    const sx = d.sx ?? 1, sy = d.sy ?? 1, sz = d.sz ?? 1;
    const geom = new THREE.BoxGeometry(sx, sy, sz);
    const solid = new THREE.Mesh(geom, solidMat);
    const lines = new THREE.LineSegments(buildBoxWireGeom(sx, sy, sz, cfg.gridStep), echoMaterial);
    lines.renderOrder = 1;
    const group = new THREE.Group();
    group.add(solid);
    group.add(lines);
    group.position.set(d.x || 0, d.yWorld ?? 0.5, d.y || 0);
    group.rotation.set(d.rx || 0, d.ry || 0, d.rz || 0);
    scene.add(group);
    registerGridMesh(lines, (step) => buildBoxWireGeom(sx, sy, sz, step));
    walkableMeshes.push(solid);
}

// Low-poly sphere (icosahedron detail=1), wireframe scannable by echo
function addSphere(d) {
    const r = d.radius ?? 0.5;
    const geom = new THREE.IcosahedronGeometry(r, 1);
    const solid = new THREE.Mesh(geom, solidMat);
    const lines = new THREE.LineSegments(new THREE.WireframeGeometry(geom), echoMaterial);
    lines.renderOrder = 1;
    const group = new THREE.Group();
    group.add(solid);
    group.add(lines);
    group.position.set(d.x || 0, d.yWorld ?? r, d.y || 0);
    scene.add(group);
}

function buildFlatGridGeom(y, size, step) {
    const positions = [];
    for (let i = -size; i <= size; i += step) {
        positions.push(i, y, -size, i, y, size);
        positions.push(-size, y, i, size, y, i);
    }
    const g = new THREE.BufferGeometry();
    g.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
    return g;
}
function addGrid(y, size, step) {
    const grid = new THREE.LineSegments(buildFlatGridGeom(y, size, step), echoMaterial);
    grid.renderOrder = 1;
    scene.add(grid);
    registerGridMesh(grid, (s) => buildFlatGridGeom(y, size, s));
}
function addFloorGrid(size, step) { addGrid(0, size, step); }

function addCeiling(size, y) {
    const geom = new THREE.PlaneGeometry(size * 2, size * 2);
    const mesh = new THREE.Mesh(geom, solidMat);

// ----- Audio listener for 3D positional audio on points -----
const audioListener = new THREE.AudioListener();
camera.add(audioListener);
// Cache of decoded AudioBuffers keyed by fetch path, shared across points.
const audioBufferCache = new Map();
async function loadPointAudioBuffer(path) {
    if (!path) return null;
    if (audioBufferCache.has(path)) return audioBufferCache.get(path);
    try {
        const r = await fetch('./' + path, { cache: 'force-cache' });
        if (!r.ok) { console.warn('audio fetch failed', path, r.status); return null; }
        const buf = await audioListener.context.decodeAudioData(await r.arrayBuffer());
        audioBufferCache.set(path, buf);
        return buf;
    } catch (e) { console.warn('audio decode failed', path, e); return null; }
}

// Attach a THREE.PositionalAudio to a point's mesh and wire the track queue.
function attachPointAudio(pt) {
    const cfg = pt.audio;
    const node = new THREE.PositionalAudio(audioListener);
    node.setRefDistance(cfg.refDistance ?? 3);
    node.setMaxDistance(cfg.maxDistance ?? 15);
    node.setRolloffFactor(cfg.rolloff ?? 1);
    node.setDistanceModel('linear');
    node.setVolume(cfg.volume ?? 1);
    pt.mesh.add(node);
    pt._audioNode = node;
    pt._audioIdx = 0;
    pt._audioWaitUntil = 0; // in seconds (elapsed-based)
    pt._audioBuffers = cfg.tracks.map(() => null);
    // Preload buffers asynchronously
    cfg.tracks.forEach(async (t, i) => {
        pt._audioBuffers[i] = await loadPointAudioBuffer(t.file);
    });
}

function updatePointAudio(dt) {
    if (gameState !== 'playing') return;
    for (const pt of points) {
        if (!pt._audioNode || pt.collected) continue;
        const node = pt._audioNode;
        if (node.isPlaying) continue;
        if (elapsed < pt._audioWaitUntil) continue;
        const tracks = pt.audio.tracks;
        const buf = pt._audioBuffers[pt._audioIdx];
        if (!buf) { // buffer still loading or missing — wait a beat and retry
            pt._audioWaitUntil = elapsed + 0.25;
            continue;
        }
        const track = tracks[pt._audioIdx];
        try {
            node.setBuffer(buf);
            node.play();
        } catch (e) { /* autoplay blocked until first gesture — silently wait */ }
        // Schedule next: play duration is buf.duration, then delay.
        pt._audioWaitUntil = elapsed + buf.duration + (track.delay ?? 0);
        const next = pt._audioIdx + 1;
        if (next >= tracks.length) {
            pt._audioIdx = pt.audio.loop === false ? tracks.length : 0;
        } else {
            pt._audioIdx = next;
        }
    }
}

// ----- Heartbeat SFX (synthesized "lub-dub" via Web Audio) -----
function playHeartbeat() {
    if (ambientCtx.state === 'suspended') ambientCtx.resume();
    const t0 = ambientCtx.currentTime;
    const thump = (offset, peak) => {
        const osc = ambientCtx.createOscillator();
        const g = ambientCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(75, t0 + offset);
        osc.frequency.exponentialRampToValueAtTime(35, t0 + offset + 0.14);
        g.gain.setValueAtTime(0, t0 + offset);
        g.gain.linearRampToValueAtTime(peak * cfg.beatVolume, t0 + offset + 0.012);
        g.gain.exponentialRampToValueAtTime(0.001, t0 + offset + 0.22);
        osc.connect(g).connect(ambientCtx.destination);
        osc.start(t0 + offset);
        osc.stop(t0 + offset + 0.25);
    };
    thump(0, 0.9);
    thump(0.17, 0.55);
}

}

// Smell zones — colored vapor drifting upward
const smellZones = [];
const smellDefs = []; // persistent zone definitions, used to rebuild on count change

function buildSmellZone(def) {
    const N = cfg.smellCount;
    const positions = new Float32Array(N * 3);
    const velocities = new Array(N);
    function spawnParticle(i, startYRand) {
        const r = Math.sqrt(Math.random()) * def.radius;
        const a = Math.random() * Math.PI * 2;
        positions[i*3]   = def.cx + r * Math.cos(a);
        positions[i*3+1] = startYRand ? Math.random() * 2.0 : 0.05 + Math.random() * 0.2;
        positions[i*3+2] = def.cy + r * Math.sin(a);
        velocities[i] = {
            vy: 0.08 + Math.random() * 0.12,
            dx: (Math.random() - 0.5) * 0.08,
            dz: (Math.random() - 0.5) * 0.08,
        };
    }
    for (let i = 0; i < N; i++) spawnParticle(i, true);
    const geom = new THREE.BufferGeometry();
    geom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    const mat = new THREE.PointsMaterial({
        color: def.color, size: cfg.smellSize, transparent: true, opacity: 0.55,
        blending: THREE.AdditiveBlending, depthWrite: false,
        sizeAttenuation: true,
    });
    const points = new THREE.Points(geom, mat);
    scene.add(points);
    return { ...def, positions, velocities, geom, mat, points, spawnParticle };
}

function addSmellZone(cx, cy, radius, color) {
    const def = { cx, cy, radius, color };
    smellDefs.push(def);
    smellZones.push(buildSmellZone(def));
}

function rebuildSmellZones() {
    for (const z of smellZones) {
        scene.remove(z.points);
        z.geom.dispose();
        z.mat.dispose();
    }
    smellZones.length = 0;
    for (const d of smellDefs) smellZones.push(buildSmellZone(d));
}

function updateSmellZones(dt) {
    for (const s of smellZones) {
        const N = s.velocities.length;
        for (let i = 0; i < N; i++) {
            const v = s.velocities[i];
            s.positions[i*3]     += v.dx * dt;
            s.positions[i*3 + 1] += v.vy * dt;
            s.positions[i*3 + 2] += v.dz * dt;
            if (s.positions[i*3 + 1] > 2.25) s.spawnParticle(i, false);
        }
        s.geom.attributes.position.needsUpdate = true;
        // distance-based fade: full opacity close, invisible beyond cfg.smellRange
        const distToSoul = Math.hypot(s.cx - soul.x, s.cy - soul.y);
        const strength = 1.0 - Math.min(1, Math.max(0,
            (distToSoul - cfg.smellRange * 0.3) / (cfg.smellRange * 0.7)
        ));
        s.mat.opacity = 0.6 * strength;
        s.mat.size = cfg.smellSize;
        s.mat.visible = strength > 0.01;
    }
}

// Scene built from level.json (or DEFAULT_LEVEL fallback) at bottom of script.

// ----- Soul (camera carrier + collision); start position set by level -----
const soul = {
    x: 0, y: 0, yaw: 0, pitch: 0,
    radius: 0.3,
    floorY: 0,   // current feet Y (updated each frame by slope raycast)
};

// ----- Footstep trail — a flat ribbon mesh on the floor, glowing red, fades per segment.
// Each trail point spawns 2 vertices (left/right of the walking direction). Triangle strip.
const TRAIL_CAP = 1200;
const trailPositions = new Float32Array(TRAIL_CAP * 3); // centerline points we record
const trailBirth = new Float32Array(TRAIL_CAP);
const trailRibbonPos = new Float32Array(TRAIL_CAP * 2 * 3); // 2 vertices per point
const trailRibbonCol = new Float32Array(TRAIL_CAP * 2 * 3);
const trailRibbonIdx = new Uint32Array(TRAIL_CAP * 6);     // 2 triangles per segment
const trailGeom = new THREE.BufferGeometry();
trailGeom.setAttribute('position', new THREE.BufferAttribute(trailRibbonPos, 3));
trailGeom.setAttribute('color',    new THREE.BufferAttribute(trailRibbonCol, 3));
trailGeom.setIndex(new THREE.BufferAttribute(trailRibbonIdx, 1));
trailGeom.setDrawRange(0, 0);
const trailMat = new THREE.MeshBasicMaterial({
    vertexColors: true, transparent: true,
    depthWrite: false, side: THREE.DoubleSide,
    blending: THREE.AdditiveBlending,
});
const trailLine = new THREE.Mesh(trailGeom, trailMat);
trailLine.frustumCulled = false;
trailLine.renderOrder = 2;
trailLine.visible = false;
scene.add(trailLine);
let trailCount = 0;
let trailLastX = null, trailLastZ = null;

function resetTrail() {
    trailCount = 0;
    trailLastX = null; trailLastZ = null;
    trailLine.visible = false;
}

function pushTrailPoint(x, z, now) {
    const max = Math.min(TRAIL_CAP, cfg.trailMaxPoints | 0);
    if (trailCount >= max) {
        trailPositions.copyWithin(0, 3, trailCount * 3);
        trailBirth.copyWithin(0, 1, trailCount);
        trailCount--;
    }
    const i = trailCount;
    trailPositions[i * 3 + 0] = x;
    trailPositions[i * 3 + 1] = 0.03;
    trailPositions[i * 3 + 2] = z;
    trailBirth[i] = now;
    trailCount++;
}

function rebuildTrailRibbon() {
    if (trailCount < 2) { trailLine.visible = false; return; }
    const halfW = Math.max(0.005, cfg.trailWidth * 0.5);
    const ttl = Math.max(0.1, cfg.trailTTL);
    const posAttr = trailGeom.attributes.position;
    const colAttr = trailGeom.attributes.color;
    const idx = trailRibbonIdx;
    // Compute left/right vertices for each centerline point using the average tangent
    // with its neighbours so the ribbon stays smooth at turns.
    for (let i = 0; i < trailCount; i++) {
        const prev = i > 0 ? i - 1 : i;
        const next = i < trailCount - 1 ? i + 1 : i;
        const tx = trailPositions[next * 3 + 0] - trailPositions[prev * 3 + 0];
        const tz = trailPositions[next * 3 + 2] - trailPositions[prev * 3 + 2];
        let len = Math.hypot(tx, tz) || 1;
        // Perpendicular in XZ: (-tz, tx) / len.
        const nx = -tz / len;
        const nz =  tx / len;
        const cx = trailPositions[i * 3 + 0];
        const cy = trailPositions[i * 3 + 1];
        const cz = trailPositions[i * 3 + 2];
        const vL = i * 2, vR = i * 2 + 1;
        trailRibbonPos[vL * 3 + 0] = cx + nx * halfW;
        trailRibbonPos[vL * 3 + 1] = cy;
        trailRibbonPos[vL * 3 + 2] = cz + nz * halfW;
        trailRibbonPos[vR * 3 + 0] = cx - nx * halfW;
        trailRibbonPos[vR * 3 + 1] = cy;
        trailRibbonPos[vR * 3 + 2] = cz - nz * halfW;
        // Color by age.
        const fade = Math.max(0, 1 - (elapsed - trailBirth[i]) / ttl);
        const k = fade * cfg.trailBrightness;
        const r = k * 0.95, g = k * 0.06, b = k * 0.03;
        trailRibbonCol[vL * 3 + 0] = r; trailRibbonCol[vL * 3 + 1] = g; trailRibbonCol[vL * 3 + 2] = b;
        trailRibbonCol[vR * 3 + 0] = r; trailRibbonCol[vR * 3 + 1] = g; trailRibbonCol[vR * 3 + 2] = b;
    }
    // Triangle indices: per segment between point i and i+1.
    // Quad vertices: A=iL, B=iR, C=(i+1)L, D=(i+1)R.  Triangles: A,B,C and C,B,D.
    for (let i = 0; i < trailCount - 1; i++) {
        const A = i * 2, B = i * 2 + 1, C = (i + 1) * 2, D = (i + 1) * 2 + 1;
        const j = i * 6;
        idx[j + 0] = A; idx[j + 1] = B; idx[j + 2] = C;
        idx[j + 3] = C; idx[j + 4] = B; idx[j + 5] = D;
    }
    posAttr.updateRange = { offset: 0, count: trailCount * 2 * 3 };
    colAttr.updateRange = { offset: 0, count: trailCount * 2 * 3 };
    posAttr.needsUpdate = true;
    colAttr.needsUpdate = true;
    trailGeom.index.needsUpdate = true;
    trailGeom.setDrawRange(0, (trailCount - 1) * 6);
    trailLine.visible = true;
}

function updateTrail(dt) {
    if (!cfg.trailEnabled) {
        if (trailCount) resetTrail();
        return;
    }
    if (gameState === 'playing' && turnT <= 0 && stareT <= 0) {
        const seg = cfg.trailSegment;
        if (trailLastX === null) {
            pushTrailPoint(soul.x, soul.y, elapsed);
            trailLastX = soul.x; trailLastZ = soul.y;
        } else {
            const dx = soul.x - trailLastX, dz = soul.y - trailLastZ;
            if (dx * dx + dz * dz >= seg * seg) {
                pushTrailPoint(soul.x, soul.y, elapsed);
                trailLastX = soul.x; trailLastZ = soul.y;
            }
        }
    }
    // Drop fully-faded oldest points from the head of the buffer.
    const ttl = Math.max(0.1, cfg.trailTTL);
    let drop = 0;
    for (let i = 0; i < trailCount; i++) {
        if ((elapsed - trailBirth[i]) >= ttl && drop === i) drop = i + 1;
        else break;
    }
    if (drop > 0) {
        trailPositions.copyWithin(0, drop * 3, trailCount * 3);
        trailBirth.copyWithin(0, drop, trailCount);
        trailCount -= drop;
    }
    rebuildTrailRibbon();
}

// Walkable surfaces — populated in buildLevel. Raycaster uses these for floor height.
const walkableMeshes = [];
const slopeRaycaster = new THREE.Raycaster();
const slopeDirDown = new THREE.Vector3(0, -1, 0);
const MAX_SLOPE_COS = Math.cos(40 * Math.PI / 180); // ~0.766 for 40°
const MAX_STEP_UP = 0.35; // cannot climb onto surfaces higher than this above current floor

function sampleFloorAt(x, y, fromY) {
    slopeRaycaster.set(new THREE.Vector3(x, fromY + 3, y), slopeDirDown);
    slopeRaycaster.far = 8;
    const hits = slopeRaycaster.intersectObjects(walkableMeshes, true);
    for (const h of hits) {
        if (!h.face) continue;
        const worldNormal = h.face.normal.clone().transformDirection(h.object.matrixWorld).normalize();
        if (worldNormal.y < MAX_SLOPE_COS) continue; // too steep
        // reject surfaces too high above current floor (walls/prop tops)
        if (h.point.y > fromY + MAX_STEP_UP) continue;
        return h.point.y;
    }
    return 0;
}

function updateFloorY() {
    soul.floorY = sampleFloorAt(soul.x, soul.y, soul.floorY);
}

function soulCollides(x, y) {
    for (const w of walls) {
        const cx = Math.max(w.minX, Math.min(x, w.maxX));
        const cy = Math.max(w.minY, Math.min(y, w.maxY));
        const dx = x - cx, dy = y - cy;
        if (dx * dx + dy * dy < soul.radius * soul.radius) return true;
    }
    return false;
}

function moveSoul(ix, iy, dt) {
    if (ix === 0 && iy === 0) return;
    const s = Math.sin(soul.yaw), c = Math.cos(soul.yaw);
    const speed = cfg.moveSpeed;
    const dx = (iy * s + ix * c) * speed * dt;
    const dy = (iy * c - ix * s) * speed * dt;
    const nx = soul.x + dx;
    if (!soulCollides(nx, soul.y)) soul.x = nx;
    const ny = soul.y + dy;
    if (!soulCollides(soul.x, ny)) soul.y = ny;
}

}

const COLOR_BEAT    = new THREE.Vector3(0.9, 0.97, 1.0);
function hexToVec3(hex) {

        parseInt(h.slice(0, 2), 16) / 255,

function spawnEcho(x, y, z, color, range, forwardX, forwardZ, coneHalfDeg) {
    let slot = echoes.find(e => !e.active);
    if (!slot) slot = echoes.reduce((a, b) => a.start < b.start ? a : b);
    slot.origin.set(x, y, z);
    slot.color.copy(color);
    slot.range = range;
    if (typeof coneHalfDeg === 'number') {
        slot.forward.set(forwardX, forwardZ).normalize();
        slot.cone = Math.cos(coneHalfDeg * Math.PI / 180);
    } else {
        slot.cone = -2.0; // omnidirectional

    slot.start = elapsed;
    slot.active = true;
    return echoes.indexOf(slot);
}

    lastBeatTime = elapsed;

function blankPointRT(x, y) {

function migrateSpiritRT(s) {

    };
}
function migratePickupRT(s) { return { ...blankPointRT(s.x, s.y), label: s.label || '', r: s.r ?? 0.5, modelName: s.modelName || '', pickup: true }; }
function migrateSoundRT(s)  { return { ...blankPointRT(s.x, s.y), label: s.label || '', r: s.r ?? 0.4, modelName: s.modelName || '', sound: { period: s.period ?? 3 } }; }
function migrateSmellRT(s)  { return { ...blankPointRT(s.cx, s.cy), label: s.label || '', r: s.r ?? 0.5, modelName: s.modelName || '', smell: { radius: s.radius ?? 1.5, color: s.color || '#4aaaff' } }; }
function migrateTriggerRT(p) {
    if (p.killRadius && !p.trigger) {
        p.trigger = { radius: p.killRadius, effect: 'kill' };
    }
    return p;
}
function collectPointsFromLevel(data) {
    const out = [];
    for (const x of data.spirits || []) out.push(migrateTriggerRT(migrateSpiritRT(x)));
    for (const x of data.pickups || []) out.push(migrateTriggerRT(migratePickupRT(x)));
    for (const x of data.sounds  || []) out.push(migrateTriggerRT(migrateSoundRT(x)));
    for (const x of data.smells  || []) out.push(migrateTriggerRT(migrateSmellRT(x)));
    for (const x of data.points  || []) out.push(migrateTriggerRT({ ...blankPointRT(x.x, x.y), ...x }));

}

const NoiseShader = {
    uniforms: {
        tDiffuse: { value: null },
        uTime: { value: 0 },
        uFlash: { value: 0 },
    },
    vertexShader: `
        varying vec2 vUv;
        void main() {
            vUv = uv;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
    `,
    fragmentShader: `
        precision highp float;
        uniform sampler2D tDiffuse;
        uniform float uTime;
        uniform float uFlash;
        varying vec2 vUv;
        float hash(vec2 p) {
            p = fract(p * vec2(123.34, 456.21));
            p += dot(p, p + 45.32);
            return fract(p.x * p.y);
        }
        void main() {
            vec3 col = texture2D(tDiffuse, vUv).rgb;
            float n = hash(vUv * vec2(1920.0, 1080.0) + uTime * 60.0);
            col += vec3((n - 0.4) * 0.18);
            float n2 = hash(floor(vUv * 80.0) * 0.1 + floor(uTime * 8.0));
            col += vec3(n2 * 0.05);
            col += 0.04;
            col += sin(vUv.y * 480.0 + uTime * 3.0) * 0.02;
            col += vec3(uFlash * 0.35);
            vec2 q = vUv - 0.5;
            col *= 1.0 - dot(q, q) * 0.9;
            gl_FragColor = vec4(col, 1.0);
        }
    `,
};
const noisePass = new ShaderPass(NoiseShader);
composer.addPass(noisePass);

// ----- Main loop -----
const clock = new THREE.Clock();
let bobPhase = 0;
let bobSettle = 0;
const fpsEl = document.getElementById('fps');
let fpsFrames = 0, fpsAccum = 0, fpsDisplay = 0;

function animate() {
    const dt = Math.min(clock.getDelta(), 1 / 30);
    elapsed += dt;
    fpsAccum += dt; fpsFrames++;
    if (fpsAccum >= 0.5) {
        fpsDisplay = Math.round(fpsFrames / fpsAccum);
        fpsFrames = 0; fpsAccum = 0;
        if (cfg.showFps) fpsEl.textContent = fpsDisplay + ' fps';
    }

    // look + move — only during active gameplay (and not during intro turn)
    let ix = 0, iy = 0;
    if (gameState === 'playing') {
        if (stareT > 0) {
            // Hold still facing the Reaper so the player registers the red silhouette.
            stareT = Math.max(0, stareT - dt);
            if (stareT <= 0) turnT = TURN_DURATION;
        } else if (turnT > 0) {
            turnT = Math.max(0, turnT - dt);
            const k = 1 - turnT / TURN_DURATION;
            const e = k * k * (3 - 2 * k); // smoothstep
            // Rotate through the opposite semicircle (+π instead of the implicit -π delta).
            soul.yaw = turnFromYaw + Math.PI * e;
        } else {
            soul.yaw -= mouseDX * cfg.mouseSens;
            soul.pitch -= mouseDY * cfg.mouseSens;
            soul.pitch = Math.max(-0.8, Math.min(0.4, soul.pitch));
            [ix, iy] = readMove();
            moveSoul(ix, iy, dt);
        }
    }
    mouseDX = 0; mouseDY = 0;

    // Body auto-pulse (green, navigation aid) — runs in menu/intro/playing for atmosphere
    if (body && gameState !== 'won' && gameState !== 'lost' && elapsed - body.lastPulse > cfg.bodyPulsePeriod) {
        spawnEcho(body.x, 0.6, body.y, COLOR_BODY, cfg.bodyRange);
        body.lastPulse = elapsed;
    }
    // Menu/intro: pulse the win point so the camera target is visible in the dark
    if ((gameState === 'menu' || gameState === 'intro') && winPoint) {
        if (!winPoint._lastPulse || elapsed - winPoint._lastPulse > 2.8) {
            spawnEcho(winPoint.x, 0.6, winPoint.y, COLOR_BODY, 2.8);
            winPoint._lastPulse = elapsed;
        }
    }

    // Grim Reaper breadcrumb chase (runs only during active play, after the intro turn)
    if (reaperPt && cfg.reaperEnabled && gameState === 'playing' && turnT <= 0 && stareT <= 0) {
        // Drop a breadcrumb when the soul has moved far enough from the last one
        const ldx = soul.x - reaperLastCrumb[0];
        const ldy = soul.y - reaperLastCrumb[1];
        if (ldx * ldx + ldy * ldy > cfg.reaperTrailStep * cfg.reaperTrailStep) {
            reaperPath.push([soul.x, soul.y]);
            reaperLastCrumb = [soul.x, soul.y];
            if (reaperPath.length > 400) reaperPath.shift();
        }
        // Distance-adaptive speed: far → fast, near → slow
        const distToSoul = Math.hypot(soul.x - reaperPt.x, soul.y - reaperPt.y);
        const t = Math.max(0, Math.min(1,
            (distToSoul - cfg.reaperNearDist) / Math.max(0.01, cfg.reaperFarDist - cfg.reaperNearDist)));
        const speed = cfg.reaperSpeedMin + (cfg.reaperSpeedMax - cfg.reaperSpeedMin) * t;
        // Walk toward the next breadcrumb; optionally skip one to cut corners
        if (reaperPath.length > 0) {
            const [tx, ty] = reaperPath[0];
            const rdx = tx - reaperPt.x, rdy = ty - reaperPt.y;
            const dist = Math.hypot(rdx, rdy);
            if (dist <= cfg.reaperReach) {
                reaperPath.shift();
                if (reaperPath.length > 1 && Math.random() < cfg.reaperShortcut) reaperPath.shift();
            } else {
                const step = Math.min(speed * dt, dist);
                reaperPt.x += (rdx / dist) * step;
                reaperPt.y += (rdy / dist) * step;
                reaperPt.yaw = Math.atan2(rdx, rdy);
                if (reaperPt.mesh) reaperPt.mesh.position.set(reaperPt.x, 0, reaperPt.y);
            }
        }
    }

    // Points: patrol + pulses + sounds + contact
    const COLOR_GRAY = new THREE.Vector3(0.7, 0.7, 0.8);
    if (gameState === 'playing') {
        for (const pt of points) {
            if (pt.collected) continue;
            // patrol: forward → returning → idle → (repeat if loop)
            const wps = pt.patrol?.waypoints;
            if (wps && wps.length > 0 && !pt.patrolDone) {
                if (pt.patrolPhase === 'idle') {
                    pt.patrolIdle -= dt;
                    if (pt.patrolIdle <= 0) {
                        pt.patrolPhase = 'forward';
                        pt.wpIdx = 0;
                    }
                } else {
                    let tx, ty;
                    if (pt.patrolPhase === 'forward') {
                        const wp = wps[pt.wpIdx];
                        tx = Array.isArray(wp) ? wp[0] : wp.x;
                        ty = Array.isArray(wp) ? wp[1] : wp.y;
                    } else {
                        tx = pt.homeX; ty = pt.homeY;
                    }
                    const ddx = tx - pt.x, ddy = ty - pt.y;
                    const dist = Math.hypot(ddx, ddy);
                    if (dist < 0.15) {
                        if (pt.patrolPhase === 'forward') {
                            pt.wpIdx++;
                            if (pt.wpIdx >= wps.length) pt.patrolPhase = 'returning';
                        } else {
                            // reached home — cycle complete
                            if (pt.patrol.loop === false) {
                                pt.patrolDone = true;
                            } else {
                                pt.patrolPhase = 'idle';
                                pt.patrolIdle = Math.max(0, pt.patrol.loopDelay ?? 0);
                            }
                        }
                    } else {
                        const step = Math.min(pt.patrol.speed * dt, dist);
                        pt.x += (ddx / dist) * step;
                        pt.y += (ddy / dist) * step;
                        const targetYaw = Math.atan2(ddx, ddy);
                        let dy = targetYaw - pt.yaw;
                        while (dy > Math.PI) dy -= 2 * Math.PI;
                        while (dy < -Math.PI) dy += 2 * Math.PI;
                        const turnStep = pt.patrol.turnRate * dt;
                        pt.yaw += Math.max(-turnStep, Math.min(turnStep, dy));
                    }
                    if (pt.mesh) pt.mesh.position.set(pt.x, 0, pt.y);
                }
            }
            if (pt.mesh) pt.mesh.rotation.y = pt.yaw;
            // self-pulse (spirit-style). Custom color if pt.pulse.color set, else red (hostile) / gray.
            if (pt.pulse && elapsed - pt.lastPulseSelf > pt.pulse.period) {
                pt.lastPulseSelf = elapsed;
                const col = pt.pulse.color ? hexToVec3(pt.pulse.color) : (pt.hostile ? COLOR_DANGER : COLOR_GRAY);
                spawnEcho(pt.x, 0.8, pt.y, col, 2.5);
            }
            // ambient sound (yellow, clarity fades with distance)
            if (pt.sound && elapsed - pt.lastPulseSound > pt.sound.period) {
                pt.lastPulseSound = elapsed;
                const dToSoul = Math.hypot(pt.x - soul.x, pt.y - soul.y);
                const clarity = Math.max(0, 1 - dToSoul / cfg.soundHearRange);
                if (clarity >= 0.03) {
                    const dimmed = COLOR_SOUND.clone().multiplyScalar(clarity);
                    spawnEcho(pt.x, 0.8, pt.y, dimmed, cfg.soundRange);
                }
            }
            // contact checks
            const ddSoul = Math.hypot(soul.x - pt.x, soul.y - pt.y);
            // Hostile contact: kill radius = max(point.r, smell.radius).
            const killR = Math.max(pt.r || 0.7, pt.smell?.radius || 0);
            if (pt.hostile && ddSoul < killR + soul.radius) {
                lost = true; gameState = 'lost';
                showLose(pt.label || 'spirit');
                break;
            }
            // Trigger zone (explicit effect on entry)
            if (pt.trigger?.radius > 0 && ddSoul < pt.trigger.radius + soul.radius) {
                const eff = pt.trigger.effect || 'kill';
                if (eff === 'kill') { lost = true; gameState = 'lost'; showLose(pt.label || 'trap'); break; }
                else if (eff === 'win') { won = true; gameState = 'won'; showWin(); break; }
                // 'heal' → reserved for future HP/charge system
            }
            if (pt.pickup && !pt.collected && ddSoul < (pt.r || 0.5) + soul.radius) {
                pt.collected = true;
                if (pt.mesh) pt.mesh.visible = false;
                charges = Math.min(cfg.chargesMax, charges + cfg.chargesPerPickup);
                renderCharges();
                playOneShot('audio/sfx/pickup_charge.ogg');
            }
        }
    }


    // echoes — expire after total life (fadeMul * wavefront life, matches shader)
    for (const e of echoes) {
        if (e.active && elapsed - e.start > cfg.fadeMul * e.range / cfg.signalSpeed) e.active = false;
    }
    echoMaterial.uniforms.uSpeed.value = cfg.signalSpeed;
    echoMaterial.uniforms.uFadeMul.value = cfg.fadeMul;
    const origUniform = echoMaterial.uniforms.uEchoOrigin.value;
    const colorUniform = echoMaterial.uniforms.uEchoColor.value;
    const rangeUniform = echoMaterial.uniforms.uEchoRange.value;
    const forwardUniform = echoMaterial.uniforms.uEchoForward.value;
    const coneUniform = echoMaterial.uniforms.uEchoCone.value;
    const timeUniform = [];
    for (let i = 0; i < MAX_ECHOES; i++) {
        const e = echoes[i];
        if (e.active) {
            origUniform[i].copy(e.origin);
            colorUniform[i].copy(e.color);
            rangeUniform[i] = e.range;
            forwardUniform[i].copy(e.forward);
            coneUniform[i] = e.cone;
            timeUniform.push(elapsed - e.start);
        } else {
            origUniform[i].set(0, -100, 0);
            coneUniform[i] = -2.0;
            timeUniform.push(-1);
        }
    }
    echoMaterial.uniforms.uEchoTime.value = timeUniform;
    if (beatEchoSlot >= 0 && !echoes[beatEchoSlot].active) beatEchoSlot = -1;
    hostileEchoMaterial.uniforms.uBeatSlot.value = beatEchoSlot;

    // slope walking — raycast down to find floor height
    updateFloorY();

    // head bob when walking
    const moving = (ix !== 0 || iy !== 0);
    bobPhase += dt * (moving ? cfg.bobFrequency : 0);
    const bobY = Math.sin(bobPhase * Math.PI * 2) * cfg.bobAmplitude * (moving ? 1 : 0);
    if (!moving) bobSettle = Math.max(0, bobSettle - dt * 4);
    else bobSettle = 1;

    const headY = soul.floorY + cfg.eyeHeight + bobY * bobSettle;
    if (gameState === 'playing') {
        camera.position.set(soul.x, headY, soul.y);
        const fx = Math.sin(soul.yaw) * Math.cos(soul.pitch);
        const fy = Math.sin(soul.pitch);
        const fz = Math.cos(soul.yaw) * Math.cos(soul.pitch);
        camera.lookAt(soul.x + fx, headY + fy, soul.y + fz);
    } else {
        // Menu / intro / end: fixed camera looking at win point
        const wp = winPoint || { x: 0, y: 0 };
        const a = cfg.menuCamAngle * Math.PI / 180;
        const d = cfg.menuCamDist;
        camera.position.set(wp.x + Math.cos(a) * d, cfg.menuCamHeight, wp.y + Math.sin(a) * d);
        camera.lookAt(wp.x, 0.4, wp.y);
    }
    // keep echo-listener at camera height for positional audio consistency


    updateSmellZones(dt);
    updatePointAudio(dt);
    updateTrail(dt);

    flashT = Math.max(0, flashT - dt * 0.8);
    noisePass.uniforms.uTime.value = elapsed;
    noisePass.uniforms.uFlash.value = flashT;

    composer.render();
    requestAnimationFrame(animate);
}

    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);

});

// ----- OBJ model loader (imported from editor) -----
// Each instance references a library entry by libraryId; we parse library once.
const parsedLibrary = new Map(); // libraryId → Group template
async function fetchWithRetry(path, asArrayBuffer = false, attempts = 3) {
    let lastErr = null;
    for (let i = 0; i < attempts; i++) {
        try {
            const r = await fetch('./' + path, { cache: 'no-cache' });
            if (!r.ok) throw new Error('HTTP ' + r.status);
            return asArrayBuffer ? await r.arrayBuffer() : await r.text();
        } catch (e) {
            lastErr = e;
            if (i < attempts - 1) await new Promise(res => setTimeout(res, 250 * (i + 1)));
        }
    }
    throw lastErr || new Error('fetch failed');
}

async function buildLibraryCache(modelLibrary = {}, onProgress) {
    const entries = Object.entries(modelLibrary);
    const total = entries.length;
    let done = 0;
    const failures = [];
    // Fetch + parse in parallel — massive speedup over sequential awaits when N is large.
    await Promise.all(entries.map(async ([id, entry]) => {
        const path = entry.path || '';
        const isGLB = /\.(glb|gltf)$/i.test(path);
        try {
            let parsed = null;
            if (isGLB) {
                const buf = await fetchWithRetry(path, true);
                parsed = await parseGLB(buf);
            } else {
                let text = entry.obj;
                if (!text && path) text = await fetchWithRetry(path, false);
                if (!text) throw new Error('empty body');
                parsed = objLoader.parse(text);
            }
            if (parsed) {
                parsedLibrary.set(id, parsed);
                if (entry.name) spiritModelByName.set(entry.name, parsed);
            }
        } catch (e) {
            console.error('lib load failed:', entry.name || path, e.message || e);
            failures.push(entry.name || path);
        } finally {
            done++;
            onProgress?.(done, total);
        }
    }));
    return { failures };
}
function addModel(m) {
    // Back-compat: accept inline `obj` text, or reference library via libraryId
    let template = null;
    if (m.libraryId && parsedLibrary.has(m.libraryId)) template = parsedLibrary.get(m.libraryId);
    else if (m.obj) template = objLoader.parse(m.obj);
    if (!template) return;
    try {
        const parsed = template.clone(true);
        const container = new THREE.Group();
        container.position.set(m.x || 0, m.yWorld || 0, m.y || 0);
        container.rotation.set(m.rx || 0, m.ry || 0, m.rz || 0);
        const s = m.scale ?? 1;
        container.scale.set(s, s, s);

        parsed.traverse(c => {
            if (c.isMesh) {
                c.material = solidMat;
                const edges = new THREE.LineSegments(
                    new THREE.EdgesGeometry(c.geometry, 20),
                    echoMaterial
                );
                edges.renderOrder = 1;
                c.add(edges);
            }
        });
        container.add(parsed);
        scene.add(container);
    } catch (e) { console.warn('model instance failed', e); }
}

// ----- Point mesh builder (spirit / pickup / sound / smell-source / arbitrary) -----
function buildPointRuntimeMesh(pt) {
    const group = new THREE.Group();
    const wireMat = pt.hostile ? hostileEchoMaterial : echoMaterial;
    const template = pt.modelName && spiritModelByName.has(pt.modelName) ? spiritModelByName.get(pt.modelName) : null;
    if (template) {
        const parsed = template.clone(true);
        parsed.traverse(c => {
            if (c.isMesh) {
                c.material = solidMat;
                const edges = new THREE.LineSegments(new THREE.EdgesGeometry(c.geometry, 20), wireMat);
                edges.renderOrder = 1;
                c.add(edges);
            }
        });
        group.add(parsed);
    } else if (pt.hostile || pt.pulse) {
        // spirit-style silhouette (cone + head)
        const mat = solidMat;
        const coneGeom = new THREE.ConeGeometry(0.35, 1.4, 10);
        const body = new THREE.Mesh(coneGeom, mat);
        body.position.y = 0.7;
        const headGeom = new THREE.SphereGeometry(0.22, 10, 8);
        const head = new THREE.Mesh(headGeom, mat);
        head.position.y = 1.55;
        body.add(new THREE.LineSegments(new THREE.EdgesGeometry(coneGeom, 20), wireMat));
        head.add(new THREE.LineSegments(new THREE.EdgesGeometry(headGeom, 20), wireMat));
        group.add(body); group.add(head);
    } else if (pt.pickup) {
        // small lit octahedron marker
        const g = new THREE.OctahedronGeometry(0.22);
        const m = new THREE.Mesh(g, solidMat);
        m.position.y = 0.6;
        m.add(new THREE.LineSegments(new THREE.EdgesGeometry(g), echoMaterial));
        group.add(m);
    }
    // else: invisible (pure sound source / pure smell source)
    return group;
}

// Keep only library entries that are actually referenced — a level.json full of
// unused entries (e.g. post-Rescan) would otherwise fetch hundreds of unused GLBs.
function usedLibraryOnly(data) {
    const lib = data.modelLibrary || {};
    const usedNames = new Set((data.points || []).map(p => p.modelName).filter(Boolean));
    const usedIds = new Set((data.models || []).map(m => m.libraryId).filter(Boolean));
    const out = {};
    for (const [id, entry] of Object.entries(lib)) {
        if (usedIds.has(id) || usedNames.has(entry.name)) out[id] = entry;
    }
    return out;
}

async function buildLevel(data, onLibProgress) {
    addFloorGrid(data.floorSize ?? 40, cfg.gridStep);
    // extra floor slabs (for multi-story levels)
    for (const f of data.floors || []) addGrid(f.y, f.size ?? 12, cfg.gridStep);
    // Auto-ceiling: wireframe grid at per-level ceilingHeight (falls back to cfg default).
    const ceilH = data.ceilingHeight ?? cfg.ceilingHeight;
    if (ceilH > 0) addGrid(ceilH, data.floorSize ?? 40, cfg.gridStep);

    for (const w of data.walls || []) addBox(w.cx, w.cy, w.w, w.d, w.h ?? 2.4, w.baseY ?? 0);
    for (const f of data.furniture || []) addBox(f.cx, f.cy, f.w, f.d, f.h ?? 1); // legacy
    for (const c of data.cubes || []) addCube(c);
    for (const sp of data.spheres || []) addSphere(sp);
    const libResult = await buildLibraryCache(usedLibraryOnly(data), onLibProgress);
    buildLevel._lastFailures = libResult?.failures || [];
    for (const m of data.models || []) addModel(m);

    if (data.soulStart) { soul.x = data.soulStart.x; soul.y = data.soulStart.y; soul.yaw = data.soulStart.yaw || 0; }
    body = data.body ? { x: data.body.x, y: data.body.y, lastPulse: -10 } : null;

    // clear old points
    for (const p of points) {
        if (p._audioNode && p._audioNode.isPlaying) p._audioNode.stop();
        if (p.mesh) scene.remove(p.mesh);
    }
    points.length = 0;
    const loaded = collectPointsFromLevel(data);
    let i = 0;
    for (const p of loaded) {
        const pt = {
            ...p,
            yaw: 0,
            wpIdx: 0,
            patrolIdle: 0,
            patrolDone: false,
            patrolPhase: 'forward',   // 'forward' | 'returning' | 'idle'
            homeX: p.x,
            homeY: p.y,
            lastPulseSelf: (i * 0.5),
            lastPulseSound: (i * 0.3),
            collected: false,
            mesh: buildPointRuntimeMesh(p),
        };
        pt.mesh.position.set(pt.x, 0, pt.y);
        // Author-set static rotation from the editor; patrol yaw later overrides .rotation.y for patrolling points.
        pt.mesh.rotation.set(pt.rx || 0, pt.ry || 0, pt.rz || 0);
        pt.yaw = pt.ry || 0;
        const s = pt.scale ?? 1;
        pt.mesh.scale.set(s, s, s);
        scene.add(pt.mesh);
        points.push(pt);
        if (pt.smell) addSmellZone(pt.x, pt.y, pt.smell.radius, pt.smell.color);
        if (pt.audio?.tracks?.length) attachPointAudio(pt);
        i++;
    }

    if (body) buildBodyMesh();
}

// Bootstrap: try to load level.json next to this page, else DEFAULT_LEVEL
async function bootstrap() {
    const preloadEl = document.getElementById('preloadOverlay');
    const fillEl = document.getElementById('preloadFill');
    const detailEl = document.getElementById('preloadDetail');
    const setProgress = (frac, detail) => {
        if (fillEl) fillEl.style.width = Math.min(100, Math.max(0, frac * 100)).toFixed(1) + '%';
        if (detail && detailEl) detailEl.textContent = detail;
    };
    setProgress(0.02, 'loading level…');

    let data = DEFAULT_LEVEL;
    try {
        const res = await fetch('./level.json', { cache: 'no-cache' });
        if (res.ok) {
            data = await res.json();
            console.log('[level] loaded from level.json');
        } else {
            console.log('[level] level.json not found, using default');
        }
    } catch (e) {
        console.log('[level] fetch failed, using default', e.message);
    }
    setProgress(0.1, 'decoding models…');
    await buildLevel(data, (done, total) => {
        // Library fetch occupies 10%..85% of the bar.
        const frac = 0.10 + 0.75 * (total ? done / total : 1);
        setProgress(frac, `models ${done}/${total}`);
    });
    // If any library entry failed all retries, show a visible warning so we don't ship
    // with a silent silhouette fallback for a missing model.
    const fails = buildLevel._lastFailures || [];
    if (fails.length) {
        setProgress(0.88, `failed: ${fails.length} model(s) — see console`);
        if (detailEl) detailEl.style.color = '#ea4d45';
        console.error('[preload] models that did not load:', fails);
    }
    setProgress(0.9, 'waiting for audio…');
    // Wait up to 6s for the ambient buffer to arrive so the player doesn't click into silence.
    const t0 = performance.now();
    while (!ambientBuffer && performance.now() - t0 < 6000) {
        await new Promise(r => setTimeout(r, 100));
    }
    setProgress(1, 'ready');
    // Locate win-trigger point for menu/intro camera target.
    const wp = points.find(p => p.trigger?.effect === 'win');
    if (wp) winPoint = { x: wp.x, y: wp.y };
    else if (body) winPoint = { x: body.x, y: body.y };
    // Fire an initial menu pulse so the scene lights up the moment the page renders,
    // without waiting for the first animate-loop tick (which can be delayed by an unfocused tab).
    if (winPoint) {
        spawnEcho(winPoint.x, 0.6, winPoint.y, COLOR_BODY, 2.8);
        winPoint._lastPulse = 0;
    }
    // Find the Grim Reaper (by model name) for breadcrumb-chase behaviour.
    reaperPt = points.find(p => p.modelName && /GrimReaper/i.test(p.modelName)) || null;
    if (reaperPt) {
        reaperPt.yaw = reaperPt.yaw || 0;
        reaperPath = [[soul.x, soul.y]];
        reaperLastCrumb = [soul.x, soul.y];
    }
    animate();
    // Hide the preload overlay now that scene renders and audio is ready.
    const preload = document.getElementById('preloadOverlay');
    if (preload) {
        preload.classList.add('done');
        setTimeout(() => preload.remove(), 400);
    }
}
bootstrap();

function tryEnterFullscreen() {
    const el = document.documentElement;
    if (document.fullscreenElement) return;
    if (el.requestFullscreen) el.requestFullscreen().catch(() => {});
    else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
}
function toggleFullscreen() {
    if (document.fullscreenElement) {
        document.exitFullscreen?.();
    } else {
        tryEnterFullscreen();
    }
}
document.getElementById('fsBtn').addEventListener('click', (e) => {
    e.stopPropagation();
    toggleFullscreen();
});
document.addEventListener('fullscreenchange', () => {
    document.getElementById('fsBtn').classList.toggle('active', !!document.fullscreenElement);
});

document.getElementById('menuStart').addEventListener('click', () => {
    startAmbient();
    tryEnterFullscreen();
    enterIntro();
});
document.getElementById('menuSkip').addEventListener('click', () => {
    startAmbient();
    enterPlaying();
});
document.getElementById('introNext').addEventListener('click', () => {
    nextIntroSlide();
});
for (const b of document.querySelectorAll('.retryBtn')) {
    b.addEventListener('click', () => { location.reload(); });
}

// Reload when the editor (in another tab) saves a new level.
if (typeof BroadcastChannel !== 'undefined') {
    try {
        const ch = new BroadcastChannel('ld59-level-save');
        ch.addEventListener('message', () => { location.reload(); });
    } catch (e) {}
}

// ----- Settings panel -----
(function buildPanel() {
    const groups = [
        { title: 'Beat (SPACE)', params: [
            { key: 'beatRange',     label: 'Beat range',     min: 1,    max: 15,   step: 0.5 },
            { key: 'beatCooldown',  label: 'Beat cooldown',  min: 0.2,  max: 3,    step: 0.1 },
            { key: 'beatCone',      label: 'Beat cone (deg)',min: 30,   max: 360,  step: 5 },
            { key: 'flashOnBeat',   label: 'Beat flash',     min: 0,    max: 1,    step: 0.05 },
            { key: 'chargesStart',  label: 'Charges start',  min: 0,    max: 10,   step: 1,
              onChange: () => { charges = cfg.chargesStart; renderCharges(); } },
            { key: 'chargesMax',    label: 'Charges max',    min: 1,    max: 20,   step: 1,
              onChange: () => { charges = Math.min(charges, cfg.chargesMax); renderCharges(); } },
            { key: 'chargesPerPickup', label: 'Charges / pickup', min: 1, max: 5, step: 1 },
        ]},
        { title: 'Signal (echo)', params: [
            { key: 'signalSpeed',   label: 'Signal speed',   min: 2,    max: 25,   step: 0.5 },
            { key: 'fadeMul',       label: 'Fade length',    min: 0.5,  max: 6,    step: 0.1 },
            { key: 'gridStep',      label: 'Grid step',      min: 0.03125, max: 0.5, step: 0.03125,
              onChange: () => rebuildAllGrids(cfg.gridStep) },
        ]},
        { title: 'Body (goal)', params: [
            { key: 'bodyRange',        label: 'Body range',  min: 2, max: 20, step: 0.5 },
            { key: 'bodyPulsePeriod',  label: 'Body pulse',  min: 1, max: 10, step: 0.5 },
        ]},
        { title: 'Senses (smells & sounds)', params: [
            { key: 'smellRange',     label: 'Smell range',    min: 1,    max: 12,   step: 0.5 },
            { key: 'smellCount',     label: 'Smell count',    min: 10,   max: 300,  step: 10, onChange: rebuildSmellZones },
            { key: 'smellSize',      label: 'Smell size',     min: 0.05, max: 0.8,  step: 0.02 },
            { key: 'soundRange',     label: 'Sound range',    min: 1,    max: 15,   step: 0.5 },
            { key: 'soundHearRange', label: 'Sound clarity',  min: 1,    max: 20,   step: 0.5 },
        ]},
        { title: 'Movement & camera', params: [
            { key: 'moveSpeed',      label: 'Move speed',     min: 1,    max: 8,    step: 0.1 },
            { key: 'eyeHeight',      label: 'Eye height',     min: 0.3,  max: 2.2,  step: 0.05 },
            { key: 'bobAmplitude',   label: 'Head bob',       min: 0,    max: 0.2,  step: 0.01 },
            { key: 'bobFrequency',   label: 'Bob frequency',  min: 2,    max: 16,   step: 0.5 },
            { key: 'mouseSens',      label: 'Mouse sens',     min: 0.0005, max: 0.01, step: 0.0005 },
        ]},
        { title: 'Preview (panel open)', params: [
            { key: 'autoBeatPreview', label: 'Auto-beat preview', type: 'bool' },
            { key: 'autoBeatPeriod',  label: 'Auto-beat period (s)', min: 0.3, max: 8, step: 0.1 },
        ]},
        { title: 'Grim Reaper', params: [
            { key: 'reaperEnabled',  label: 'Chase enabled',        type: 'bool' },
            { key: 'reaperSpeedMin', label: 'Speed near (m/s)',     min: 0.05, max: 2, step: 0.05 },
            { key: 'reaperSpeedMax', label: 'Speed far (m/s)',      min: 0.1,  max: 3, step: 0.05 },
            { key: 'reaperNearDist', label: 'Near dist (m)',        min: 0.5,  max: 8, step: 0.1 },
            { key: 'reaperFarDist',  label: 'Far dist (m)',         min: 2,    max: 25, step: 0.5 },
            { key: 'reaperTrailStep',label: 'Trail step (m)',       min: 0.1,  max: 2, step: 0.05 },
            { key: 'reaperReach',    label: 'Breadcrumb reach (m)', min: 0.1,  max: 1, step: 0.05 },
            { key: 'reaperShortcut', label: 'Shortcut chance',      min: 0,    max: 1, step: 0.05 },
        ]},
        { title: 'Trail (soul footprints)', params: [
            { key: 'trailEnabled', label: 'Enabled',          type: 'bool' },
            { key: 'trailSegment', label: 'Segment (m)',      min: 0.05, max: 1,   step: 0.05 },
            { key: 'trailTTL',     label: 'Fade time (s)',    min: 1,    max: 30,  step: 0.5 },
            { key: 'trailMaxPoints', label: 'Max points',     min: 40,   max: 800, step: 20 },
            { key: 'trailWidth',   label: 'Width (m)',        min: 0.02, max: 0.5, step: 0.01 },
            { key: 'trailBrightness', label: 'Brightness',    min: 0,    max: 1.5, step: 0.05 },
        ]},
        { title: 'Input & audio', params: [
            { key: 'showFps',         label: 'Show FPS',         type: 'bool', onChange: () => { fpsEl.style.display = cfg.showFps ? 'block' : 'none'; if (!cfg.showFps) fpsEl.textContent = ''; } },
            { key: 'virtualJoystick', label: 'Virtual joystick', type: 'bool', onChange: applyJoystickVisibility },
            { key: 'musicVolume',     label: 'Music volume',   min: 0, max: 1, step: 0.05, onChange: () => { ambientGain.gain.value = cfg.musicVolume; } },
            { key: 'beatVolume',      label: 'Beat volume',    min: 0, max: 3, step: 0.05 },
        ]},
    ];
    const params = groups.flatMap(g => g.params);
    const body = document.getElementById('panelBody');
    // Copy-settings button
    const copyBtn = document.createElement('button');
    copyBtn.textContent = '📋 copy settings';
    copyBtn.style.cssText = 'width:100%; margin-bottom:6px; padding:4px; background:#2a3a55; color:#c9d9ff; border:1px solid #445; cursor:pointer; font-size:11px;';
    copyBtn.addEventListener('click', async () => {
        const lines = Object.entries(cfg).map(([k, v]) => `${k}: ${v}`).join('\n');
        try {
            await navigator.clipboard.writeText(lines);
            copyBtn.textContent = '✓ copied';
            setTimeout(() => copyBtn.textContent = '📋 copy settings', 1200);
        } catch (e) {
            // fallback: show in prompt
            window.prompt('Copy settings:', lines);
        }
    });
    body.appendChild(copyBtn);
    // Build accordion sections (one per group). First group open by default.
    const groupBodies = new Map();
    groups.forEach((g, gi) => {
        const gEl = document.createElement('div');
        gEl.className = 'group' + (gi === 0 ? ' open' : '');
        const head = document.createElement('div');
        head.className = 'group-head';
        head.textContent = g.title;
        head.addEventListener('click', () => gEl.classList.toggle('open'));
        const gBody = document.createElement('div');
        gBody.className = 'group-body';
        gEl.appendChild(head); gEl.appendChild(gBody);
        body.appendChild(gEl);
        for (const p of g.params) groupBodies.set(p, gBody);
    });
    for (const p of params) {
        const row = document.createElement('div');
        row.className = 'row';
        const label = document.createElement('label');
        label.textContent = p.label;
        const input = document.createElement('input');
        const val = document.createElement('span');
        val.className = 'val';
        if (p.type === 'bool') {
            input.type = 'checkbox';
            input.checked = !!cfg[p.key];
            input.addEventListener('change', () => {
                cfg[p.key] = input.checked ? 1 : 0;
                if (p.onChange) p.onChange();
                saveCfg();
            });
        } else {
            input.type = 'range';
            input.min = p.min; input.max = p.max; input.step = p.step;
            input.value = cfg[p.key];
            val.textContent = cfg[p.key];
            input.addEventListener('input', () => {
                cfg[p.key] = parseFloat(input.value);
                val.textContent = input.value;
                if (p.onChange) p.onChange();
                saveCfg();
            });
        }
        row.appendChild(label);
        row.appendChild(input);
        row.appendChild(val);
        (groupBodies.get(p) || body).appendChild(row);
    }
    const panel = document.getElementById('panel');
    document.getElementById('panelToggle').addEventListener('click', () => {
        panel.classList.toggle('open');
    });
    // Auto-beat while panel is open (so you can preview settings live).
    // Uses its own period (cfg.autoBeatPeriod), independent of beatCooldown.
    let lastAuto = 0;
    setInterval(() => {
        if (!cfg.autoBeatPreview) return;
        if (!panel.classList.contains('open')) return;
        const now = performance.now() / 1000;
        if (now - lastAuto < cfg.autoBeatPeriod) return;
        lastAuto = now;
        // bypass cooldown for preview; free (no charge cost)
        const saved = lastBeatTime;
        lastBeatTime = -999;
        fireBeat({ cost: false });
        lastBeatTime = Math.max(lastBeatTime, saved);
    }, 100);
    // Load saved (version-scoped — older saves ignored)
    try {
        localStorage.removeItem('ld59_cfg'); // clear old unversioned storage
        const saved = JSON.parse(localStorage.getItem('ld59_cfg_v' + CFG_VERSION) || 'null');
        if (saved) {
            Object.assign(cfg, saved);
            for (const input of body.querySelectorAll('input[type=range]')) {
                const key = input.previousSibling.textContent;
                const p = params.find(x => x.label === key);
                if (p) {
                    input.value = cfg[p.key];
                    input.nextSibling.textContent = cfg[p.key];
                }
            }
        }
        // virtualJoystick is SESSION-ONLY (never persisted): always derived from
        // real device capabilities. Toggling the panel checkbox is a temporary test.
        const isMobile = window.matchMedia('(pointer: coarse) and (hover: none)').matches;
        cfg.virtualJoystick = isMobile ? 1 : 0;
        const vjInput = [...body.querySelectorAll('input[type=checkbox]')].find(i => i.parentElement?.textContent?.includes('Virtual joystick'));
        if (vjInput) vjInput.checked = !!cfg.virtualJoystick;
        applyJoystickVisibility();
    } catch (e) {}
    charges = cfg.chargesStart;
    renderCharges();
    // Sync menu-camera sliders after cfg was loaded from storage
    const ca = document.getElementById('camAngle');
    const cd = document.getElementById('camDist');
    if (ca) { ca.value = cfg.menuCamAngle; document.getElementById('camAngleVal').textContent = cfg.menuCamAngle; }
    if (cd) { cd.value = cfg.menuCamDist;  document.getElementById('camDistVal').textContent  = (+cfg.menuCamDist).toFixed(2); }
})();
</script>
</body>
