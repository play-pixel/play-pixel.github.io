<body>
  <div class="editor-root">
    <header class="editor-header">
      <div class="tg group-left">
        <span class="editor-title">Skeleton</span>
        <select id="skeletonSelect" class="ctl">
          <option value="fighter">Fighter (NPC)</option>
          <option value="dog">Dog (NPC)</option>
          <option value="tank">Tank</option>
          <option value="mech">Mech</option>
          <option value="heli">Heli</option>
          <option value="drone">Drone</option>
          <option value="turret">Turret</option>
        </select>
        <button id="undoBtn" class="icon-btn" title="Undo (Ctrl+Z)">↶</button>
        <button id="redoBtn" class="icon-btn" title="Redo (Ctrl+Shift+Z)">↷</button>
      </div>

      <div class="tg group-mid">
        <div class="seg" role="tablist">
          <button class="seg-btn" data-view="wire" title="Wire (1)"><span class="ico">▭</span></button>
          <button class="seg-btn" data-view="silhouette" title="Silhouette (2)"><span class="ico">●</span></button>
          <button class="seg-btn" data-view="team" title="Team (3)"><span class="ico">◆</span></button>
        </div>
        <label class="chk"><input type="checkbox" id="toggleJoints" checked> Joints</label>
        <label class="chk"><input type="checkbox" id="toggleLabels" checked> Labels</label>
        <label class="chk"><input type="checkbox" id="toggleDecorations" checked> Dec.</label>
      </div>

      <div class="tg group-right">
        <button id="resetBtn"  class="icon-btn" title="Reset to default">⟲</button>
        <button id="importBtn" class="icon-btn" title="Import JSON">⇩</button>
        <button id="exportBtn" class="icon-btn" title="Export .js">⇪</button>
        <button id="applyBtn"  class="btn primary" title="Apply &amp; run in new tab">Apply ▸</button>
      </div>
    </header>

    <div class="editor-body">
      <main class="editor-canvas-wrap">
        <canvas id="editorCanvas"></canvas>
        <div id="dragHud" class="drag-hud" hidden></div>
      </main>
      <aside id="editorPanel" class="editor-panel">
        <div class="tabs" role="tablist">
          <button class="tab active" data-tab="outliner">Outliner</button>
          <button class="tab" data-tab="properties">Properties</button>
          <button class="tab" data-tab="skeleton">Skeleton</button>
        </div>
        <div id="tabBody" class="tab-body"></div>
      </aside>
    </div>

    <footer class="editor-status">
      <span id="statusCoords" class="s-item">x: 0  y: 0</span>
      <span id="statusZoom"   class="s-item">100%</span>
      <span id="statusSaved"  class="s-item s-saved">Saved</span>
      <span id="statusText"   class="s-item s-msg"></span>
    </footer>

    <input type="file" id="importFile" accept="application/json,.json" hidden>
  </div>
</body>
</html>
