  <style rel="stylesheet" crossorigin>:root{--bg: #14171c;--bg-2: #1c2028;--panel: #21262f;--line: #2c3340;--text: #d6dae3;--text-dim: #8a93a4;--accent: #6db3ff;--danger: #ef6b6b}*{box-sizing:border-box}html,body{margin:0;height:100%;background:var(--bg);color:var(--text);font:13px/1.4 system-ui,sans-serif}.editor-root{display:flex;flex-direction:column;height:100vh}.editor-header{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--bg-2);border-bottom:1px solid var(--line)}.editor-title{font-weight:600;margin-right:12px}.editor-header label{color:var(--text-dim)}.editor-header select,.btn{background:var(--panel);color:var(--text);border:1px solid var(--line);padding:5px 10px;border-radius:4px;cursor:pointer;font:inherit}.btn:hover{border-color:var(--accent)}.btn.primary{background:var(--accent);color:#0c1320;border-color:var(--accent)}.btn.danger{color:var(--danger)}.status{margin-left:auto;color:var(--text-dim);font-size:12px}.editor-body{flex:1;display:flex;min-height:0}.editor-canvas-wrap{flex:1;position:relative;overflow:hidden;background:#0e1116}#editorCanvas{display:block;width:100%;height:100%}.editor-panel{width:340px;background:var(--bg-2);border-left:1px solid var(--line);overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:12px}.section{background:var(--panel);border:1px solid var(--line);border-radius:4px}.section h3{margin:0;padding:8px 10px;font-size:12px;text-transform:uppercase;letter-spacing:.04em;color:var(--text-dim);border-bottom:1px solid var(--line)}.section .body{padding:8px 10px;display:flex;flex-direction:column;gap:6px}.list{display:flex;flex-direction:column;gap:2px;max-height:180px;overflow:auto}.list-item{padding:4px 6px;border-radius:3px;cursor:pointer;font-family:monospace;font-size:12px;display:flex;justify-content:space-between;align-items:center}.list-item:hover{background:var(--line)}.list-item.selected{background:var(--accent);color:#0c1320}.list-item .x{opacity:0;padding:0 4px}.list-item:hove <body>
  <div class="editor-root">
    <header class="editor-header">
      <span class="editor-title">NPC Skeleton Editor</span>
      <label>Скелет:
        <select id="skeletonSelect">
          <option value="fighter">Fighter (NPC)</option>
          <option value="dog">Dog (NPC)</option>
          <option value="tank">Tank</option>
          <option value="mech">Mech</option>
          <option value="heli">Heli</option>
          <option value="drone">Drone</option>
          <option value="turret">Turret</option>
        </select>
      </label>
      <label>Вид:
        <select id="viewMode">
          <option value="wire">Каркас</option>
          <option value="silhouette">Силуэт (белый)</option>
          <option value="team">Как в игре (red)</option>
        </select>
      </label>
      <label><input type="checkbox" id="toggleJoints" checked> Joints</label>
      <label><input type="checkbox" id="toggleLabels" checked> Метки</label>
      <button id="resetBtn"  class="btn">Сброс к исходному</button>
      <button id="importBtn" class="btn">Импорт JSON</button>
      <button id="exportBtn" class="btn">Экспорт .js</button>
      <button id="applyBtn"  class="btn primary">Применить и запустить</button>
      <span id="statusText" class="status"></span>
    </header>
    <div class="editor-body">
      <main class="editor-canvas-wrap">
        <canvas id="editorCanvas"></canvas>
      </main>
      <aside id="editorPanel" class="editor-panel"></aside>
    </div>
    <input type="file" id="importFile" accept="application/json,.json" hidden>
  </div>
</body>
</html>
