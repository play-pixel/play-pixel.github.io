<body>
  <div class="editor-root">
    <header class="editor-header">
      <span class="editor-title">NPC Skeleton Editor</span>
      <label>Скелет:
        <select id="skeletonSelect">
          <option value="fighter">Fighter (NPC)</option>
          <option value="dog">Dog (NPC)</option>
          <option value="tank">Tank</option>
          <option value="mech">Mech</option>
          <option value="heli">Heli</option>
          <option value="drone">Drone</option>
          <option value="turret">Turret</option>
        </select>
      </label>
      <label>Вид:
        <select id="viewMode">
          <option value="wire">Каркас</option>
          <option value="silhouette">Силуэт (белый)</option>
          <option value="team">Как в игре (red)</option>
        </select>
      </label>
      <label><input type="checkbox" id="toggleJoints" checked> Joints</label>
      <label><input type="checkbox" id="toggleLabels" checked> Метки</label>
      <label><input type="checkbox" id="toggleDecorations" checked> Декорации</label>
      <button id="resetBtn"  class="btn">Сброс к исходному</button>
      <button id="importBtn" class="btn">Импорт JSON</button>
      <button id="exportBtn" class="btn">Экспорт .js</button>
      <button id="applyBtn"  class="btn primary">Применить и запустить</button>
      <span id="statusText" class="status"></span>
    </header>
    <div class="editor-body">
      <main class="editor-canvas-wrap">
        <canvas id="editorCanvas"></canvas>
      </main>
      <aside id="editorPanel" class="editor-panel"></aside>
    </div>
    <input type="file" id="importFile" accept="application/json,.json" hidden>
  </div>
</body>
</html>
