  <style rel="stylesheet" crossorigin>*{box-sizing:border-box}html,body{width:100%;height:100%;margin:0;overflow:hidden}body{font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;color:#f6f8fb;background:#131720}canvas{display:block;width:100vw;height:100vh;background:#171c25;touch-action:none}canvas.dragging{cursor:grabbing}.hud{position:fixed;inset:14px 14px auto 14px;display:grid;grid-template-columns:minmax(260px,1fr) auto minmax(260px,1fr);gap:12px;align-items:start;pointer-events:none}.panel{pointer-events:auto;background:#161b25d1;border:1px solid rgba(255,255,255,.12);border-radius:8px;-webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);padding:10px;box-shadow:0 16px 44px #0000003d}.team-title{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:0 0 8px;font-size:13px;font-weight:760;letter-spacing:0}.dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:7px}.dot.red{background:#ff4d59}.dot.blue{background:#4aa3ff}.buttons{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:6px}button{min-height:38px;border:0;border-radius:7px;color:#f7fbff;background:#ffffff1a;font:700 12px/1.1 inherit;cursor:pointer;transition:transform .12s ease,background .12s ease,filter .12s ease}button:hover{transform:translateY(-1px);background:#ffffff29}button:active{transform:translateY(0);filter:brightness(.92)}.red-btn button{background:#ff4d5938}.blue-btn button{background:#4aa3ff38}.center-controls{display:flex;gap:8px;align-items:center;justify-content:center}.action{min-width:116px;background:#f2c84b;color:#191a1d}.ghost{min-width:74px;background:#ffffff1f;color:#eef3fb}.score{position:fixed;left:50%;bottom:17px;transform:translate(-50%);padding:8px 12px;border-radius:8px;color:#f6f8fbd1;background:#12161fb8;border:1px solid rgba(255,255,255,.1);font-size:12px;pointer-events:none}.settings{position:fixed;right:14px;top:110px;width:min(330px,calc(100vw - 28px));displ <body>
  <canvas id="arena"></canvas>
  <div class="hud">
    <div class="panel">
      <div class="team-title"><span><i class="dot red"></i>Красные</span><span id="redCount">0</span></div>
      <div class="buttons red-btn" id="redButtons"></div>
    </div>
    <div class="panel center-controls">
      <button class="action" id="autoBattle">Авто-битва</button>
      <button class="ghost" id="clearArena">Сброс</button>
      <button class="ghost" id="toggleSettings">Настройки физики</button>
      <a class="ghost" href="./editor.html" target="_blank" style="text-decoration:none;display:inline-block;text-align:center">Редактор NPC</a>
    </div>
    <div class="panel">
      <div class="team-title"><span><i class="dot blue"></i>Синие</span><span id="blueCount">0</span></div>
      <div class="buttons blue-btn" id="blueButtons"></div>
    </div>
  </div>
  <div class="panel settings" id="settingsPanel" hidden>
    <div class="settings-title">
      <span>Настройки физики</span>
      <button class="ghost" id="resetSettings">Сброс</button>
    </div>
    <label class="setting-row">
      <span>Суставы</span>
      <input id="jointTune" type="range" min="0.8" max="3.2" step="0.05" value="2.2">
      <output id="jointTuneValue">2.20</output>
    </label>
    <label class="setting-row">
      <span>Мышцы</span>
      <input id="muscleTune" type="range" min="0.8" max="3.8" step="0.05" value="2.6">
      <output id="muscleTuneValue">2.60</output>
    </label>
    <label class="setting-row">
      <span>Ноги</span>
      <input id="legTune" type="range" min="0.8" max="4.2" step="0.05" value="3">
      <output id="legTuneValue">3.00</output>
    </label>
    <label class="setting-row">
      <span>Стабильн.</span>
      <input id="stabilityTune" type="range" min="0.6" max="4.5" step="0.05" value="3">
      <output id="stabilityTuneValue">3.00</output>
    </label>
    <label class="setting-row">
      <span>Поддержка</span>
      <input id="supportTune" type="range" min="0" max="3.6" step="0.05" value="2.5">
      <output id="supportTuneValue">2.50</output>
    </label>
    <label class="setting-row">
      <span>Гравитация</span>
      <input id="gravityTune" type="range" min="0.55" max="1.55" step="0.01" value="1.02">
      <output id="gravityTuneValue">1.02</output>
    </label>
    <label class="setting-row">
      <span>Шаг</span>
      <input id="driveTune" type="range" min="0.5" max="2.5" step="0.05" value="1.08">
      <output id="driveTuneValue">1.08</output>
    </label>
    <label class="setting-row">
      <span>Кровь</span>
      <input id="bloodTune" type="range" min="0" max="3" step="0.1" value="1">
      <output id="bloodTuneValue">1.00</output>
    </label>
  </div>
  <div class="score" id="score">Matter.js active ragdolls, custom Canvas 2D render</div>
</body>
</html>
