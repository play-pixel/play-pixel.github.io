        this.type = TYPES[typeName];
        this.kind = 'heli';
        this.hpMax = this.type.hp;
        this.hp = this.hpMax;
        this.dead = false;
        this.corpseTimer = 0;
        this.corpseGhosted = false;
        this.age = Math.random() * 10;
        this.shootCd = .3 + Math.random() * .6;
        this.stagger = 0;
        this.facing = this.team.dir;
        this.id = Math.random().toString(36).slice(2);
        this.drawOrder = nextDrawOrder++;
        this.rotorAngle = Math.random() * Math.PI * 2;
        this.tailRotorAngle = 0;
        this.muzzleFlash = 0;
        this.bobPhase = Math.random() * Math.PI * 2;

        const s = this.type.size;
        const densityMass = this.type.mass / (s * s);
        const opts = { group: this.team.group, mass: densityMass };

        this.bodyW = 76 * s;
        this.bodyH = 26 * s;
        this.tailLen = 58 * s;
        this.targetAlt = this.type.altitude || 220;

        const hull = partRect(x, y, this.bodyW, this.bodyH, opts);
        Body.set(hull, { friction: .2, frictionAir: .14, restitution: .15 });
        Body.setMass(hull, densityMass * .6);
        this.parts = { hull };
        this.allBodies = [hull];
        this.constraints = [];
        World.add(world, [hull]);
      }

      get core() { return this.parts.hull; }
      get position() { return this.core.position; }

      nearestEnemy() {
        let best = null, bestD = Infinity;
        for (const o of fighters) {
          if (o === this || o.dead || o.teamName === this.teamName) continue;
          const d = Vector.magnitude(Vector.sub(o.position, this.position));
          if (d < bestD) { bestD = d; best = o; }
        }
        return { enemy: best, dist: bestD };
      }

      noseOffset() {
        return this.facing * this.bodyW * .42;
      }

      muzzlePoint() {
        const a = this.core.angle;
        const lx = this.noseOffset();
        const ly = this.bodyH * .35;
        return {
          x: this.core.position.x + Math.cos(a) * lx - Math.sin(a) * ly,
          y: this.core.position.y + Math.sin(a) * lx + Math.cos(a) * ly
        };
      }

      update(dt) {
        this.age += dt;
        this.bobPhase += dt * 2.2;
        this.muzzleFlash = Math.max(0, this.muzzleFlash - dt * 14);
        this.stagger = Math.max(0, this.stagger - dt * .55);

        if (this.dead) {
          this.updateCorpse(dt);
          return;
        }

        this.rotorAngle += dt * 60;
        this.tailRotorAngle += dt * 95;
        this.shootCd -= dt;

        const { enemy, dist } = this.nearestEnemy();
        if (enemy) this.facing = Math.sign(enemy.position.x - this.position.x) || this.facing;

        const floorY = H - 52;
        const bob = Math.sin(this.bobPhase) * 8;
        const targetY = floorY - this.targetAlt + bob;
        const altErr = targetY - this.position.y;
        const grav = engine.gravity.y * (engine.gravity.scale || .001);
        const lift = -this.core.mass * grav;
        const pdY = clamp(altErr * .000022 - this.core.velocity.y * .00060, -.0028, .0028) * this.core.mass;
        Body.applyForce(this.core, this.core.position, { x: 0, y: lift + pdY });

        if (enemy) {
          const dx = enemy.position.x - this.position.x;
          const dirSign = Math.sign(dx) || this.facing;
          const desiredDist = this.type.range * .55;
          const horizErr = Math.abs(dx) - desiredDist;
          if (horizErr > 0) {
            const fx = dirSign * .00060 * this.type.speed * this.core.mass * SETTINGS.drive * Math.min(1, horizErr / 60);
            Body.applyForce(this.core, this.core.position, { x: fx, y: 0 });
          } else if (horizErr < -40) {
            const fx = -dirSign * .00040 * this.type.speed * this.core.mass * SETTINGS.drive;
            Body.applyForce(this.core, this.core.position, { x: fx, y: 0 });
          }
        }

        Body.setAngularVelocity(this.core, this.core.angularVelocity * .82);
        if (Math.abs(this.core.angle) > .01) {
          this.core.torque -= this.core.angle * this.core.inertia * .015;
        }

        if (enemy && dist < this.type.range && this.shootCd <= 0) {
          this.fire(enemy);
        }
      }

      fire(enemy) {
        this.shootCd = this.type.fireRate * (.85 + Math.random() * .35);
        const muzzle = this.muzzlePoint();
        const dx = enemy.position.x - muzzle.x;
        const dy = enemy.position.y - 30 - muzzle.y;
        const len = Math.hypot(dx, dy);
        if (len < .1) return;
        const spread = (Math.random() - .5) * .08;
        const ang = Math.atan2(dy, dx) + spread;
        const ex = muzzle.x + Math.cos(ang) * len;
        const ey = muzzle.y + Math.sin(ang) * len;
        tracers.push({ x1: muzzle.x, y1: muzzle.y, x2: ex, y2: ey, life: .08, maxLife: .08, color: '#ffe89a' });
        particles.push({ x: muzzle.x, y: muzzle.y, vx: 0, vy: 0, life: .09, color: '#ffd24a' });
        this.muzzleFlash = 1;
        const hit = Math.random() > (this.type.missChance || 0);
        if (hit) {
          let hitBody = enemy.core;
          let bestD = Infinity;
          for (const b of enemy.allBodies) {
            const d = (b.position.x - ex) ** 2 + (b.position.y - ey) ** 2;
            if (d < bestD) { bestD = d; hitBody = b; }
          }
          const dirSign = Math.sign(dx) || 1;
          Body.applyForce(hitBody, hitBody.position, {
            x: dirSign * .020 * hitBody.mass,
            y: -.008 * hitBody.mass
          });
          enemy.takeDamage(this.type.damage * (.85 + Math.random() * .3),
            hitBody.position.x, hitBody.position.y, dirSign);
        }
        Body.applyForce(this.core, this.core.position, {
          x: -Math.sign(dx) * .0008 * this.core.mass,
          y: .0008 * this.core.mass
        });
      }

      takeDamage(amount, x, y, dirX = 0) {
        if (this.dead) return;
        this.hp -= amount;
        this.stagger = clamp(this.stagger + amount / this.hpMax * 1.15, 0, 1);
        Body.applyForce(this.core, this.core.position, {
          x: (Math.random() - .5) * amount * .00018,
          y: (Math.random() - .3) * amount * .00012
        });
        spawnBlood(x, y, dirX, clamp(amount / 14, .5, 2.0));
        damageTexts.push({ text: Math.round(amount), x, y, life: .85, color: this.team.color });
        if (this.hp <= 0) this.die();
      }

      die() {
        this.dead = true;
        this.hp = 0;
        this.corpseTimer = 3;
        this.corpseGhosted = false;
        shake = Math.max(shake, 22);
        flashes.push({ x: this.position.x, y: this.position.y, r: 80, life: .25, maxLife: .25, color: '#ff9a3a' });
        for (let i = 0; i < 24; i++) {
          const a = Math.random() * Math.PI * 2;
          const sp = 120 + Math.random() * 320;
          particles.push({
            x: this.position.x, y: this.position.y - 10,
            vx: Math.cos(a) * sp,
            vy: Math.sin(a) * sp - 60,
            life: .55 + Math.random() * .55,
            color: i % 3 === 0 ? '#ffe27a' : (i % 3 === 1 ? '#ff8a3a' : '#3a1d12')
          });
        }
        Body.set(this.core, { frictionAir: .02 });
        Body.setAngularVelocity(this.core, (Math.random() - .5) * .8);
        Body.applyForce(this.core, this.core.position, {
          x: (Math.random() - .5) * .02 * this.core.mass,
          y: -.01 * this.core.mass
        });
        const s = this.type.size;
        const opts = { group: this.team.group, mass: this.type.mass / (s * s) * .25 };
        this.debris = [];
        const newPieces = [];
        for (let i = 0; i < 6; i++) {
          const dx = (Math.random() - .5) * this.bodyW;
          const dy = (Math.random() - .5) * this.bodyH;
          const w = (8 + Math.random() * 14) * s;
          const h = (6 + Math.random() * 10) * s;
          const piece = partRect(this.position.x + dx, this.position.y + dy, w, h, opts);
          Body.set(piece, { frictionAir: .015, friction: .6, restitution: .15 });
          Body.applyForce(piece, piece.position, {
            x: (Math.random() - .5) * .04 * piece.mass,
            y: (-.025 - Math.random() * .025) * piece.mass
          });
          Body.setAngularVelocity(piece, (Math.random() - .5) * .8);
          this.debris.push({ body: piece, w, h });
          this.allBodies.push(piece);
          newPieces.push(piece);
        }
        World.add(world, newPieces);
      }

      updateCorpse(dt) {
        if (this.corpseGhosted) return;
        this.corpseTimer -= dt;
        const force = this.corpseTimer <= -4;
        let allRested = true;
        for (const b of this.allBodies) {
          if (b.isStatic) continue;
          const v2 = b.velocity.x * b.velocity.x + b.velocity.y * b.velocity.y;
          const w = Math.abs(b.angularVelocity);
          if (force || (this.corpseTimer <= 0 && v2 < .25 && w < .05)) {
            Body.setVelocity(b, { x: 0, y: 0 });
            Body.setAngularVelocity(b, 0);
            Body.setStatic(b, true);
            b.collisionFilter.mask = 0;
          } else {
            allRested = false;
          }
        }
        if (allRested && this.corpseTimer <= 0) this.corpseGhosted = true;
      }

      draw() {
        const color = this.dead ? desaturateHex(this.team.color) : this.team.color;
        const dark = this.dead ? desaturateHex(this.team.dark) : this.team.dark;
        const alpha = 1;
        const s = this.type.size;
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        if (this.debris) {
          for (const d of this.debris) {
            ctx.save();
            ctx.translate(d.body.position.x, d.body.position.y);
            ctx.rotate(d.body.angle);
            ctx.fillStyle = shadeHex(color, .55);
            ctx.strokeStyle = dark;
            ctx.lineWidth = 1.5;
            roundRect(-d.w / 2, -d.h / 2, d.w, d.h, 2);
            ctx.fill();
            ctx.stroke();
            ctx.restore();
          }
        }

        ctx.save();
        ctx.translate(this.core.position.x, this.core.position.y);
        ctx.rotate(this.core.angle);
        ctx.scale(this.facing, 1);

        const tailBoomEnd = -this.bodyW * .55 - this.tailLen;
        ctx.fillStyle = shadeHex(color, .7);
        ctx.strokeStyle = dark;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.rect(tailBoomEnd, -this.bodyH * .14, -this.bodyW * .15 - tailBoomEnd, this.bodyH * .28);
        ctx.fill();
        ctx.stroke();

        ctx.fillStyle = color;
        roundRect(-this.bodyW / 2, -this.bodyH / 2, this.bodyW, this.bodyH, 10);
        ctx.fill();
        ctx.stroke();

        ctx.fillStyle = '#7fdfff';
        ctx.beginPath();
        ctx.moveTo(this.bodyW * .12, -this.bodyH * .35);
        ctx.lineTo(this.bodyW * .48, -this.bodyH * .05);
        ctx.lineTo(this.bodyW * .48, this.bodyH * .25);
        ctx.lineTo(this.bodyW * .12, this.bodyH * .25);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();

        ctx.fillStyle = shadeHex(color, .55);
        ctx.beginPath();
        ctx.rect(-this.bodyW * .35, this.bodyH * .45, this.bodyW * .7, 3);
        ctx.fill();
        ctx.stroke();
        ctx.beginPath();
        ctx.rect(-this.bodyW * .3, this.bodyH * .35, 3, 14);
        ctx.fill();
        ctx.stroke();
        ctx.beginPath();
        ctx.rect(this.bodyW * .25, this.bodyH * .35, 3, 14);
        ctx.fill();
        ctx.stroke();

        ctx.fillStyle = shadeHex(color, .55);
        ctx.beginPath();
        ctx.moveTo(tailBoomEnd, -this.bodyH * .35);
        ctx.lineTo(tailBoomEnd - 14, -this.bodyH * .6);
        ctx.lineTo(tailBoomEnd - 14, this.bodyH * .18);
        ctx.lineTo(tailBoomEnd, this.bodyH * .18);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();

        const trX = tailBoomEnd - 8;
        const trY = -this.bodyH * .18;
        const trR = 10 * s;
        ctx.save();
        ctx.translate(trX, trY);
        ctx.scale(.32, 1);
        ctx.rotate(this.tailRotorAngle);
        ctx.strokeStyle = 'rgba(20,20,28,.7)';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(-trR, 0); ctx.lineTo(trR, 0);
        ctx.moveTo(0, -trR); ctx.lineTo(0, trR);
        ctx.stroke();
        ctx.restore();
        ctx.fillStyle = '#0d1015';
        ctx.beginPath();
        ctx.arc(trX, trY, 2.5, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#11141a';
        ctx.beginPath();
        ctx.rect(-3, -this.bodyH / 2 - 8, 6, 8);
        ctx.fill();
        ctx.stroke();

        const rotorR = this.bodyW * .65;
        const rotorY = -this.bodyH / 2 - 10;
        const rotorSquish = .22;
        ctx.save();
        ctx.translate(0, rotorY);
        ctx.scale(1, rotorSquish);
        ctx.rotate(this.rotorAngle);
        ctx.strokeStyle = 'rgba(20,20,28,.6)';
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.moveTo(-rotorR, 0); ctx.lineTo(rotorR, 0);
        ctx.stroke();
        ctx.rotate(Math.PI / 3);
        ctx.beginPath();
        ctx.moveTo(-rotorR, 0); ctx.lineTo(rotorR, 0);
        ctx.stroke();
        ctx.rotate(Math.PI / 3);
        ctx.beginPath();
        ctx.moveTo(-rotorR, 0); ctx.lineTo(rotorR, 0);
        ctx.stroke();
        ctx.restore();
        ctx.strokeStyle = 'rgba(20,20,28,.2)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.ellipse(0, rotorY, rotorR, rotorR * rotorSquish, 0, 0, Math.PI * 2);
        ctx.stroke();

        if (this.muzzleFlash > 0 && !this.dead) {
          ctx.fillStyle = '#fff5b6';
          ctx.globalAlpha = this.muzzleFlash * alpha;
          ctx.beginPath();
          ctx.arc(this.bodyW * .42, this.bodyH * .35, 6 * s, 0, Math.PI * 2);
          ctx.fill();
          ctx.globalAlpha = alpha;
        }

        ctx.restore();
        ctx.restore();
        if (!this.dead) this.drawHp();
      }

      drawHp() {
        const x = this.position.x - 28;
        const y = this.position.y - this.bodyH / 2 - 18;
        ctx.fillStyle = 'rgba(0,0,0,.45)';
        ctx.fillRect(x, y, 56, 5);
        ctx.fillStyle = this.team.color;
        ctx.fillRect(x, y, 56 * clamp(this.hp / this.hpMax, 0, 1), 5);
      }
    }

    class Drone {
      constructor(teamName, typeName, x, y) {
        this.teamName = teamName;
        this.team = TEAMS[teamName];
        this.typeName = typeName;
        this.type = TYPES[typeName];
        this.kind = 'drone';
        this.hpMax = this.type.hp;
        this.hp = this.hpMax;
        this.dead = false;
        this.corpseTimer = 0;
        this.corpseGhosted = false;
        this.age = Math.random() * 10;
        this.facing = this.team.dir;
        this.id = Math.random().toString(36).slice(2);
        this.drawOrder = nextDrawOrder++;
        this.bobPhase = Math.random() * Math.PI * 2;
        this.targetAlt = (this.type.altitude || 220) + (Math.random() - .5) * 60;
        this.diveLockedTarget = null;
        this.detonated = false;

        const s = this.type.size;
        const densityMass = this.type.mass / (s * s);
        const opts = { group: this.team.group, mass: densityMass };

        this.bodyW = 28 * s;
        this.bodyH = 10 * s;
        this.armSpan = 32 * s;

        const hull = partRect(x, y, this.bodyW, this.bodyH, opts);
        Body.set(hull, { friction: .2, frictionAir: .08, restitution: .2 });
        Body.setMass(hull, densityMass * .6);
        this.parts = { hull };
        this.allBodies = [hull];
        this.constraints = [];
        World.add(world, [hull]);
      }

      get core() { return this.parts.hull; }
      get position() { return this.core.position; }

      nearestEnemy() {
        let best = null, bestD = Infinity;
        for (const o of fighters) {
          if (o === this || o.dead || o.teamName === this.teamName) continue;
          const d = Vector.magnitude(Vector.sub(o.position, this.position));
          if (d < bestD) { bestD = d; best = o; }
        }
        return { enemy: best, dist: bestD };
      }

      update(dt) {
        this.age += dt;
        this.bobPhase += dt * 4.5;
        if (this.dead) {
          this.updateCorpse(dt);
          return;
        }

        let { enemy, dist } = this.nearestEnemy();
        if (this.diveLockedTarget && !this.diveLockedTarget.dead) {
          enemy = this.diveLockedTarget;
          dist = Vector.magnitude(Vector.sub(enemy.position, this.position));
        }
        if (enemy) this.facing = Math.sign(enemy.position.x - this.position.x) || this.facing;

        const grav = engine.gravity.y * (engine.gravity.scale || .001);
        const lift = -this.core.mass * grav;

        if (enemy && dist < 220) {
          this.diveLockedTarget = enemy;
          const dx = enemy.position.x - this.position.x;
          const dy = enemy.position.y - this.position.y;
          const len = Math.max(1, Math.hypot(dx, dy));
          const ax = dx / len;
          const ay = dy / len;
          const F = .0011 * this.type.speed * this.core.mass * SETTINGS.drive;
          Body.applyForce(this.core, this.core.position, {
            x: ax * F,
            y: ay * F + lift * .2
          });
          let near = Infinity;
          for (const b of enemy.allBodies) {
            const cx = Math.max(b.bounds.min.x, Math.min(this.position.x, b.bounds.max.x));
            const cy = Math.max(b.bounds.min.y, Math.min(this.position.y, b.bounds.max.y));
            const d2 = (this.position.x - cx) ** 2 + (this.position.y - cy) ** 2;
            if (d2 < near) near = d2;
          }
          if (near < 16 * 16) {
            this.detonate();
            return;
          }
        } else {
          const floorY = H - 52;
          const bob = Math.sin(this.bobPhase) * 4;
          const targetY = floorY - this.targetAlt + bob;
          const altErr = targetY - this.position.y;
          const pdY = clamp(altErr * .000028 - this.core.velocity.y * .00065, -.0030, .0030) * this.core.mass;
          Body.applyForce(this.core, this.core.position, { x: 0, y: lift + pdY });
          if (enemy) {
            const dx = enemy.position.x - this.position.x;
            const dirSign = Math.sign(dx) || this.facing;
            const fx = dirSign * .00055 * this.type.speed * this.core.mass * SETTINGS.drive;
            Body.applyForce(this.core, this.core.position, { x: fx, y: 0 });
          }
        }

        Body.setAngularVelocity(this.core, this.core.angularVelocity * .8);
        if (Math.abs(this.core.angle) > .01) {
          this.core.torque -= this.core.angle * this.core.inertia * .015;
        }
      }

      detonate() {
        if (this.detonated) return;
        this.detonated = true;
        explode(this.position.x, this.position.y, this.type.blastRadius, this.type.damage, this.id);
        this.hp = 0;
        this.dead = true;
        this.corpseGhosted = true;
        this.removed = true;
        World.remove(world, this.allBodies);
        this.allBodies = [];
        this.constraints = [];
      }

      takeDamage(amount, x, y, dirX = 0) {
        if (this.dead) return;
        this.hp -= amount;
        Body.applyForce(this.core, this.core.position, {
          x: (Math.random() - .5) * amount * .00040,
          y: (Math.random() - .3) * amount * .00030
        });
        spawnBlood(x, y, dirX, clamp(amount / 14, .3, 1.2));
        damageTexts.push({ text: Math.round(amount), x, y, life: .85, color: this.team.color });
        if (this.hp <= 0) this.die();
      }

      die() {
        if (this.dead) return;
        flashes.push({ x: this.position.x, y: this.position.y, r: 26, life: .16, maxLife: .16, color: '#ff9a3a' });
        for (let i = 0; i < 10; i++) {
          const a = Math.random() * Math.PI * 2;
          const sp = 80 + Math.random() * 200;
          particles.push({
            x: this.position.x, y: this.position.y,
            vx: Math.cos(a) * sp,
            vy: Math.sin(a) * sp - 40,
            life: .45 + Math.random() * .4,
            color: i % 2 === 0 ? '#ffe27a' : '#3a1d12'
          });
        }
        this.dead = true;
        this.corpseGhosted = true;
        this.removed = true;
        World.remove(world, this.allBodies);
        this.allBodies = [];
        this.constraints = [];
      }

      updateCorpse(dt) {
        if (this.corpseGhosted) return;
        this.corpseTimer -= dt;
        const force = this.corpseTimer <= -3;
        let allRested = true;
        for (const b of this.allBodies) {
          if (b.isStatic) continue;
          const v2 = b.velocity.x * b.velocity.x + b.velocity.y * b.velocity.y;
          const w = Math.abs(b.angularVelocity);
          if (force || (this.corpseTimer <= 0 && v2 < .25 && w < .05)) {
            Body.setVelocity(b, { x: 0, y: 0 });
            Body.setAngularVelocity(b, 0);
            Body.setStatic(b, true);
            b.collisionFilter.mask = 0;
          } else {
            allRested = false;
          }
        }
        if (allRested && this.corpseTimer <= 0) this.corpseGhosted = true;
      }

      draw() {
        if (this.removed) return;
        const color = this.dead ? desaturateHex(this.team.color) : this.team.color;
        const dark = this.dead ? desaturateHex(this.team.dark) : this.team.dark;
        const alpha = 1;
        const s = this.type.size;
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.translate(this.core.position.x, this.core.position.y);
        ctx.rotate(this.core.angle);

        ctx.strokeStyle = dark;
        ctx.fillStyle = '#2a2d36';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.rect(-this.armSpan / 2, -1.5, this.armSpan, 3);
        ctx.fill();
        ctx.stroke();
        ctx.beginPath();
        ctx.rect(-1.5, -this.armSpan / 2, 3, this.armSpan);
        ctx.fill();
        ctx.stroke();

        ctx.fillStyle = color;
        roundRect(-this.bodyW / 2, -this.bodyH / 2, this.bodyW, this.bodyH, 3);
        ctx.fill();
        ctx.stroke();

        ctx.fillStyle = '#ff5e3a';
        ctx.beginPath();
        ctx.arc(this.facing * this.bodyW * .35, 0, 2.5 * s, 0, Math.PI * 2);
        ctx.fill();

        const corners = [
          [-this.armSpan / 2, 0],
          [this.armSpan / 2, 0],
          [0, -this.armSpan / 2],
          [0, this.armSpan / 2]
        ];
        ctx.fillStyle = '#11141a';
        for (const [cx, cy] of corners) {
          ctx.beginPath();
          ctx.arc(cx, cy, 2, 0, Math.PI * 2);
          ctx.fill();
        }

        ctx.restore();
        if (!this.dead) this.drawHp();
      }

      drawHp() {
        const x = this.position.x - 16;
        const y = this.position.y - this.bodyH - 12;
        ctx.fillStyle = 'rgba(0,0,0,.45)';
        ctx.fillRect(x, y, 32, 3);
        ctx.fillStyle = this.team.color;
        ctx.fillRect(x, y, 32 * clamp(this.hp / this.hpMax, 0, 1), 3);
      }
    }

    class Turret {
      constructor(teamName, typeName, x, y) {
        this.teamName = teamName;
        this.team = TEAMS[teamName];
        this.typeName = typeName;
        this.type = TYPES[typeName];
        this.kind = 'turret';
        this.hpMax = this.type.hp;
        this.hp = this.hpMax;
        this.dead = false;
        this.corpseTimer = 0;
        this.corpseGhosted = false;
        this.age = Math.random() * 10;
        this.shootCd = .2 + Math.random() * .5;
        this.facing = this.team.dir;
        this.id = Math.random().toString(36).slice(2);
        this.drawOrder = nextDrawOrder++;
        this.turretAngle = this.facing > 0 ? -.15 : Math.PI + .15;
        this.recoil = 0;
        this.fireFlash = 0;
        this.barrelToggle = 0;

        const s = this.type.size;
        const opts = { group: this.team.group, mass: this.type.mass };

        this.baseW = 84 * s;
        this.baseH = 38 * s;
        this.cannonLen = 50 * s;
        this.turretR = 18 * s;

        const hull = partRect(x, y, this.baseW, this.baseH, opts);
        Body.set(hull, { friction: 1, frictionAir: .04, restitution: .02 });
        Body.setStatic(hull, true);
        this.parts = { hull };
        this.allBodies = [hull];
        this.constraints = [];
        World.add(world, [hull]);
      }

      get core() { return this.parts.hull; }
      get position() { return this.core.position; }

      nearestEnemy() {
        let best = null, bestD = Infinity;
        for (const o of fighters) {
          if (o === this || o.dead || o.teamName === this.teamName) continue;
          const d = Vector.magnitude(Vector.sub(o.position, this.position));
          if (d < bestD) { bestD = d; best = o; }
        }
        return { enemy: best, dist: bestD };
      }

      turretPivot() {
        return {
          x: this.core.position.x,
          y: this.core.position.y - this.baseH / 2 - 4
        };
      }

      muzzlePoint() {
        const p = this.turretPivot();
        return {
          x: p.x + Math.cos(this.turretAngle) * this.cannonLen,
          y: p.y + Math.sin(this.turretAngle) * this.cannonLen
        };
      }

      update(dt) {
        this.age += dt;
        this.recoil = Math.max(0, this.recoil - dt * 6);
        this.fireFlash = Math.max(0, this.fireFlash - dt * 14);
        if (this.dead) { this.updateCorpse(dt); return; }
        this.shootCd -= dt;

        const { enemy, dist } = this.nearestEnemy();
        if (enemy) {
          this.facing = Math.sign(enemy.position.x - this.position.x) || this.facing;
          const pivot = this.turretPivot();
          const desired = Math.atan2(enemy.position.y - 30 - pivot.y, enemy.position.x - pivot.x);
          this.turretAngle += angleDelta(desired, this.turretAngle) * Math.min(1, dt * 6);
        }

        if (enemy && dist < this.type.range && this.shootCd <= 0) this.fire(enemy);
      }

      fire(enemy) {
        this.shootCd = this.type.fireRate * (.85 + Math.random() * .35);
        const muzzle = this.muzzlePoint();
        const dx = enemy.position.x - muzzle.x;
        const dy = enemy.position.y - 30 - muzzle.y;
        const len = Math.hypot(dx, dy);
        if (len < .1) return;
        const spread = (Math.random() - .5) * .05;
        const ang = Math.atan2(dy, dx) + spread;
        const ex = muzzle.x + Math.cos(ang) * len;
        const ey = muzzle.y + Math.sin(ang) * len;
        tracers.push({ x1: muzzle.x, y1: muzzle.y, x2: ex, y2: ey, life: .08, maxLife: .08, color: '#ffe89a' });
        particles.push({ x: muzzle.x, y: muzzle.y, vx: 0, vy: 0, life: .09, color: '#ffd24a' });
        this.recoil = 1;
        this.fireFlash = 1;
        this.barrelToggle ^= 1;
        const hit = Math.random() > (this.type.missChance || 0);
        if (hit) {
          let hitBody = enemy.core;
          let bestD = Infinity;
          for (const b of enemy.allBodies) {
            const d = (b.position.x - ex) ** 2 + (b.position.y - ey) ** 2;
            if (d < bestD) { bestD = d; hitBody = b; }
          }
          const dirSign = Math.sign(dx) || 1;
          Body.applyForce(hitBody, hitBody.position, {
            x: dirSign * .026 * hitBody.mass,
            y: -.010 * hitBody.mass
          });
          enemy.takeDamage(this.type.damage * (.85 + Math.random() * .3),
            hitBody.position.x, hitBody.position.y, dirSign);
        }
      }

      takeDamage(amount, x, y, dirX = 0) {
        if (this.dead) return;
        this.hp -= amount;
        spawnBlood(x, y, dirX, clamp(amount / 16, .3, 1.5));
        damageTexts.push({ text: Math.round(amount), x, y, life: .85, color: this.team.color });
        if (this.hp <= 0) this.die();
      }

      die() {
        this.dead = true;
        this.corpseTimer = 3;
        this.corpseGhosted = false;
        shake = Math.max(shake, 22);
        explode(this.position.x, this.position.y - this.baseH * .2, 100, 30, this.id);
        Body.setStatic(this.core, false);
        Body.set(this.core, { frictionAir: .04 });
        Body.applyForce(this.core, this.core.position, {
          x: (Math.random() - .5) * .03 * this.core.mass,
          y: -.01 * this.core.mass
        });
        Body.setAngularVelocity(this.core, (Math.random() - .5) * .4);

        const s = this.type.size;
        const opts = { group: this.team.group, mass: this.type.mass / (s * s) * .25 };
        this.debris = [];
        const newPieces = [];
        for (let i = 0; i < 6; i++) {
          const dx = (Math.random() - .5) * this.baseW * .8;
          const dy = (Math.random() - .5) * this.baseH * .6;
          const w = (10 + Math.random() * 14) * s;
          const h = (8 + Math.random() * 10) * s;
          const piece = partRect(this.position.x + dx, this.position.y + dy, w, h, opts);
          Body.set(piece, { frictionAir: .015, friction: .8, restitution: .12 });
          Body.applyForce(piece, piece.position, {
            x: (Math.random() - .5) * .04 * piece.mass,
            y: (-.03 - Math.random() * .025) * piece.mass
          });
          Body.setAngularVelocity(piece, (Math.random() - .5) * .8);
          this.debris.push({ body: piece, w, h });
          this.allBodies.push(piece);
          newPieces.push(piece);
        }
        World.add(world, newPieces);
      }

      updateCorpse(dt) {
        if (this.corpseGhosted) return;
        this.corpseTimer -= dt;
        const force = this.corpseTimer <= -4;
        let allRested = true;
        for (const b of this.allBodies) {
          if (b.isStatic) continue;
          const v2 = b.velocity.x * b.velocity.x + b.velocity.y * b.velocity.y;
          const w = Math.abs(b.angularVelocity);
          if (force || (this.corpseTimer <= 0 && v2 < .25 && w < .05)) {
            Body.setVelocity(b, { x: 0, y: 0 });
            Body.setAngularVelocity(b, 0);
            Body.setStatic(b, true);
            b.collisionFilter.mask = 0;
          } else {
            allRested = false;
          }
        }
        if (allRested && this.corpseTimer <= 0) this.corpseGhosted = true;
      }

      draw() {
        const color = this.dead ? desaturateHex(this.team.color) : this.team.color;
        const dark = this.dead ? desaturateHex(this.team.dark) : this.team.dark;
        const alpha = 1;
        const s = this.type.size;
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        if (this.debris) {
          for (const d of this.debris) {
            ctx.save();
            ctx.translate(d.body.position.x, d.body.position.y);
            ctx.rotate(d.body.angle);
            ctx.fillStyle = '#5b5e66';
            ctx.strokeStyle = '#1d1f25';
            ctx.lineWidth = 1.5;
            roundRect(-d.w / 2, -d.h / 2, d.w, d.h, 2);
            ctx.fill();
            ctx.stroke();
            ctx.restore();
          }
        }

        ctx.save();
        ctx.translate(this.core.position.x, this.core.position.y);
        ctx.rotate(this.core.angle);
        ctx.fillStyle = '#5e6068';
        ctx.strokeStyle = '#1d1f25';
        ctx.lineWidth = 2;
        roundRect(-this.baseW / 2, -this.baseH / 2, this.baseW, this.baseH, 6);
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = '#3a3d44';
        ctx.beginPath();
        ctx.rect(-this.baseW / 2 + 4, this.baseH / 2 - 8, this.baseW - 8, 5);
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = shadeHex(color, .55);
        ctx.beginPath();
        ctx.rect(-this.baseW / 2 + 4, -this.baseH / 2 + 4, this.baseW - 8, 4);
        ctx.fill();
        ctx.stroke();

        const sandbagY = -this.baseH / 2 - 6;
        for (let i = 0; i < 5; i++) {
          const sx = -this.baseW / 2 + 8 + i * (this.baseW - 16) / 4;
          ctx.fillStyle = i % 2 === 0 ? '#7a6a4a' : '#5f5337';
          ctx.strokeStyle = '#1d1f25';
          ctx.beginPath();
          ctx.ellipse(sx, sandbagY, 11, 7, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.stroke();
        }
        ctx.restore();

        if (!this.dead) {
          const pivot = this.turretPivot();
          ctx.save();
          ctx.translate(pivot.x, pivot.y);
          ctx.fillStyle = shadeHex(color, .82);
          ctx.strokeStyle = dark;
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(0, 0, this.turretR, 0, Math.PI * 2);
          ctx.fill();
          ctx.stroke();
          ctx.fillStyle = color;
          ctx.beginPath();
          ctx.arc(0, 0, this.turretR * .55, 0, Math.PI * 2);
          ctx.fill();
          ctx.stroke();

          ctx.rotate(this.turretAngle);
          const recoilOffset = -this.recoil * 6 * s;
          ctx.fillStyle = '#2a2d36';
          ctx.strokeStyle = '#0d1015';
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.rect(recoilOffset, -3 * s, this.cannonLen, 6 * s);
          ctx.fill();
          ctx.stroke();
          ctx.fillStyle = '#11141a';
          ctx.beginPath();
          ctx.rect(this.cannonLen - 5 * s + recoilOffset, -4.5 * s, 5 * s, 9 * s);
          ctx.fill();
          ctx.stroke();
          if (this.fireFlash > 0) {
            ctx.fillStyle = '#fff5b6';
            ctx.globalAlpha = this.fireFlash * alpha;
            ctx.beginPath();
            ctx.arc(this.cannonLen + 3 * s + recoilOffset, 0, 7 * s, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = alpha;
          }
          ctx.restore();
        }

        ctx.restore();
        if (!this.dead) this.drawHp();
      }

      drawHp() {
        const x = this.position.x - 28;
        const y = this.position.y - this.baseH / 2 - this.turretR * 2 - 16;
        ctx.fillStyle = 'rgba(0,0,0,.45)';
        ctx.fillRect(x, y, 56, 5);
        ctx.fillStyle = this.team.color;
        ctx.fillRect(x, y, 56 * clamp(this.hp / this.hpMax, 0, 1), 5);
      }
    }

    function drawBone(body, w, h, color, dark) {
      ctx.save();
      ctx.translate(body.position.x, body.position.y);
      ctx.rotate(body.angle);
      ctx.fillStyle = color;
      ctx.strokeStyle = dark;
      ctx.lineWidth = 2;
      roundRect(-w / 2, -h / 2, w, h, Math.min(w, h) * .42);
      ctx.fill();
      ctx.stroke();
      ctx.restore();
    }

    function drawHead(body, r, color, dark, facing) {
      ctx.save();
      ctx.translate(body.position.x, body.position.y);
      ctx.rotate(body.angle);
      ctx.fillStyle = color;
      ctx.strokeStyle = dark;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(0, 0, r, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle = '#11151d';
      ctx.beginPath();
      ctx.arc(4 * facing, -3, Math.max(2, r * .16), 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function drawArmParts(fighter, side, color, dark) {
      const s = fighter.type.size;
      const upper = side > 0 ? fighter.parts.upperR : fighter.parts.upperL;
      const lower = side > 0 ? fighter.parts.lowerR : fighter.parts.lowerL;
      drawBone(upper, 12 * s, 32 * s, color, dark);
      drawBone(lower, 10 * s, 31 * s, color, dark);
    }

    function drawLegParts(fighter, side, color, dark) {
      const s = fighter.type.size;
      const thigh = side > 0 ? fighter.parts.thighR : fighter.parts.thighL;
      const shin = side > 0 ? fighter.parts.shinR : fighter.parts.shinL;
      drawBone(thigh, 12 * s, 35 * s, color, dark);
      drawBone(shin, 11 * s, 35 * s, color, dark);
    }

    function shadeHex(hex, factor) {
      const clean = hex.replace('#', '');
      const r = Math.round(parseInt(clean.slice(0, 2), 16) * factor);
      const g = Math.round(parseInt(clean.slice(2, 4), 16) * factor);
      const b = Math.round(parseInt(clean.slice(4, 6), 16) * factor);
      return `rgb(${r}, ${g}, ${b})`;
    }

    function desaturateHex(hex, mix = .85, darken = .78) {
      const clean = hex.replace('#', '');
      const r = parseInt(clean.slice(0, 2), 16);
      const g = parseInt(clean.slice(2, 4), 16);
      const b = parseInt(clean.slice(4, 6), 16);
      const luma = 0.299 * r + 0.587 * g + 0.114 * b;
      const mr = clamp(Math.round((r * (1 - mix) + luma * mix) * darken), 0, 255);
      const mg = clamp(Math.round((g * (1 - mix) + luma * mix) * darken), 0, 255);
      const mb = clamp(Math.round((b * (1 - mix) + luma * mix) * darken), 0, 255);
      const toHex = v => v.toString(16).padStart(2, '0');
      return `#${toHex(mr)}${toHex(mg)}${toHex(mb)}`;
    }

    function roundRect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
    }

    function spawnFighter(teamName, typeName) {
      const team = TEAMS[teamName];
      const type = TYPES[typeName];
      spawnOffsets[teamName] = (spawnOffsets[teamName] + 31) % 94;
      const x = team.spawnX + team.dir * (Math.random() * 35 + spawnOffsets[teamName]);
      const floorTop = H - 52;
      let footOffset;
      if (type.kind === 'dog') footOffset = 50 * type.size;
      else if (type.kind === 'tank') footOffset = 38 * type.size;
      else if (type.kind === 'mech') footOffset = 50 * type.size;
      else if (type.kind === 'heli') footOffset = (type.altitude || 220) + 16;
      else if (type.kind === 'drone') footOffset = (type.altitude || 220) + (Math.random() - .5) * 80;
      else if (type.kind === 'turret') footOffset = 22 * type.size;
      else footOffset = 57 * type.size;
      const y = floorTop - footOffset - 4;
      let f;
      if (type.kind === 'dog') f = new Dog(teamName, typeName, x, y);
      else if (type.kind === 'tank') f = new Tank(teamName, typeName, x, y);
      else if (type.kind === 'mech') f = new Mech(teamName, typeName, x, y);
      else if (type.kind === 'heli') f = new Heli(teamName, typeName, x, y);
      else if (type.kind === 'drone') f = new Drone(teamName, typeName, x, y);
      else if (type.kind === 'turret') f = new Turret(teamName, typeName, x, y);
      else f = new Fighter(teamName, typeName, x, y);
      fighters.push(f);
      updateCounts();
    }

    function clearArena() {
      for (const f of fighters) World.remove(world, [...f.allBodies, ...f.constraints]);
      stopDragging();
      fighters = [];
      damageTexts = [];
      particles = [];
      tracers = [];
      rockets = [];
      flashes = [];
      shake = 0;
      nextDrawOrder = 0;
      spawnOffsets.red = 0;
      spawnOffsets.blue = 0;
      updateCounts();
    }

    function autoBattle() {
      clearArena();
      const keys = Object.keys(TYPES);
      for (let i = 0; i < 3; i++) {
        setTimeout(() => spawnFighter('red', keys[Math.floor(Math.random() * keys.length)]), i * 95);
        setTimeout(() => spawnFighter('blue', keys[Math.floor(Math.random() * keys.length)]), i * 95 + 45);
      }
    }

    function updateCounts() {
      const red = fighters.filter(f => f.teamName === 'red' && !f.dead).length;
      const blue = fighters.filter(f => f.teamName === 'blue' && !f.dead).length;
      document.getElementById('redCount').textContent = red;
      document.getElementById('blueCount').textContent = blue;
      document.getElementById('score').textContent = `Красные: ${red} | Синие: ${blue} | Тел: ${fighters.length}`;
    }

    function eventPoint(event) {
      const rect = canvas.getBoundingClientRect();
      return {
        x: event.clientX - rect.left,
        y: event.clientY - rect.top
      };
    }

    function pickBody(point) {
      const bodies = fighters.flatMap(f => f.allBodies);
      const hits = Query.point(bodies, point);
      if (hits.length) return hits[hits.length - 1];

      let nearest = null;
      let nearestD = 24;
      for (const body of bodies) {
        const d = Vector.magnitude(Vector.sub(body.position, point));
        if (d < nearestD) {
          nearest = body;
          nearestD = d;
        }
      }
      return nearest;
    }

    function startDragging(event) {
      if (dragConstraint || event.button > 0) return;
      const point = eventPoint(event);
      const body = pickBody(point);
      if (!body) return;

      dragPointerId = event.pointerId;
      dragPoint.x = point.x;
      dragPoint.y = point.y;
      dragConstraint = Constraint.create({
        pointA: dragPoint,
        bodyB: body,
        pointB: Vector.rotate(Vector.sub(point, body.position), -body.angle),
        stiffness: .18,
        damping: .22,
        length: 0
      });
      World.add(world, dragConstraint);
      canvas.classList.add('dragging');
      canvas.setPointerCapture(event.pointerId);
      event.preventDefault();
    }

    function moveDragging(event) {
      if (!dragConstraint || event.pointerId !== dragPointerId) return;
      const point = eventPoint(event);
      dragPoint.x = point.x;
      dragPoint.y = point.y;
      event.preventDefault();
    }

    function stopDragging(event) {
      if (!dragConstraint) return;
      if (event && event.pointerId !== dragPointerId) return;
      World.remove(world, dragConstraint);
      dragConstraint = null;
      dragPointerId = null;
      canvas.classList.remove('dragging');
      if (event && canvas.hasPointerCapture(event.pointerId)) {
        canvas.releasePointerCapture(event.pointerId);
      }
    }

    function applySettingsToWorld() {
      engine.gravity.y = SETTINGS.gravity;
      for (const fighter of fighters) {
        for (const constraint of fighter.constraints) {
          constraint.stiffness = Math.min(.99, constraint.baseStiffness * SETTINGS.joint);
        }
      }
    }

    function syncSettingsUi() {
      for (const key of Object.keys(DEFAULT_SETTINGS)) {
        const input = document.getElementById(key + 'Tune');
        const output = document.getElementById(key + 'TuneValue');
        input.value = SETTINGS[key];
        output.value = Number(SETTINGS[key]).toFixed(2);
      }
    }

    function buildSettings() {
      for (const key of Object.keys(DEFAULT_SETTINGS)) {
        const input = document.getElementById(key + 'Tune');
        const output = document.getElementById(key + 'TuneValue');
        input.addEventListener('input', () => {
          SETTINGS[key] = Number(input.value);
          output.value = SETTINGS[key].toFixed(2);
          applySettingsToWorld();
        });
      }
      document.getElementById('resetSettings').addEventListener('click', () => {
        Object.assign(SETTINGS, DEFAULT_SETTINGS);
        syncSettingsUi();
        applySettingsToWorld();
      });
      syncSettingsUi();
      applySettingsToWorld();
    }

    function buildUi() {
      for (const team of ['red', 'blue']) {
        const box = document.getElementById(team + 'Buttons');
        for (const [key, type] of Object.entries(TYPES)) {
          const button = document.createElement('button');
          button.textContent = type.label;
          button.title = `${type.hp} HP, ${type.damage} урон`;
          button.addEventListener('click', () => {
            const n = type.swarm || 1;
            for (let i = 0; i < n; i++) {
              setTimeout(() => spawnFighter(team, key), i * 60);
            }
          });
          box.appendChild(button);
        }
      }
      document.getElementById('autoBattle').addEventListener('click', autoBattle);
      document.getElementById('clearArena').addEventListener('click', clearArena);
      const settingsPanel = document.getElementById('settingsPanel');
      const toggleBtn = document.getElementById('toggleSettings');
      toggleBtn.addEventListener('click', () => {
        settingsPanel.hidden = !settingsPanel.hidden;
      });
      buildSettings();
    }

    function drawArena() {
      const grad = ctx.createLinearGradient(0, 0, 0, H);
      grad.addColorStop(0, '#1b202a');
      grad.addColorStop(.62, '#22252d');
      grad.addColorStop(1, '#151922');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, W, H);

      ctx.strokeStyle = 'rgba(255,255,255,.055)';
      ctx.lineWidth = 1;
      for (let x = 0; x < W; x += 56) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, H);
        ctx.stroke();
      }
      for (let y = H - 250; y < H; y += 42) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(W, y);
        ctx.stroke();
      }
      ctx.fillStyle = '#252b35';
      ctx.fillRect(0, H - 52, W, 52);
      ctx.fillStyle = '#313946';
      ctx.fillRect(0, H - 52, W, 8);
      ctx.fillStyle = 'rgba(255,77,89,.15)';
      ctx.fillRect(0, H - 52, W * .22, 8);
      ctx.fillStyle = 'rgba(74,163,255,.15)';
      ctx.fillRect(W * .78, H - 52, W * .22, 8);
    }

    function drawEffects(dt) {
      for (let i = damageTexts.length - 1; i >= 0; i--) {
        const d = damageTexts[i];
        d.life -= dt;
        d.y -= dt * 56;
        if (d.life <= 0) {
          damageTexts.splice(i, 1);
          continue;
        }
        ctx.globalAlpha = clamp(d.life / .85, 0, 1);
        ctx.font = '800 18px Inter, system-ui, sans-serif';
        ctx.textAlign = 'center';
        ctx.lineWidth = 4;
        ctx.strokeStyle = 'rgba(0,0,0,.62)';
        ctx.strokeText(d.text, d.x, d.y);
        ctx.fillStyle = '#fff5bd';
        ctx.fillText(d.text, d.x, d.y);
        ctx.globalAlpha = 1;
      }

      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.life -= dt;
        p.vy += 640 * dt;
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        if (p.life <= 0) {
          particles.splice(i, 1);
          continue;
        }
        ctx.globalAlpha = clamp(p.life, 0, 1);
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x - 2, p.y - 2, 4, 4);
        ctx.globalAlpha = 1;
      }

      for (let i = flashes.length - 1; i >= 0; i--) {
        const f = flashes[i];
        f.life -= dt;
        if (f.life <= 0) { flashes.splice(i, 1); continue; }
        const k = f.life / f.maxLife;
        const r = f.r * (1.4 - k * .4);
        ctx.globalAlpha = k;
        const grad = ctx.createRadialGradient(f.x, f.y, 0, f.x, f.y, r);
        grad.addColorStop(0, f.color);
        grad.addColorStop(.55, f.color.length > 7 ? f.color : f.color + '88');
        grad.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(f.x, f.y, r, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
      }

      for (const r of rockets) {
        ctx.save();
        ctx.translate(r.x, r.y);
        ctx.rotate(r.angle);
        if (r.kind === 'shell') {
          const ss = r.size != null ? r.size : 1;
          ctx.fillStyle = '#1c1e23';
          ctx.strokeStyle = '#0d1015';
          ctx.lineWidth = 1.5;
          ctx.beginPath();
          ctx.rect(-7 * ss, -2.5 * ss, 12 * ss, 5 * ss);
          ctx.fill();
          ctx.stroke();
          ctx.fillStyle = '#5b5c63';
          ctx.beginPath();
          ctx.moveTo(5 * ss, -2.5 * ss);
          ctx.lineTo(9 * ss, 0);
          ctx.lineTo(5 * ss, 2.5 * ss);
          ctx.closePath();
          ctx.fill();
          ctx.stroke();
        } else {
          ctx.fillStyle = '#2c2f37';
          ctx.strokeStyle = '#0d1015';
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.rect(-9, -3, 18, 6);
          ctx.fill();
          ctx.stroke();
          ctx.fillStyle = '#ff5e3a';
          ctx.beginPath();
          ctx.moveTo(9, -3);
          ctx.lineTo(13, 0);
          ctx.lineTo(9, 3);
          ctx.closePath();
          ctx.fill();
          ctx.fillStyle = '#ffe27a';
          ctx.beginPath();
          ctx.arc(-10 - Math.random() * 4, 0, 3 + Math.random() * 2, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      }

      for (let i = tracers.length - 1; i >= 0; i--) {
        const t = tracers[i];
        t.life -= dt;
        if (t.life <= 0) { tracers.splice(i, 1); continue; }
        ctx.globalAlpha = clamp(t.life / t.maxLife, 0, 1);
        ctx.strokeStyle = t.color;
        ctx.lineWidth = 1.6;
        ctx.beginPath();
        ctx.moveTo(t.x1, t.y1);
        ctx.lineTo(t.x2, t.y2);
        ctx.stroke();
        ctx.globalAlpha = 1;
      }
    }

    function tick(now) {
      const dt = Math.min((now - lastTime) / 1000, 1 / 30);
      lastTime = now;
      for (let i = 0; i < 2; i++) {
        fighters.forEach(f => f.update(dt / 2));
        Engine.update(engine, dt * 500);
      }
      updateRockets(dt);
      updateCounts();

      const sx = (Math.random() - .5) * shake;
      const sy = (Math.random() - .5) * shake;
      shake = Math.max(0, shake - dt * 30);
      ctx.save();
      ctx.setTransform(DPR, 0, 0, DPR, sx, sy);
      drawArena();
      fighters.sort((a, b) => {
        const at = (a.kind === 'tank' || a.kind === 'mech' || a.kind === 'turret') ? 0 : 1;
        const bt = (b.kind === 'tank' || b.kind === 'mech' || b.kind === 'turret') ? 0 : 1;
        if (at !== bt) return at - bt;
        return a.drawOrder - b.drawOrder;
      }).forEach(f => f.draw());
      drawEffects(dt);
      ctx.restore();
      requestAnimationFrame(tick);
    }

    addEventListener('resize', resize);
    canvas.addEventListener('pointerdown', startDragging);
    canvas.addEventListener('pointermove', moveDragging);
    canvas.addEventListener('pointerup', stopDragging);
    canvas.addEventListener('pointercancel', stopDragging);
    buildUi();
    resize();
    autoBattle();
    requestAnimationFrame(tick);
  </script>
</body>
</html>
